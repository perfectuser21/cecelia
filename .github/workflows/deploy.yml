name: Deploy

# 合并到 main 后自动部署（Brain + Workspace）
# 触发：push to main only（PR 合并通过 CI 检查后自动触发）
# 方案：GitHub Actions → Brain Webhook → 本地部署脚本

on:
  push:
    branches: [main]

jobs:
  # ─── Detect Changes ───────────────────────────────────────────────────────

  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      brain: ${{ steps.filter.outputs.brain }}
      workspace: ${{ steps.filter.outputs.workspace }}
      changed_paths: ${{ steps.filter.outputs.changed_paths }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Detect changed paths
        id: filter
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.event.after }}"
          # If this is the first commit (before is all zeros), treat as full change
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "brain=true" >> $GITHUB_OUTPUT
            echo "workspace=true" >> $GITHUB_OUTPUT
            echo "changed_paths=packages/brain/ apps/" >> $GITHUB_OUTPUT
            exit 0
          fi
          CHANGED=$(git diff --name-only "$BEFORE" "$AFTER" 2>/dev/null || git diff --name-only HEAD~1 HEAD)
          if echo "$CHANGED" | grep -qE "^packages/brain/|^DEFINITION\.md$|^\.brain-versions$"; then
            echo "brain=true" >> $GITHUB_OUTPUT
          else
            echo "brain=false" >> $GITHUB_OUTPUT
          fi
          if echo "$CHANGED" | grep -qE "^apps/"; then
            echo "workspace=true" >> $GITHUB_OUTPUT
          else
            echo "workspace=false" >> $GITHUB_OUTPUT
          fi
          # Pass changed paths to webhook
          PATHS=$(echo "$CHANGED" | tr '\n' ' ')
          echo "changed_paths=$PATHS" >> $GITHUB_OUTPUT

  # ─── Trigger Deploy via Brain Webhook ────────────────────────────────────

  deploy:
    name: Trigger Deploy
    needs: changes
    if: needs.changes.outputs.brain == 'true' || needs.changes.outputs.workspace == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - name: Call Brain deploy webhook
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          BRAIN_URL: ${{ secrets.BRAIN_DEPLOY_URL || 'https://dev-autopilot.zenjoymedia.media' }}
        run: |
          if [ -z "$DEPLOY_TOKEN" ]; then
            echo "::error::DEPLOY_TOKEN secret not configured."
            echo "Setup: gh secret set DEPLOY_TOKEN --body '<your-token>'"
            exit 1
          fi

          CHANGED_PATHS='${{ needs.changes.outputs.changed_paths }}'

          # Convert space-separated paths to JSON array
          JSON_PATHS=$(echo "$CHANGED_PATHS" | tr ' ' '\n' | grep -v '^$' | jq -R . | jq -sc .)

          echo "Triggering deploy webhook..."
          echo "  URL: ${BRAIN_URL}/api/brain/deploy"
          echo "  Changed paths: $CHANGED_PATHS"

          HTTP_CODE=$(curl -s -o /tmp/deploy_response.txt -w "%{http_code}" \
            -X POST "${BRAIN_URL}/api/brain/deploy" \
            -H "Authorization: Bearer ${DEPLOY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"changed_paths\": ${JSON_PATHS}}" \
            --connect-timeout 30 \
            --max-time 60)

          echo "Response code: $HTTP_CODE"
          cat /tmp/deploy_response.txt
          echo ""

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Deploy webhook triggered successfully"
          else
            echo "::error::Deploy webhook failed with HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Poll deploy status
        env:
          BRAIN_URL: ${{ secrets.BRAIN_DEPLOY_URL || 'https://dev-autopilot.zenjoymedia.media' }}
        run: |
          echo "Polling /api/brain/deploy/status (max 300s)..."
          MAX_WAIT=300
          INTERVAL=10
          ELAPSED=0

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            STATUS_JSON=$(curl -s --connect-timeout 10 --max-time 15 \
              "${BRAIN_URL}/api/brain/deploy/status" 2>/dev/null || echo '{"status":"unknown"}')
            STATUS=$(echo "$STATUS_JSON" | jq -r '.status // "unknown"' 2>/dev/null || echo "unknown")

            echo "  [${ELAPSED}s] status=${STATUS}"

            if [ "$STATUS" = "success" ]; then
              ELAPSED_MS=$(echo "$STATUS_JSON" | jq -r '.elapsed_ms // "?"' 2>/dev/null || echo "?")
              echo "✅ Deploy confirmed success (${ELAPSED_MS}ms)"
              exit 0
            elif [ "$STATUS" = "failed" ]; then
              ERR=$(echo "$STATUS_JSON" | jq -r '.error // "unknown error"' 2>/dev/null || echo "unknown error")
              echo "::error::Deploy failed: $ERR"
              exit 1
            elif [ "$STATUS" = "idle" ] && [ $ELAPSED -gt 30 ]; then
              echo "::warning::Deploy status is idle after ${ELAPSED}s — deploy may have been skipped (no relevant changes)"
              exit 0
            fi

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "::warning::Deploy status poll timed out after ${MAX_WAIT}s — webhook accepted but result unknown"
