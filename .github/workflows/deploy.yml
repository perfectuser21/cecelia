name: Deploy

# 合并到 main 后自动部署（Brain + Workspace）
# 触发：push to main only（PR 合并通过 CI 检查后自动触发）
# 迁移自：brain-ci.yml (deploy-brain) + workspace-ci.yml (deploy-workspace)
# Phase 3: 加入路径过滤，只在相关文件变更时触发对应部署

on:
  push:
    branches: [main]

jobs:
  # ─── Detect Changes ───────────────────────────────────────────────────────

  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      brain: ${{ steps.filter.outputs.brain }}
      workspace: ${{ steps.filter.outputs.workspace }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Detect changed paths
        id: filter
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.event.after }}"
          # If this is the first commit (before is all zeros), treat as full change
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "brain=true" >> $GITHUB_OUTPUT
            echo "workspace=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          CHANGED=$(git diff --name-only "$BEFORE" "$AFTER" 2>/dev/null || git diff --name-only HEAD~1 HEAD)
          if echo "$CHANGED" | grep -qE "^packages/brain/|^DEFINITION\.md$|^\.brain-versions$"; then
            echo "brain=true" >> $GITHUB_OUTPUT
          else
            echo "brain=false" >> $GITHUB_OUTPUT
          fi
          if echo "$CHANGED" | grep -qE "^apps/"; then
            echo "workspace=true" >> $GITHUB_OUTPUT
          else
            echo "workspace=false" >> $GITHUB_OUTPUT
          fi

  # ─── Deploy Brain to VPS ───────────────────────────────────────────────

  deploy-brain:
    name: Deploy Brain
    needs: changes
    if: needs.changes.outputs.brain == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Deploy to US VPS via SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [ -z "$DEPLOY_SSH_KEY" ]; then
            echo "::error::DEPLOY_SSH_KEY secret not configured."
            echo "Setup: ssh-keygen -t ed25519 -f ~/.ssh/cecelia_deploy && ssh-copy-id xx@146.190.52.84 && gh secret set DEPLOY_SSH_KEY < ~/.ssh/cecelia_deploy"
            exit 1
          fi
          printf '%s\n' "$DEPLOY_SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            xx@146.190.52.84 \
            "cd /home/xx/perfect21/cecelia && git pull origin main && bash scripts/brain-deploy.sh"
          rm -f /tmp/deploy_key

  # ─── Deploy Workspace (Dashboard) to VPS ──────────────────────────────

  deploy-workspace:
    name: Deploy Workspace
    needs: changes
    if: needs.changes.outputs.workspace == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Deploy to US VPS via SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [ -z "$DEPLOY_SSH_KEY" ]; then
            echo "::error::DEPLOY_SSH_KEY secret not configured."
            echo "Setup: ssh-keygen -t ed25519 -f ~/.ssh/cecelia_deploy && ssh-copy-id xx@146.190.52.84 && gh secret set DEPLOY_SSH_KEY < ~/.ssh/cecelia_deploy"
            exit 1
          fi
          printf '%s\n' "$DEPLOY_SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            xx@146.190.52.84 \
            "cd /home/xx/perfect21/cecelia && git pull origin main && cd apps/dashboard && npm install --prefer-offline && npm run build"
          rm -f /tmp/deploy_key
