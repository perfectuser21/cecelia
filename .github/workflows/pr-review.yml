name: PR Auto Review (DeepSeek)

# AI 代码审查 — 每个 PR 创建/更新时自动触发
# 使用 DeepSeek V3 通过 OpenRouter 对代码变更进行 AI review
# 结果以评论形式发布到 PR，advisory only（不阻塞合并）

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  deepseek-review:
    name: DeepSeek Code Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: AI Code Review
        uses: hustcer/deepseek-review@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          chat-token: ${{ secrets.OPENROUTER_API_KEY }}
          base-url: https://openrouter.ai/api/v1
          model: deepseek/deepseek-chat-v3-5
          sys-prompt: |
            你是 Cecelia 项目的代码审查员，请用中文对以下代码变更进行审查。

            重点关注以下方面：
            1. **逻辑问题**：是否有潜在的逻辑错误、边界条件处理不当、空指针/异常未处理
            2. **安全风险**：是否有凭据泄露、SQL 注入、XSS、不安全的依赖等安全隐患
            3. **DoD 符合度**：变更是否符合 PR 描述中的 DoD（Definition of Done）条目，是否所有 DoD 条目均已勾选 [x]
            4. **代码质量**：是否有重复代码、过度复杂的实现、缺少错误处理
            5. **测试覆盖**：feat 类型的变更是否包含对应的测试文件

            输出格式：
            - 用简洁的 Markdown 列表总结发现的问题
            - 区分严重问题（🔴）、建议优化（🟡）、正面反馈（🟢）
            - 如果没有发现问题，说明代码质量良好
