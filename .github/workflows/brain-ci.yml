name: Brain CI

on:
  push:
    branches: [main]
    paths:
      - 'packages/brain/**'
      - 'DEFINITION.md'
      - '.brain-versions'
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: brain-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  # Detect which paths changed to skip heavy jobs on non-brain PRs
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      brain: ${{ steps.filter.outputs.brain }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect brain changes
        id: filter
        run: |
          # For pull_request: compare head with base branch
          # For push/workflow_dispatch: compare with origin/main
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "brain=true" >> "$GITHUB_OUTPUT"
            echo "Push to main: assuming brain changes"
            exit 0
          fi
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
          else
            BASE="origin/main"
          fi
          git fetch origin --depth=50 2>/dev/null || true
          if git diff --name-only "$BASE"..HEAD 2>/dev/null | grep -qE '^(packages/brain/|DEFINITION\.md|\.brain-versions)'; then
            echo "brain=true" >> "$GITHUB_OUTPUT"
            echo "Brain changes detected"
          else
            echo "brain=false" >> "$GITHUB_OUTPUT"
            echo "No brain changes detected"
          fi

  version-check:
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.brain == 'true'
    name: Version Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check brain/package.json version updated
        run: |
          set -e
          PKGJSON="packages/brain/package.json"

          if [ ! -f "$PKGJSON" ]; then
            echo "No $PKGJSON found, skipping"
            exit 0
          fi

          BASE_VERSION=$(git show origin/${{ github.base_ref }}:$PKGJSON 2>/dev/null | jq -r '.version' || echo "")

          if [ -z "$BASE_VERSION" ] || [ "$BASE_VERSION" = "null" ]; then
            echo "Could not read base branch version, skipping check"
            exit 0
          fi

          CURRENT_VERSION=$(jq -r '.version' "$PKGJSON")

          echo "Base branch version: $BASE_VERSION"
          echo "Current version: $CURRENT_VERSION"

          if [ "$BASE_VERSION" = "$CURRENT_VERSION" ]; then
            echo "Version not updated in $PKGJSON"
            exit 1
          else
            echo "Version updated: $BASE_VERSION -> $CURRENT_VERSION"
          fi

  facts-check:
    needs: changes
    if: needs.changes.outputs.brain == 'true'
    name: Facts Consistency
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check facts consistency
        run: node scripts/facts-check.mjs

      - name: Check version sync
        run: bash scripts/check-version-sync.sh

  manifest-sync:
    needs: changes
    if: needs.changes.outputs.brain == 'true'
    name: Manifest Sync Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install brain dependencies
        working-directory: packages/brain
        run: npm ci

      - name: Check manifest is in sync with source
        run: node packages/brain/scripts/generate-manifest.mjs --check

  brain-test:
    needs: changes
    if: needs.changes.outputs.brain == 'true'
    name: Brain Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_DB: cecelia
          POSTGRES_USER: cecelia
          POSTGRES_PASSWORD: cecelia_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: cecelia
      DB_USER: cecelia
      DB_PASSWORD: cecelia_ci
      ENV_REGION: us

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: packages/brain
        run: npm ci

      - name: Run migrations
        working-directory: packages/brain
        run: node src/migrate.js

      - name: Run Brain tests with coverage
        working-directory: packages/brain
        run: npx vitest run --exclude='src/__tests__/blocks.test.js' --reporter=verbose --coverage

      - name: GoldenPath E2E
        working-directory: packages/brain
        run: bash scripts/goldenpath-check.sh

  ci-passed:
    needs: [changes, version-check, facts-check, manifest-sync, brain-test]
    if: always()
    runs-on: [self-hosted, hk-vps]
    timeout-minutes: 5
    steps:
      - name: Brain CI Passed
        run: |
          if [ "${{ needs.changes.outputs.brain }}" != "true" ]; then
            echo "No brain changes detected, skipping checks"
            exit 0
          fi
          FAILED=false

          if [ "${{ needs.brain-test.result }}" != "success" ]; then
            echo "FAIL: Brain Tests (${{ needs.brain-test.result }})"
            FAILED=true
          fi

          if [ "${{ needs.facts-check.result }}" != "success" ]; then
            echo "FAIL: Facts Consistency (${{ needs.facts-check.result }})"
            FAILED=true
          fi

          if [ "${{ needs.manifest-sync.result }}" != "success" ]; then
            echo "FAIL: Manifest Sync (${{ needs.manifest-sync.result }})"
            FAILED=true
          fi

          # version-check may be skipped on non-brain PRs
          if [ "${{ needs.version-check.result }}" != "success" ] && [ "${{ needs.version-check.result }}" != "skipped" ]; then
            echo "FAIL: Version Check (${{ needs.version-check.result }})"
            FAILED=true
          fi

          if [ "$FAILED" = "true" ]; then
            echo ""
            echo "Brain CI Gate FAILED"
            exit 1
          fi

          echo "All Brain CI checks passed"
