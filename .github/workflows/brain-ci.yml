name: Brain CI

on:
  push:
    branches: [main]
    paths:
      - 'packages/brain/**'
      - 'DEFINITION.md'
      - '.brain-versions'
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: brain-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  # Detect which paths changed to skip heavy jobs on non-brain PRs
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      brain: ${{ steps.filter.outputs.brain }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect brain changes
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "brain=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          BASE_REF="${{ github.base_ref }}"
          if git diff --name-only "origin/${BASE_REF}...HEAD" | grep -qE "^packages/brain/|^DEFINITION\.md$|^\.brain-versions$"; then
            echo "brain=true" >> $GITHUB_OUTPUT
          else
            echo "brain=false" >> $GITHUB_OUTPUT
          fi

  facts-check:
    needs: changes
    if: needs.changes.outputs.brain == 'true'
    name: Facts Consistency
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Check facts consistency
        run: node scripts/facts-check.mjs

      - name: Check version sync
        run: bash scripts/check-version-sync.sh

  manifest-sync:
    needs: changes
    if: needs.changes.outputs.brain == 'true'
    name: Manifest Sync Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/brain/package-lock.json

      - name: Install brain dependencies
        working-directory: packages/brain
        run: npm ci

      - name: Check manifest is in sync with source
        run: node packages/brain/scripts/generate-manifest.mjs --check

  fitness-check:
    needs: changes
    if: needs.changes.outputs.brain == 'true'
    name: Fitness Functions (System Consistency)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Check LLM agent registry completeness
        run: node scripts/devgate/check-llm-agents.mjs

      - name: Check executor agent registry completeness
        run: node scripts/devgate/check-executor-agents.mjs

      - name: Check skills registry completeness
        run: node scripts/devgate/check-skills-registry.mjs

      - name: Check contract drift (module boundary protection)
        run: |
          npm install --no-save js-yaml
          node scripts/devgate/check-contract-drift.mjs --base=origin/main

  brain-test:
    needs: changes
    if: needs.changes.outputs.brain == 'true'
    name: Brain Tests
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: read

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: cecelia
      DB_USER: cecelia
      DB_PASSWORD: cecelia_ci
      ENV_REGION: us
      PGPASSWORD: cecelia_ci

    steps:
      - uses: actions/checkout@v4

      - name: Cache Homebrew packages
        id: cache-brew
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew/downloads
            /opt/homebrew/Cellar/postgresql@17
            /opt/homebrew/Cellar/pgvector
            /opt/homebrew/opt/postgresql@17
            /opt/homebrew/opt/pgvector
            /opt/homebrew/lib/postgresql@17
            /opt/homebrew/include/postgresql@17
            /opt/homebrew/share/postgresql@17
            /opt/homebrew/share/pgvector
          key: brew-postgresql17-pgvector-${{ runner.os }}-${{ runner.arch }}-v2

      - name: Install Homebrew packages (if not cached)
        if: steps.cache-brew.outputs.cache-hit != 'true'
        run: |
          brew install postgresql@17
          brew install pgvector

      - name: Link Homebrew packages (if cached)
        if: steps.cache-brew.outputs.cache-hit == 'true'
        run: |
          brew link postgresql@17 --force 2>/dev/null || true
          brew link pgvector --force 2>/dev/null || true

      - name: Set up PostgreSQL
        run: |
          export PATH="$(brew --prefix postgresql@17)/bin:$PATH"
          echo "initdb path: $(which initdb 2>/dev/null || echo 'NOT FOUND')"
          echo "pg_ctl path: $(which pg_ctl 2>/dev/null || echo 'NOT FOUND')"
          # Check if PostgreSQL is already running (e.g. from a cached runner state)
          if pg_isready -h localhost -p 5432 2>/dev/null; then
            echo "PostgreSQL already running on port 5432, skipping initialization"
          else
            # Initialize new PostgreSQL instance (expose errors, no silent suppression)
            if [ ! -d /tmp/pgdata ]; then
              initdb -D /tmp/pgdata --username=$(whoami)
            else
              echo "/tmp/pgdata already exists, skipping initdb"
            fi
            pg_ctl -D /tmp/pgdata -l /tmp/pg.log start
            # Wait for PostgreSQL to be ready
            for i in $(seq 1 30); do
              if pg_isready -h localhost -p 5432 2>/dev/null; then
                echo "PostgreSQL is ready"
                break
              fi
              echo "Waiting for PostgreSQL... ($i/30)"
              sleep 1
            done
          fi
          # Create CI user and database (connect as current OS user which is the superuser)
          createuser --superuser cecelia 2>/dev/null || true
          psql -c "ALTER USER cecelia PASSWORD 'cecelia_ci';" postgres
          createdb -U cecelia cecelia 2>/dev/null || true
          # pgvector extension (installed by previous brew step)
          psql -U cecelia -d cecelia -c "CREATE EXTENSION IF NOT EXISTS vector;" 2>/dev/null || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/brain/package-lock.json

      - name: Install dependencies
        working-directory: packages/brain
        run: npm ci

      - name: Run migrations
        working-directory: packages/brain
        run: node src/migrate.js

      - name: Run Brain tests
        working-directory: packages/brain
        env:
          NODE_OPTIONS: "--max-old-space-size=1536"
        run: |
          set +e
          if [ "${{ github.event_name }}" = "push" ]; then
            npx vitest run --exclude='src/__tests__/blocks.test.js' --reporter=verbose --coverage 2>&1 | tee /tmp/test-output.txt
          else
            npx vitest run --exclude='src/__tests__/blocks.test.js' --reporter=verbose 2>&1 | tee /tmp/test-output.txt
          fi
          EXIT_CODE=${PIPESTATUS[0]}
          # If vitest exited non-zero, check if all tests actually passed
          # (worker OOM during cleanup causes exit 1 even when all tests pass)
          if [ $EXIT_CODE -ne 0 ]; then
            if grep -qE "Tests.*[0-9]+ passed" /tmp/test-output.txt && ! grep -qE "Tests.*[0-9]+ failed" /tmp/test-output.txt; then
              echo "⚠️  vitest exited $EXIT_CODE but all tests passed (likely worker OOM during cleanup)"
              exit 0
            fi
            exit $EXIT_CODE
          fi

      - name: GoldenPath E2E
        working-directory: packages/brain
        run: bash scripts/goldenpath-check.sh

  ci-passed:
    needs: [changes, facts-check, manifest-sync, fitness-check, brain-test]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Brain CI Passed
        run: |
          if [ "${{ needs.changes.result }}" = "failure" ]; then
            echo "FAIL: Detect Changes job failed - cannot determine what changed"
            exit 1
          fi
          if [ "${{ needs.changes.outputs.brain }}" != "true" ]; then
            echo "No brain changes detected, skipping checks"
            exit 0
          fi
          FAILED=false

          if [ "${{ needs.brain-test.result }}" != "success" ]; then
            echo "FAIL: Brain Tests (${{ needs.brain-test.result }})"
            FAILED=true
          fi

          if [ "${{ needs.facts-check.result }}" != "success" ]; then
            echo "FAIL: Facts Consistency (${{ needs.facts-check.result }})"
            FAILED=true
          fi

          if [ "${{ needs.manifest-sync.result }}" != "success" ]; then
            echo "FAIL: Manifest Sync (${{ needs.manifest-sync.result }})"
            FAILED=true
          fi

          if [ "${{ needs.fitness-check.result }}" != "success" ]; then
            echo "FAIL: Fitness Functions (${{ needs.fitness-check.result }})"
            FAILED=true
          fi

          if [ "$FAILED" = "true" ]; then
            echo ""
            echo "Brain CI Gate FAILED"
            exit 1
          fi

          echo "All Brain CI checks passed"

  deploy-brain:
    needs: [ci-passed]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.ci-passed.result == 'success'
    name: Deploy Brain
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Deploy to US VPS via SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [ -z "$DEPLOY_SSH_KEY" ]; then
            echo "::error::DEPLOY_SSH_KEY secret not configured."
            echo "Setup: ssh-keygen -t ed25519 -f ~/.ssh/cecelia_deploy && ssh-copy-id xx@146.190.52.84 && gh secret set DEPLOY_SSH_KEY < ~/.ssh/cecelia_deploy"
            exit 1
          fi
          printf '%s\n' "$DEPLOY_SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            xx@146.190.52.84 \
            "cd /home/xx/perfect21/cecelia && git pull origin main && bash scripts/brain-deploy.sh"
          rm -f /tmp/deploy_key
