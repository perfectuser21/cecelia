name: L1 Process Gate

# L1: 流程合规检查 — 所有 PR 必跑，快速（2-5min）
# 职责：分支命名 / PRD-DoD 格式 / Cleanup / Learning 格式 / 元测试 / Engine 特定检查
# 迁移自：devgate.yml + engine-ci.yml (l1-process)

on:
  pull_request:
    branches: [main]

concurrency:
  group: l1-process-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      brain: ${{ steps.filter.outputs.brain }}
      engine: ${{ steps.filter.outputs.engine }}
      quality: ${{ steps.filter.outputs.quality }}
      workflows: ${{ steps.filter.outputs.workflows }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect affected packages
        id: filter
        run: |
          BASE_REF="${{ github.base_ref }}"
          CHANGED_FILES=$(git diff --name-only "origin/${BASE_REF}...HEAD")
          echo "Changed files:"
          echo "$CHANGED_FILES"
          echo ""

          # 使用 affected-packages.js 计算受影响包
          AFFECTED=$(echo "$CHANGED_FILES" | node packages/engine/scripts/affected-packages.js)
          echo "Affected packages: $AFFECTED"

          # 解析 JSON 数组，为每个包输出 true/false
          for pkg in brain engine quality workflows; do
            if echo "$AFFECTED" | grep -q "\"${pkg}\""; then
              echo "${pkg}=true" >> $GITHUB_OUTPUT
            else
              echo "${pkg}=false" >> $GITHUB_OUTPUT
            fi
          done

          # frontend = api 或 dashboard 受影响
          if echo "$AFFECTED" | grep -qE '"api"|"dashboard"'; then
            echo "frontend=true" >> $GITHUB_OUTPUT
          else
            echo "frontend=false" >> $GITHUB_OUTPUT
          fi

  # ─── Always-on checks (all PRs) ─────────────────────────────────────

  verify-dev-workflow:
    name: Verify /dev Workflow (Branch Name Check)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: 验证分支必须通过 /dev 创建
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "检查分支名: $BRANCH"
          if ! echo "$BRANCH" | grep -qP '^cp-\d{8}-[a-z0-9-]+$'; then
            echo ""
            echo "❌ 分支名不符合 /dev 工作流规范"
            echo "   当前分支: $BRANCH"
            echo "   要求格式: cp-XXXXXXXX-task-name（例: cp-02281200-fix-login）"
            echo ""
            echo "   所有代码改动必须通过 /dev 工作流创建分支。"
            echo "   请运行 /dev 重新开始开发流程。"
            exit 1
          fi
          echo "✅ 分支名验证通过: $BRANCH"

  dod-check:
    name: DoD Verification Gate
    needs: verify-dev-workflow
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/engine/package-lock.json

      - name: Install engine dependencies
        run: |
          cd packages/engine
          npm ci --ignore-scripts

      - name: Run DoD Verification Check
        env:
          GITHUB_HEAD_REF: ${{ github.head_ref }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  DevGate: DoD Verification (Branch: $GITHUB_HEAD_REF)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          node packages/engine/scripts/devgate/check-dod-mapping.cjs

      - name: Run DoD Execution Gate
        env:
          GITHUB_HEAD_REF: ${{ github.head_ref }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  DevGate: DoD Execution Gate (Branch: $GITHUB_HEAD_REF)"
          echo "  执行 [BEHAVIOR] Test 命令，验证功能真实工作"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          bash packages/engine/scripts/devgate/dod-execution-gate.sh

      - name: Run RCI Execution Gate (P0 contracts)
        # Fix: 移除 continue-on-error — 脚本已内置 DEFERRED 机制处理"无法在 CI 中运行"的情况
        # 只有真实的 P0 合规测试失败才会 exit 1，不存在误报阻断的问题
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  RCI Execution Gate: 执行 P0 regression-contract test_command"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          bash packages/engine/scripts/devgate/rci-execution-gate.sh

      - name: Run RCI Health Check (守护规则完整性)
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  RCI Health Check: 重复ID / 缺失文件 / known-failures过期 / 孤儿测试"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          cd packages/engine
          node scripts/devgate/check-rci-health.mjs

  cleanup-check:
    name: Cleanup Check (Step 6.5 Simplify)
    needs: verify-dev-workflow
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Check cleanup requirements against DoD
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Step 6.5 Simplify — Cleanup Check"
          echo "  Branch: $GITHUB_HEAD_REF"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""

          # 定位 DoD 文件（支持 task card 格式 + 旧格式向后兼容）
          DOD_FILE=""
          if [ -f ".task-${GITHUB_HEAD_REF}.md" ]; then
            DOD_FILE=".task-${GITHUB_HEAD_REF}.md"
          elif [ -f ".dod-${GITHUB_HEAD_REF}.md" ]; then
            DOD_FILE=".dod-${GITHUB_HEAD_REF}.md"
          elif [ -f ".dod.md" ]; then
            DOD_FILE=".dod.md"
          fi

          if [ -z "$DOD_FILE" ]; then
            echo "❌ DoD 文件缺失，拒绝合并 — 请创建 .task-${GITHUB_HEAD_REF}.md 或 .dod.md"
            exit 1
          fi

          echo "DoD file: $DOD_FILE"
          echo ""

          # 检查 DoD 中是否有重构/清理/替换相关条目
          CLEANUP_KEYWORDS="重构|refactor|替换|replace|cleanup|clean.up|删除.*旧|移除.*旧|remove.*old|simplify|简化"
          CLEANUP_ITEMS=$(grep -iE "$CLEANUP_KEYWORDS" "$DOD_FILE" | grep -E "^\s*-\s*\[" || true)

          if [ -z "$CLEANUP_ITEMS" ]; then
            echo "No cleanup/refactor items found in DoD — check not required"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 0
          fi

          echo "Cleanup items found in DoD:"
          echo "$CLEANUP_ITEMS"
          echo ""

          # 统计 PR diff 中的行删除数量
          DELETED_LINES=$(git diff "origin/${GITHUB_BASE_REF}...HEAD" -- \
            '*.ts' '*.tsx' '*.js' '*.cjs' '*.mjs' '*.py' '*.sh' \
            | grep -c '^-[^-]' 2>/dev/null || echo 0)

          echo "Deleted lines in PR diff (code files only): $DELETED_LINES"
          echo ""

          # DoD 有重构/清理条目，但 PR 无任何代码删除 → 硬失败
          if [ "$DELETED_LINES" -eq 0 ]; then
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  ❌ HARD GATE FAILED: Cleanup required but no code deleted"
            echo ""
            echo "  DoD 中有以下重构/清理条目："
            echo "$CLEANUP_ITEMS" | sed 's/^/    /'
            echo ""
            echo "  但 PR diff 中代码文件删除行数为 0。"
            echo ""
            echo "  必须完成 Step 6.5 Simplify："
            echo "    - 删除被替换的旧函数/旧变量/旧分支"
            echo "    - 删除未使用的 import/变量"
            echo "    - 删除矛盾注释和死代码"
            echo ""
            echo "  如果本次确实无需删除任何代码，请从 DoD 中移除清理相关条目，"
            echo "  并在 PR 描述中说明原因。"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi

          # 扫描 PR 改动的文件中是否有死代码标记
          CHANGED_FILES=$(git diff --name-only "origin/${GITHUB_BASE_REF}...HEAD" -- \
            '*.ts' '*.tsx' '*.js' '*.cjs' '*.mjs' '*.py' || true)

          if [ -n "$CHANGED_FILES" ]; then
            DEAD_CODE_HITS=$(echo "$CHANGED_FILES" | xargs grep -lE \
              "//\s*TODO:\s*(remove|delete|cleanup|clean up|deprecated)" \
              "//\s*DEPRECATED" \
              "//\s*OLD:" \
              "/\*\s*unused\s*\*/" \
              2>/dev/null | head -5 || true)

            if [ -n "$DEAD_CODE_HITS" ]; then
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "  ⚠️  WARNING: Dead code markers found in changed files"
              echo ""
              echo "  以下文件包含死代码标记（TODO: remove / DEPRECATED / OLD:）："
              echo "$DEAD_CODE_HITS" | sed 's/^/    /'
              echo ""
              echo "  请检查是否需要在本 PR 中一并清理（Step 6.5 Simplify）"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            else
              echo "No dead code markers found in changed files"
            fi
          fi

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Cleanup Check passed ($DELETED_LINES lines deleted)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  check-prd:
    name: PRD Success Criteria Check
    needs: verify-dev-workflow
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Check PRD has success criteria
        env:
          GITHUB_HEAD_REF: ${{ github.head_ref }}
        run: |
          bash packages/engine/scripts/devgate/check-prd.sh

  check-learning:
    name: Learning Format Gate
    needs: verify-dev-workflow
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Check Learning Format
        env:
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  DevGate: Learning Format Gate"
          echo "  Branch: $GITHUB_HEAD_REF"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          bash packages/engine/scripts/devgate/check-learning.sh

  quality-meta-tests:
    name: Quality System Meta Tests
    needs: [changes]
    if: needs.changes.outputs.quality == 'true' || needs.changes.outputs.engine == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/engine/package-lock.json

      - name: Install engine dependencies
        run: |
          cd packages/engine
          npm ci --ignore-scripts

      - name: Run quality system meta tests
        run: bash tests/quality-system/run-all.sh

  # ─── Required Paths Check (P2: 高风险路径自动要求 dev 证据) ─────────────

  required-paths-check:
    name: Required Dev Paths Check
    needs: verify-dev-workflow
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check high-risk paths require dev evidence
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Required Dev Paths Check (P2)"
          echo "  Branch: $HEAD_REF"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""

          CONFIG="packages/engine/config/required-dev-paths.yml"
          if [ ! -f "$CONFIG" ]; then
            echo "❌ required-dev-paths 缺失，拒绝合并 — 请创建 $CONFIG"
            echo "   该文件定义高风险路径，必须存在以保护关键代码路径。"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  ❌ Required Dev Paths Check FAILED (config missing)"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi

          # 读取高风险路径列表（去掉注释和空行）
          REQUIRED_PATHS=$(grep -E '^\s*-\s+' "$CONFIG" | sed 's/^\s*-\s*//' | grep -v '^#' || true)
          if [ -z "$REQUIRED_PATHS" ]; then
            echo "No paths configured — check not required"
            exit 0
          fi

          # 获取本 PR 改动的文件
          CHANGED=$(git diff --name-only "origin/${BASE_REF}...HEAD" 2>/dev/null || true)

          HIT_PATH=""
          while IFS= read -r path_pattern; do
            if echo "$CHANGED" | grep -q "^${path_pattern}"; then
              HIT_PATH="$path_pattern"
              break
            fi
          done <<< "$REQUIRED_PATHS"

          if [ -z "$HIT_PATH" ]; then
            echo "No high-risk paths changed — check not required"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  ✅ Required Dev Paths Check PASSED"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 0
          fi

          echo "High-risk path changed: $HIT_PATH"
          echo ""

          # 验证 PRD 文件存在（支持 task card 格式 + 旧格式向后兼容）
          PRD_FILE=""
          if [ -f ".task-${HEAD_REF}.md" ]; then
            PRD_FILE=".task-${HEAD_REF}.md"
          elif [ -f ".prd-${HEAD_REF}.md" ]; then
            PRD_FILE=".prd-${HEAD_REF}.md"
          else
            PRD_FILE=$(ls .prd-task-*.md 2>/dev/null | head -1 || true)
          fi
          if [ -z "$PRD_FILE" ] || [ ! -f "$PRD_FILE" ]; then
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  ❌ HARD GATE FAILED: 高风险路径变更但缺少 PRD"
            echo ""
            echo "  改动了高风险路径: $HIT_PATH"
            echo "  此类改动必须经过 /dev 工作流（PRD + DoD + Learning）。"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi

          echo "PRD file present — required paths check passed"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅ Required Dev Paths Check PASSED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ─── CI Config Audit (triggered when .github/workflows/** changes) ────────

  ci-config-audit:
    name: CI Config Audit
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Audit CI config changes
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  CI Config Audit"
          echo "  Branch: ${{ github.head_ref }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""

          CHANGED=$(git diff --name-only "origin/${BASE_REF}...HEAD" 2>/dev/null || git diff --name-only HEAD~1 HEAD)
          CI_CHANGED=$(echo "$CHANGED" | grep "^\.github/workflows/" || true)

          if [ -z "$CI_CHANGED" ]; then
            echo "No CI workflow files changed — audit not required"
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  ✅ CI Config Audit PASSED (no CI changes)"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 0
          fi

          echo "CI workflow files changed:"
          echo "$CI_CHANGED" | sed 's/^/  - /'
          echo ""

          if [[ ! "$PR_TITLE" =~ \[CONFIG\] ]] && [[ ! "$PR_TITLE" =~ \[INFRA\] ]]; then
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  ❌ CI Config Audit FAILED"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "  .github/workflows/** was modified but PR title is missing [CONFIG] or [INFRA] tag."
            echo "  CI config changes are high-risk and require explicit labeling."
            echo ""
            echo "  Fix: update PR title to include [CONFIG] or [INFRA]"
            echo "  Example: [CONFIG] fix(ci): update L3 brain-unit timeout"
            echo ""
            exit 1
          fi

          echo "PR title contains [CONFIG] or [INFRA] tag — audit passed"
          echo ""
          echo "Changed files summary:"
          git diff --stat "origin/${BASE_REF}...HEAD" -- '.github/workflows/' | tail -5
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅ CI Config Audit PASSED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ─── Engine-conditional checks ────────────────────────────────────────

  engine-l1:
    name: Engine L1 Process
    needs: [changes, verify-dev-workflow]
    if: needs.changes.outputs.engine == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/engine/package-lock.json

      - name: Install dependencies
        working-directory: packages/engine
        run: npm ci

      # P0: PRD/DoD Presence - verify dev evidence exists (A+ plan)
      # NOTE: PRD/DoD 已从 .gitignore 移除，现在必须随 PR 提交（不再 block，而是 require）
      # 具体内容验证由 check-prd / dod-check 两个独立 job 负责，此处不重复检查

      # P1: Config Audit - critical config file change audit
      - name: Config Audit
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Config Audit (P1)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""

          CRITICAL_CONFIGS=(
            ".github/workflows/ci-l1-process.yml"
            ".github/workflows/ci-l2-consistency.yml"
            ".github/workflows/ci-l3-code.yml"
            ".github/workflows/ci-l4-runtime.yml"
            ".github/workflows/deploy.yml"
            ".github/workflows/engine-ci.yml"
            "packages/engine/regression-contract.yaml"
            "packages/engine/ci/known-failures.json"
            "packages/engine/hooks/"
            "packages/engine/skills/"
            "packages/engine/scripts/setup-branch-protection.sh"
            "packages/engine/scripts/sync-version.sh"
          )

          MODIFIED_CONFIGS=()
          for config in "${CRITICAL_CONFIGS[@]}"; do
            if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q "^${config}"; then
              MODIFIED_CONFIGS+=("$config")
            fi
          done

          if [ ${#MODIFIED_CONFIGS[@]} -gt 0 ]; then
            echo "Critical config files modified:"
            for config in "${MODIFIED_CONFIGS[@]}"; do
              echo "   - $config"
            done
            echo ""

            if [[ ! "$PR_TITLE" =~ \[CONFIG\] ]] && [[ ! "$PR_TITLE" =~ \[INFRA\] ]]; then
              echo "PR title must contain [CONFIG] or [INFRA] tag"
              echo "Suggested: [CONFIG] $PR_TITLE"
              exit 1
            else
              echo "PR title contains config change tag"
            fi

            echo ""
            echo "Change details:"
            for config in "${MODIFIED_CONFIGS[@]}"; do
              echo ""
              echo "--- $config ---"
              git diff --stat origin/${{ github.base_ref }}...HEAD "$config"
            done
          else
            echo "No critical config files modified"
          fi

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Config Audit passed"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # P0: Known-Failures Protection - prevent malicious whitelist modification
      - name: Known-Failures Protection
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Known-Failures Protection (P0)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""

          KF_PATH="packages/engine/ci/known-failures.json"

          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q "^${KF_PATH}$"; then
            echo "detected: $KF_PATH was modified"
            echo ""

            if [[ ! "$PR_TITLE" =~ \[INFRA\] ]]; then
              echo "known-failures.json modified but PR title missing [INFRA] tag"
              echo ""
              echo "Modifying the test whitelist is a high-risk operation."
              echo "Please change PR title to: [INFRA] $PR_TITLE"
              exit 1
            fi

            echo "PR title contains [INFRA] tag"
            echo ""

            if ! jq empty "$KF_PATH" 2>/dev/null; then
              echo "known-failures.json is not valid JSON"
              exit 1
            fi

            MAX_SKIP=$(jq -r '.rules.max_skip_count // 3' "$KF_PATH")
            if [[ "$MAX_SKIP" -gt 5 ]]; then
              echo "max_skip_count too large: $MAX_SKIP (max allowed: 5)"
              exit 1
            fi

            ALLOWED_COUNT=$(jq '.allowed | length' "$KF_PATH")
            if [[ "$ALLOWED_COUNT" -gt "$MAX_SKIP" ]]; then
              echo "allowed entries ($ALLOWED_COUNT) exceeds max_skip_count ($MAX_SKIP)"
              exit 1
            fi

            INVALID_ENTRIES=$(jq -r '.allowed | to_entries[] | select(.value.description == null or .value.ticket == null or .value.expires == null) | .key' "$KF_PATH")
            if [[ -n "$INVALID_ENTRIES" ]]; then
              echo "Entries missing required fields (description, ticket, expires):"
              echo "$INVALID_ENTRIES" | sed 's/^/   - /'
              exit 1
            fi

            echo "known-failures.json content is valid"
            echo ""
            echo "Changes:"
            git diff origin/${{ github.base_ref }}...HEAD "$KF_PATH" | head -50
          else
            echo "known-failures.json not modified"
          fi

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Known-Failures Protection passed"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # DevGate 核心检查（不豁免任何 commit type）
      # Script existence check — 不豁免：DevGate 脚本必须始终存在，不论 commit type
      # DoD mapping check — 不豁免：chore/docs/test/release 改 engine 也必须有 DoD
      - name: DevGate core checks (script existence + DoD mapping)
        working-directory: packages/engine
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  DevGate core checks"
          echo "  (script existence + DoD mapping — 不豁免任何 commit type)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # 1. Script existence check (P1)
          echo ""
          echo "  [DevGate script existence - P1]"
          REQUIRED_SCRIPTS=(
            "scripts/devgate/check-dod-mapping.cjs"
            "scripts/devgate/scan-rci-coverage.cjs"
            "scripts/devgate/require-rci-update-if-p0p1.sh"
          )
          MISSING_SCRIPTS=()
          for script in "${REQUIRED_SCRIPTS[@]}"; do
            if [ ! -f "$script" ]; then
              MISSING_SCRIPTS+=("$script")
            fi
          done

          if [ ${#MISSING_SCRIPTS[@]} -gt 0 ]; then
            echo "  Missing required DevGate scripts:"
            for script in "${MISSING_SCRIPTS[@]}"; do
              echo "   - $script"
            done
            exit 1
          fi
          echo "  All required DevGate scripts present"

          # 2. DoD mapping check
          if [ -f "scripts/devgate/check-dod-mapping.cjs" ]; then
            echo ""
            echo "  [DoD <-> Test mapping check]"
            node scripts/devgate/check-dod-mapping.cjs || exit 1
          fi

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  DevGate core checks passed"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # DevGate RCI 检查（chore/docs/test/release 豁免 — 不涉及业务逻辑变更）
      - name: DevGate RCI checks (P0/P1 update + coverage)
        if: |
          !startsWith(github.event.pull_request.title, 'chore:') &&
          !startsWith(github.event.pull_request.title, 'docs:') &&
          !startsWith(github.event.pull_request.title, 'test:') &&
          !startsWith(github.event.pull_request.title, 'release:')
        working-directory: packages/engine
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  DevGate RCI checks"
          echo "  (P0/P1 RCI update + RCI coverage)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # 3. P0/P1 RCI update check
          if [ -f "scripts/devgate/require-rci-update-if-p0p1.sh" ]; then
            echo ""
            echo "  [P0/P1 RCI update check]"
            export BASE_REF="origin/${{ github.base_ref || 'main' }}"
            bash scripts/devgate/require-rci-update-if-p0p1.sh || exit 1
          fi

          # 4. RCI coverage check
          if [ -f "scripts/devgate/scan-rci-coverage.cjs" ]; then
            echo ""
            echo "  [RCI coverage check]"
            node scripts/devgate/scan-rci-coverage.cjs || {
              echo ""
              echo "  RCI coverage check failed"
              echo "  New business entries must have corresponding RCI entries"
              echo "  Please add coverage in regression-contract.yaml"
              exit 1
            }
          fi

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  DevGate RCI checks passed"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ─── Dev Health Gate (engine-conditional) ────────────────────────────

  dev-health-check:
    name: Dev Health Gate
    needs: [changes, verify-dev-workflow]
    if: needs.changes.outputs.engine == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: /dev 健康检查
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Dev Health Gate"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          bash packages/engine/scripts/test-dev-health.sh

  # ─── Secrets Scan ────────────────────────────────────────────────────

  secrets-scan:
    name: Secrets Scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ─── Gate job (always runs) ───────────────────────────────────────────

  l1-passed:
    name: L1 Process Gate Passed
    needs: [changes, verify-dev-workflow, dod-check, cleanup-check, check-prd, check-learning, quality-meta-tests, required-paths-check, ci-config-audit, engine-l1, dev-health-check, secrets-scan]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: L1 Process Gate
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  L1 Process Gate"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          FAILED=false

          if [ "${{ needs.verify-dev-workflow.result }}" != "success" ]; then
            echo "FAIL: /dev Workflow Verification (${{ needs.verify-dev-workflow.result }})"
            FAILED=true
          fi

          if [ "${{ needs.dod-check.result }}" != "success" ]; then
            echo "FAIL: DoD Verification Gate (${{ needs.dod-check.result }})"
            FAILED=true
          fi

          # A+ 方案：任何非 success 状态（含 skipped）均视为失败，消除 skipped 漏洞
          if [ "${{ needs.cleanup-check.result }}" != "success" ]; then
            echo "FAIL: Cleanup Check (${{ needs.cleanup-check.result }})"
            FAILED=true
          fi

          if [ "${{ needs.check-prd.result }}" != "success" ]; then
            echo "FAIL: PRD Success Criteria Check (${{ needs.check-prd.result }})"
            FAILED=true
          fi

          if [ "${{ needs.check-learning.result }}" != "success" ]; then
            echo "FAIL: Learning Format Gate (${{ needs.check-learning.result }})"
            FAILED=true
          fi

          # Quality/Engine-conditional check (only required when quality or engine changes)
          if [ "${{ needs.changes.outputs.quality }}" = "true" ] || [ "${{ needs.changes.outputs.engine }}" = "true" ]; then
            if [ "${{ needs.quality-meta-tests.result }}" != "success" ]; then
              echo "FAIL: Quality System Meta Tests (${{ needs.quality-meta-tests.result }})"
              FAILED=true
            fi
          fi

          if [ "${{ needs.ci-config-audit.result }}" != "success" ]; then
            echo "FAIL: CI Config Audit (${{ needs.ci-config-audit.result }})"
            FAILED=true
          fi

          if [ "${{ needs.required-paths-check.result }}" != "success" ]; then
            echo "FAIL: Required Dev Paths Check (${{ needs.required-paths-check.result }})"
            FAILED=true
          fi

          # Engine-specific checks (only required when engine changes)
          # Fix 6: skipped 状态视为失败 — engine 有变更时 skipped/failure 均不可接受
          if [ "${{ needs.changes.outputs.engine }}" = "true" ]; then
            ENGINE_L1_RESULT="${{ needs.engine-l1.result }}"
            DEV_HEALTH_RESULT="${{ needs.dev-health-check.result }}"
            if [ "$ENGINE_L1_RESULT" != "success" ]; then
              echo "FAIL: Engine L1 Process ($ENGINE_L1_RESULT) — skipped/failure 均视为失败"
              FAILED=true
            fi
            if [ "$DEV_HEALTH_RESULT" != "success" ]; then
              echo "FAIL: Dev Health Gate ($DEV_HEALTH_RESULT) — skipped/failure 均视为失败"
              FAILED=true
            fi
          fi

          if [ "${{ needs.secrets-scan.result }}" != "success" ]; then
            echo "FAIL: Secrets Scan (${{ needs.secrets-scan.result }})"
            FAILED=true
          fi

          if [ "$FAILED" = "true" ]; then
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  ❌ L1 Process Gate FAILED"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅ L1 Process Gate PASSED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
