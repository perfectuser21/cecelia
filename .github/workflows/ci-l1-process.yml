name: L1 Process Gate

# L1: 基础合规检查 — 所有 PR 必跑，快速（1-2min）
# 职责：分支命名 / CI 配置审计 / 密钥扫描
# 精简自 slim-engine-heartbeat PR4：删除所有流程文档类检查（DoD/PRD/Learning/RCI/seal 等）

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: l1-process-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Always-on checks (all PRs) ─────────────────────────────────────

  verify-dev-workflow:
    name: Verify /dev Workflow (Branch Name Check)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: 验证分支必须通过 /dev 创建
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          echo "检查分支名: $BRANCH"
          if ! echo "$BRANCH" | grep -qP '^cp-\d{8}-[a-z0-9-]+$'; then
            echo ""
            echo "❌ 分支名不符合 /dev 工作流规范"
            echo "   当前分支: $BRANCH"
            echo "   要求格式: cp-XXXXXXXX-task-name（例: cp-02281200-fix-login）"
            echo ""
            echo "   所有代码改动必须通过 /dev 工作流创建分支。"
            echo "   请运行 /dev 重新开始开发流程。"
            exit 1
          fi
          echo "✅ 分支名验证通过: $BRANCH"

  # ─── CI Config Audit (triggered when .github/workflows/** changes) ────────

  ci-config-audit:
    name: CI Config Audit
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Audit CI config changes
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          BASE_REF: ${{ github.base_ref || 'main' }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  CI Config Audit"
          echo "  Branch: ${{ github.head_ref }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""

          CHANGED=$(git diff --name-only "origin/${BASE_REF}...HEAD" 2>/dev/null || git diff --name-only HEAD~1 HEAD)
          CI_CHANGED=$(echo "$CHANGED" | grep "^\.github/workflows/" || true)

          if [ -z "$CI_CHANGED" ]; then
            echo "No CI workflow files changed — audit not required"
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  ✅ CI Config Audit PASSED (no CI changes)"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 0
          fi

          echo "CI workflow files changed:"
          echo "$CI_CHANGED" | sed 's/^/  - /'
          echo ""

          # workflow_dispatch: PR_TITLE 为空，跳过 [CONFIG] 标签检查（手动触发无 PR 上下文）
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "workflow_dispatch: 跳过 PR 标题 [CONFIG] 检查"
          elif [[ ! "$PR_TITLE" =~ \[CONFIG\] ]] && [[ ! "$PR_TITLE" =~ \[INFRA\] ]]; then
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  ❌ CI Config Audit FAILED"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "  .github/workflows/** was modified but PR title is missing [CONFIG] or [INFRA] tag."
            echo "  CI config changes are high-risk and require explicit labeling."
            echo ""
            echo "  Fix: update PR title to include [CONFIG] or [INFRA]"
            echo "  Example: [CONFIG] fix(ci): update L3 brain-unit timeout"
            echo ""
            exit 1
          fi

          echo "PR title contains [CONFIG] or [INFRA] tag — audit passed"
          echo ""
          echo "Changed files summary:"
          git diff --stat "origin/${BASE_REF}...HEAD" -- '.github/workflows/' | tail -5
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅ CI Config Audit PASSED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ─── Secrets Scan ────────────────────────────────────────────────────

  secrets-scan:
    name: Secrets Scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ─── Gate job (always runs) ───────────────────────────────────────────

  l1-passed:
    name: L1 Process Gate Passed
    needs: [verify-dev-workflow, ci-config-audit, secrets-scan]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: L1 Process Gate
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  L1 Process Gate"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          FAILED=false

          # Branch naming check
          if [ "${{ needs.verify-dev-workflow.result }}" != "success" ]; then
            echo "FAIL: /dev Workflow Verification (${{ needs.verify-dev-workflow.result }})"
            FAILED=true
          fi

          # CI Config Audit
          if [ "${{ needs.ci-config-audit.result }}" != "success" ]; then
            echo "FAIL: CI Config Audit (${{ needs.ci-config-audit.result }})"
            FAILED=true
          fi

          # Secrets Scan
          if [ "${{ needs.secrets-scan.result }}" != "success" ]; then
            echo "FAIL: Secrets Scan (${{ needs.secrets-scan.result }})"
            FAILED=true
          fi

          if [ "$FAILED" = "true" ]; then
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  ❌ L1 Process Gate FAILED"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅ L1 Process Gate PASSED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
