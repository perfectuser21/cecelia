name: Harness v5 Checks

# v5 Sprint C：合同纪律的 CI 硬校验
# 观察期已过，全部切硬门禁（PR cp-0427095721 移除 continue-on-error）
#
# 触发范围：只在 harness 相关改动时跑
#   - sprints/*/contract-*.md / contract-dod-ws*.md / tests/ws*/*.test.ts
#   - packages/workflows/skills/harness-contract-*/SKILL.md
#   - packages/workflows/skills/harness-generator/SKILL.md

on:
  pull_request:
    paths:
      - 'sprints/**/contract-draft.md'
      - 'sprints/**/sprint-contract.md'
      - 'sprints/**/contract-dod-ws*.md'
      - 'sprints/**/tests/**/*.test.ts'
      - 'packages/workflows/skills/harness-contract-*/SKILL.md'
      - 'packages/workflows/skills/harness-generator/SKILL.md'
      # 排除归档：老 sprint 纯历史痕迹，格式可能不符 v5 规则，不应触发检查
      - '!sprints/archive/**'

permissions:
  contents: read
  pull-requests: read

jobs:
  # ─── Check 1: DoD 纯度（contract-dod-ws 禁 [BEHAVIOR]） ────────────
  dod-structure-purity:
    name: DoD 纯度检查 (v5.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run check-dod-purity
        env:
          BASE_REF: origin/${{ github.base_ref }}
        run: node packages/engine/scripts/devgate/check-dod-purity.cjs

  # ─── Check 2: Test Contract 覆盖（测试文件必须存在） ─────────────────
  test-coverage-for-behavior:
    name: Test Contract 覆盖检查 (v5.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run check-test-coverage
        env:
          BASE_REF: origin/${{ github.base_ref }}
        run: node packages/engine/scripts/devgate/check-test-coverage.cjs

  # ─── Check 3: TDD Red-Green commit 顺序 ───────────────────────────
  tdd-commit-order:
    name: TDD Commit 顺序检查 (v5.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run check-tdd-commit-order
        env:
          BASE_REF: origin/${{ github.base_ref }}
          HEAD_REF: HEAD
        run: bash packages/engine/scripts/devgate/check-tdd-commit-order.sh

  # ─── Check 4: 测试实际通过（Red → Green 验证） ─────────────────────
  tests-actually-pass:
    name: Sprint Tests 实跑 (v5.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check if sprint tests changed
        id: check-tests
        env:
          BASE_REF: origin/${{ github.base_ref }}
        run: |
          set -euo pipefail
          TEST_FILES=$(git diff --name-only "${BASE_REF}...HEAD" | grep -E '^sprints/[^/]+/tests/.*\.test\.ts$' || true)
          if [ -z "$TEST_FILES" ]; then
            echo "has_tests=false" >> $GITHUB_OUTPUT
            echo "ℹ️  无 sprint 测试变更，后续步骤会跳过"
          else
            echo "has_tests=true" >> $GITHUB_OUTPUT
            {
              echo "test_files<<TESTFILES"
              echo "$TEST_FILES"
              echo "TESTFILES"
            } >> $GITHUB_OUTPUT
          fi
      - name: Install dependencies (root workspaces)
        if: steps.check-tests.outputs.has_tests == 'true'
        run: npm ci
      - name: Run sprint tests
        if: steps.check-tests.outputs.has_tests == 'true'
        run: |
          set -euo pipefail
          echo "📋 跑这些测试文件："
          echo "${{ steps.check-tests.outputs.test_files }}" | sed 's/^/  /'
          echo ""
          # vitest 从 CLI 接受相对路径即可
          npx vitest run ${{ steps.check-tests.outputs.test_files }} --reporter=verbose || {
            echo "❌ 测试未通过（Green 阶段失败）"
            exit 1
          }
