name: Workspace CI

on:
  push:
    branches: [main]
    paths: ['apps/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: workspace-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  # Detect which paths changed to skip heavy jobs on non-workspace PRs
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      workspace: ${{ steps.filter.outputs.workspace }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect workspace changes
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "workspace=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          BASE_REF="${{ github.base_ref }}"
          if git diff --name-only "origin/${BASE_REF}...HEAD" | grep -q "^apps/"; then
            echo "workspace=true" >> $GITHUB_OUTPUT
          else
            echo "workspace=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: changes
    if: needs.changes.outputs.workspace == 'true'
    name: Workspace Build & Test
    runs-on: [self-hosted, hk-vps]
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            apps/api/package-lock.json

      - name: Install all dependencies
        run: npm ci

      - name: API Typecheck
        working-directory: apps/api
        run: npm run typecheck

      - name: Build Dashboard
        working-directory: apps/dashboard
        run: npm run build

      - name: Dashboard Tests
        working-directory: apps/dashboard
        run: npm run test:run

  ci-passed:
    needs: [changes, build]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Workspace CI Gate
        run: |
          if [ "${{ needs.changes.result }}" = "failure" ]; then
            echo "FAIL: Detect Changes job failed - cannot determine what changed"
            exit 1
          fi
          if [ "${{ needs.changes.outputs.workspace }}" != "true" ]; then
            echo "No workspace changes detected, skipping checks"
            exit 0
          fi
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "Workspace Build & Test failed"
            exit 1
          fi
          echo "All Workspace CI checks passed"
