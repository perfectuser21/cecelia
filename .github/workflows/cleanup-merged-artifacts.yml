name: Cleanup Merged Artifacts

# 每次 PR 合并到 main 后，自动删除该 PR 遗留的 .prd-*.md / .task-*.md 文件
# 这些文件只在 PR review 期间需要（CI 检查 GITHUB_HEAD_REF），合并后是死重

on:
  push:
    branches:
      - main

jobs:
  cleanup:
    name: Remove prd/task artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Find and remove prd/task artifacts
        id: cleanup
        run: |
          # 找出所有合并后的残留 md：
          #   旧命名：.prd-*.md / .task-*.md / .dod-*.md（带前导点、小写，保留向后兼容）
          #   新命名：DoD.cp-*.md / PRD.cp-*.md / TASK_CARD.cp-*.md（大写、无前导点）
          # 不匹配 DoD.md / PRD.md（活跃 PR 使用，无 .cp- 后缀）
          # Phase 7.5: 补齐 .dod-* 前缀，之前漏抓导致 3 个 .dod-cp-* 残留积累
          FILES=$(git ls-files | grep -E '^(\.prd-|\.task-|\.dod-|DoD\.cp-|PRD\.cp-|TASK_CARD\.cp-)' || true)

          if [ -z "$FILES" ]; then
            echo "✅ 无 prd/task 残留文件，跳过"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COUNT=$(echo "$FILES" | wc -l | tr -d ' ')
          echo "🗑️  发现 $COUNT 个残留文件，开始清理..."
          echo "$FILES"

          # 删除文件
          echo "$FILES" | xargs git rm -q

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Commit cleanup
        if: steps.cleanup.outputs.changed == 'true'
        continue-on-error: true
        env:
          COUNT: ${{ steps.cleanup.outputs.count }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(cleanup): 自动清理合并后的 prd/task 文件（${COUNT} 个）[bot]"
          git push
