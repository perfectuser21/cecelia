name: CI

# Cecelia 统一 CI — 精简版
# 只做机器能客观判断的事：secrets + types + tests + build + lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── 变更检测 ──────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      brain: ${{ steps.detect.outputs.brain }}
      engine: ${{ steps.detect.outputs.engine }}
      workspace: ${{ steps.detect.outputs.workspace }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: detect
        run: |
          BASE_REF="origin/${{ github.base_ref || 'main' }}"
          if ! git rev-parse "$BASE_REF" >/dev/null 2>&1; then
            echo "brain=true" >> $GITHUB_OUTPUT
            echo "engine=true" >> $GITHUB_OUTPUT
            echo "workspace=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          CHANGED=$(git diff --name-only "$BASE_REF"...HEAD 2>/dev/null || echo "")
          echo "brain=$(echo "$CHANGED" | grep -q '^packages/brain/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "engine=$(echo "$CHANGED" | grep -q '^packages/engine/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "workspace=$(echo "$CHANGED" | grep -qE '^apps/' && echo true || echo false)" >> $GITHUB_OUTPUT

  # ─── Secrets 扫描 ──────────────────────────────────────────
  secrets-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Registry Lint（始终运行）────────────────────────────────
  registry-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Registry 完整性检查
        run: node scripts/registry-lint.mjs

  # ─── ESLint（brain 或 workspace 变更时）──────────────────────
  eslint:
    needs: changes
    if: needs.changes.outputs.brain == 'true' || needs.changes.outputs.workspace == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Lint Brain
        if: needs.changes.outputs.brain == 'true'
        continue-on-error: true
        run: cd packages/brain && npm ci && npx eslint src/
      - name: Lint Workspace API
        if: needs.changes.outputs.workspace == 'true'
        continue-on-error: true
        run: cd apps/api && npm ci && npx eslint src/

  # ─── PR Size Check（仅 PR 触发）─────────────────────────────
  pr-size-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: 检查 PR 变更行数
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          ADDITIONS=$(git diff --numstat "$BASE"..."$HEAD" | awk '{s+=$1} END {print s+0}')
          DELETIONS=$(git diff --numstat "$BASE"..."$HEAD" | awk '{s+=$2} END {print s+0}')
          TOTAL=$((ADDITIONS + DELETIONS))

          echo "📊 PR 变更统计："
          echo "  新增: +${ADDITIONS} 行"
          echo "  删除: -${DELETIONS} 行"
          echo "  总计: ${TOTAL} 行"
          echo ""

          if [ "$TOTAL" -gt 500 ]; then
            echo "⚠️  警告: PR 超过 500 行（${TOTAL} 行），建议拆分为更小的 PR"
            echo "::warning::PR 变更量 ${TOTAL} 行，超过 500 行阈值，建议拆分"
          else
            echo "✅ PR 大小合理（${TOTAL} 行）"
          fi

  # ─── 分支命名检查（仅 PR 触发）────────────────────────────────
  branch-naming:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: 检查分支命名规范
        run: |
          BRANCH="${{ github.head_ref }}"
          # 基础分支直接跳过
          if echo "$BRANCH" | grep -qE '^(main|master|develop|staging|release)$'; then
            echo "✅ 基础分支，跳过命名检查: $BRANCH"
            exit 0
          fi
          if echo "$BRANCH" | grep -qE '^(cp-|feature/|fix/|chore/|docs/)'; then
            echo "✅ 分支命名规范: $BRANCH"
          else
            echo "::error::分支名 '$BRANCH' 不符合规范，应以 cp-/feature//fix//chore//docs/ 开头"
            exit 1
          fi

  # ─── Engine: TypeCheck + Tests ─────────────────────────────
  engine-tests:
    needs: changes
    if: needs.changes.outputs.engine == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: cd packages/engine && npm ci
      - name: TypeCheck
        run: cd packages/engine && npx tsc --noEmit
      - name: Unit Tests
        run: cd packages/engine && npx vitest run --reporter=verbose
      - name: Version Sync
        run: cd packages/engine && bash ci/scripts/check-version-sync.sh
      - name: Contract Refs Check
        run: cd packages/engine && bash ci/scripts/check-contract-refs.sh
      - name: DoD 格式检查
        run: |
          # 检测 PR 中的 task-card.md 文件（跳过未含 task-card 的 PR）
          TASK_CARD=""
          for f in .task-*.md task-card.md; do
            [ -f "$f" ] && TASK_CARD="$f" && break
          done
          if [ -z "$TASK_CARD" ]; then
            echo "⏭️  未找到 task-card.md，跳过 DoD 格式检查"
            exit 0
          fi
          echo "📋 检查 DoD 文件: $TASK_CARD"
          # 检查至少有一个 [BEHAVIOR] 条目
          if ! grep -q '\[BEHAVIOR\]' "$TASK_CARD"; then
            echo "::error::Task Card 缺少 [BEHAVIOR] 条目，至少需要一个"
            exit 1
          fi
          echo "✅ 已发现 [BEHAVIOR] 条目"
          # 检查所有条目是否已勾选（不允许 [ ] 未验证条目）
          UNCHECKED=$(grep -c '^\- \[ \]' "$TASK_CARD" || true)
          if [ "$UNCHECKED" -gt 0 ]; then
            echo "::error::DoD 有 ${UNCHECKED} 个未验证条目（[ ]），push 前必须全部勾选为 [x]"
            grep '^\- \[ \]' "$TASK_CARD" | head -5
            exit 1
          fi
          echo "✅ 所有 DoD 条目已验证"
      - name: Feature Registry 同步检查
        run: |
          BASE_REF="origin/${{ github.base_ref || 'main' }}"
          CHANGED=$(git diff --name-only "$BASE_REF"...HEAD 2>/dev/null || echo "")
          if echo "$CHANGED" | grep -qE '^packages/engine/skills/'; then
            if ! echo "$CHANGED" | grep -q 'feature-registry.yml'; then
              echo "::error::修改了 packages/engine/skills/ 但未更新 feature-registry.yml"
              exit 1
            fi
            echo "✅ feature-registry.yml 已同步更新"
          else
            echo "⏭️  未修改 packages/engine/skills/，跳过 feature-registry 检查"
          fi

  # ─── Brain: Unit Tests ─────────────────────────────────────
  brain-unit:
    needs: changes
    if: needs.changes.outputs.brain == 'true' || needs.changes.outputs.engine == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: cd packages/brain && npm ci
      - name: Unit Tests
        env:
          NODE_OPTIONS: '--max-old-space-size=3072'
        run: cd packages/brain && npx vitest run --exclude='src/__tests__/blocks.test.js' --reporter=verbose --pool=forks --maxWorkers=2

  # ─── Brain: Integration Tests (PostgreSQL) ─────────────────
  brain-integration:
    needs: changes
    if: needs.changes.outputs.brain == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: cecelia
          POSTGRES_PASSWORD: cecelia_test
          POSTGRES_DB: cecelia_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: cd packages/brain && npm ci
      - name: Run Migrations
        env:
          DB_HOST: localhost
          DB_PORT: '5432'
          DB_NAME: cecelia_test
          DB_USER: cecelia
          DB_PASSWORD: cecelia_test
        run: cd packages/brain && node src/migrate.js
      - name: Integration Tests
        env:
          DATABASE_URL: postgresql://cecelia:cecelia_test@localhost:5432/cecelia_test
          DB_HOST: localhost
          DB_PORT: '5432'
          DB_NAME: cecelia_test
          DB_USER: cecelia
          DB_PASSWORD: cecelia_test
          NODE_ENV: test
        run: cd packages/brain && npx vitest run src/__tests__/integration/ --reporter=verbose

  # ─── Workspace: Build ──────────────────────────────────────
  workspace-build:
    needs: changes
    if: needs.changes.outputs.workspace == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: cd apps/dashboard && npm ci
      - name: Build
        run: cd apps/dashboard && npm run build

  # ─── Gate: 所有检查通过才能合并 ─────────────────────────────
  ci-passed:
    needs: [secrets-scan, registry-lint, eslint, pr-size-check, branch-naming, engine-tests, brain-unit, brain-integration, workspace-build]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check results
        run: |
          FAILED=false

          check() { local n=$1 r=$2; if [ "$r" = "failure" ]; then echo "❌ $n"; FAILED=true; elif [ "$r" = "skipped" ]; then echo "⏭️  $n (skipped)"; else echo "✅ $n"; fi; }

          check "secrets-scan"      "${{ needs.secrets-scan.result }}"
          check "registry-lint"     "${{ needs.registry-lint.result }}"
          check "eslint"            "${{ needs.eslint.result }}"
          check "pr-size-check"     "${{ needs.pr-size-check.result }}"
          check "branch-naming"     "${{ needs.branch-naming.result }}"
          check "engine-tests"      "${{ needs.engine-tests.result }}"
          check "brain-unit"        "${{ needs.brain-unit.result }}"
          check "brain-integration" "${{ needs.brain-integration.result }}"
          check "workspace-build"   "${{ needs.workspace-build.result }}"

          if [ "$FAILED" = "true" ]; then
            echo ""; echo "❌ CI FAILED"; exit 1
          fi
          echo ""; echo "✅ CI PASSED"
