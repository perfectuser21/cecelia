name: CI

# Cecelia 统一 CI — 精简版
# 只做机器能客观判断的事：secrets + types + tests + build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── 变更检测 ──────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      brain: ${{ steps.detect.outputs.brain }}
      engine: ${{ steps.detect.outputs.engine }}
      workspace: ${{ steps.detect.outputs.workspace }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: detect
        run: |
          BASE_REF="origin/${{ github.base_ref || 'main' }}"
          if ! git rev-parse "$BASE_REF" >/dev/null 2>&1; then
            echo "brain=true" >> $GITHUB_OUTPUT
            echo "engine=true" >> $GITHUB_OUTPUT
            echo "workspace=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          CHANGED=$(git diff --name-only "$BASE_REF"...HEAD 2>/dev/null || echo "")
          echo "brain=$(echo "$CHANGED" | grep -q '^packages/brain/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "engine=$(echo "$CHANGED" | grep -q '^packages/engine/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "workspace=$(echo "$CHANGED" | grep -qE '^apps/' && echo true || echo false)" >> $GITHUB_OUTPUT

  # ─── Secrets 扫描 ──────────────────────────────────────────
  secrets-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Engine: TypeCheck + Tests ─────────────────────────────
  engine-tests:
    needs: changes
    if: needs.changes.outputs.engine == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: cd packages/engine && npm ci
      - name: TypeCheck
        run: cd packages/engine && npx tsc --noEmit
      - name: Unit Tests
        run: cd packages/engine && npx vitest run --reporter=verbose
      - name: Version Sync
        run: cd packages/engine && bash ci/scripts/check-version-sync.sh

  # ─── Brain: Unit Tests ─────────────────────────────────────
  brain-unit:
    needs: changes
    if: needs.changes.outputs.brain == 'true' || needs.changes.outputs.engine == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: cd packages/brain && npm ci
      - name: Unit Tests
        run: cd packages/brain && npx vitest run --exclude='src/__tests__/blocks.test.js' --reporter=verbose

  # ─── Brain: Integration Tests (PostgreSQL) ─────────────────
  brain-integration:
    needs: changes
    if: needs.changes.outputs.brain == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: cecelia
          POSTGRES_PASSWORD: cecelia_test
          POSTGRES_DB: cecelia_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: cd packages/brain && npm ci
      - name: Integration Tests
        env:
          DATABASE_URL: postgresql://cecelia:cecelia_test@localhost:5432/cecelia_test
          NODE_ENV: test
        run: cd packages/brain && npx vitest run src/__tests__/integration/ --reporter=verbose

  # ─── Workspace: Build ──────────────────────────────────────
  workspace-build:
    needs: changes
    if: needs.changes.outputs.workspace == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: cd apps/dashboard && npm ci
      - name: Build
        run: cd apps/dashboard && npm run build

  # ─── Gate: 所有检查通过才能合并 ─────────────────────────────
  ci-passed:
    needs: [secrets-scan, engine-tests, brain-unit, brain-integration, workspace-build]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check results
        run: |
          FAILED=false

          check() { local n=$1 r=$2; if [ "$r" = "failure" ]; then echo "❌ $n"; FAILED=true; elif [ "$r" = "skipped" ]; then echo "⏭️  $n (skipped)"; else echo "✅ $n"; fi; }

          check "secrets-scan"      "${{ needs.secrets-scan.result }}"
          check "engine-tests"      "${{ needs.engine-tests.result }}"
          check "brain-unit"        "${{ needs.brain-unit.result }}"
          check "brain-integration" "${{ needs.brain-integration.result }}"
          check "workspace-build"   "${{ needs.workspace-build.result }}"

          if [ "$FAILED" = "true" ]; then
            echo ""; echo "❌ CI FAILED"; exit 1
          fi
          echo ""; echo "✅ CI PASSED"
