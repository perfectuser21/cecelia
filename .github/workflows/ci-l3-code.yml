name: L3 Code Gate

# L3: 代码质量检查 — 代码包变动时必跑（10-20min）
# 职责：Brain 单元测试（无DB）/ Engine 代码检查 / Workspace 构建 / Quality / Workflows
# 迁移自：brain-ci.yml (brain-unit) + engine-ci.yml (l3-code) + workspace-ci.yml (build)
#        + quality-ci.yml + workflows-ci.yml

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: l3-code-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  # ─── Commit Type Detection ─────────────────────────────────────────────
  # 根据 PR title 提取 commit type，决定 L3 是否需要运行
  # docs: / style: → 跳过 L3（纯文档/样式改动）
  # fix: / refactor: / chore: / test: / feat: / 未知类型 → 运行 L3（代码改动必须测试）

  detect-commit-type:
    name: Detect Commit Type
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      commit_type: ${{ steps.detect.outputs.commit_type }}
      should_run_l3: ${{ steps.detect.outputs.should_run_l3 }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect commit type from PR title
        id: detect
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          # push 到 main（merge）时总是运行 L3
          if [ "$EVENT_NAME" = "push" ]; then
            echo "commit_type=push" >> $GITHUB_OUTPUT
            echo "should_run_l3=true" >> $GITHUB_OUTPUT
            echo "Event: push to main → L3 will run"
            exit 0
          fi

          # workflow_dispatch 时总是运行 L3
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "commit_type=manual" >> $GITHUB_OUTPUT
            echo "should_run_l3=true" >> $GITHUB_OUTPUT
            echo "Event: workflow_dispatch → L3 will run"
            exit 0
          fi

          # 提取 PR title 中的 commit type（忽略 [CONFIG] 等标签前缀）
          TITLE=$(echo "$PR_TITLE" | sed 's/\[.*\] *//')
          COMMIT_TYPE=$(echo "$TITLE" | grep -oE '^[a-zA-Z]+:' | tr -d ':' | tr '[:upper:]' '[:lower:]' || echo "unknown")

          # 处理 feat! 的情况（含感叹号）
          if echo "$TITLE" | grep -qE '^feat!:'; then
            COMMIT_TYPE="feat_breaking"
          fi

          # 处理 BREAKING CHANGE
          if echo "$PR_TITLE" | grep -qi "BREAKING"; then
            COMMIT_TYPE="breaking"
          fi

          echo "PR Title: $PR_TITLE"
          echo "Extracted commit_type: $COMMIT_TYPE"
          echo "commit_type=$COMMIT_TYPE" >> $GITHUB_OUTPUT

          # 决策：跳过 L3 的类型（只有纯文档/样式改动才跳过）
          # fix:/refactor:/chore:/test:/perf: 必须跑 L3 — 代码改动不可跳过测试
          case "$COMMIT_TYPE" in
            docs|style)
              # Fix 1: docs/style 标题不再无条件跳过 L3 — 检查是否有实际代码文件变更
              CODE_CHANGES=0
              if [ -n "$BASE_REF" ]; then
                CODE_CHANGES=$(git diff --name-only "origin/${BASE_REF}...HEAD" 2>/dev/null | grep -vE '\.(md|txt)$|^docs/|^\.github/' | wc -l | tr -d ' ')
              fi
              if [ "$CODE_CHANGES" -gt "0" ]; then
                echo "should_run_l3=true" >> $GITHUB_OUTPUT
                echo "→ L3 RUN (docs/style title but $CODE_CHANGES code files changed)"
              else
                echo "should_run_l3=false" >> $GITHUB_OUTPUT
                echo "→ L3 SKIP (commit type: $COMMIT_TYPE, 0 code files changed)"
              fi
              ;;
            *)
              echo "should_run_l3=true" >> $GITHUB_OUTPUT
              echo "→ L3 RUN (commit type: $COMMIT_TYPE)"
              ;;
          esac

  changes:
    name: Detect Changes
    needs: detect-commit-type
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      brain: ${{ steps.filter.outputs.brain }}
      engine: ${{ steps.filter.outputs.engine }}
      workspace: ${{ steps.filter.outputs.workspace }}
      quality: ${{ steps.filter.outputs.quality }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changes per subsystem
        id: filter
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.event.after }}"
          if [ "${{ github.event_name }}" = "push" ]; then
            # R2: push 事件用实际 diff（不再全量 true）
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              echo "brain=true" >> $GITHUB_OUTPUT
              echo "engine=true" >> $GITHUB_OUTPUT
              echo "workspace=true" >> $GITHUB_OUTPUT
              echo "quality=true" >> $GITHUB_OUTPUT
              echo "workflows=true" >> $GITHUB_OUTPUT
            else
              CHANGED=$(git diff --name-only "$BEFORE" "$AFTER" 2>/dev/null || git diff --name-only HEAD~1 HEAD)
              echo "$CHANGED" | grep -qE "^packages/brain/|^DEFINITION\.md$|^\.brain-versions$" \
                && echo "brain=true" >> $GITHUB_OUTPUT || echo "brain=false" >> $GITHUB_OUTPUT
              echo "$CHANGED" | grep -q "^packages/engine/" \
                && echo "engine=true" >> $GITHUB_OUTPUT || echo "engine=false" >> $GITHUB_OUTPUT
              echo "$CHANGED" | grep -q "^apps/" \
                && echo "workspace=true" >> $GITHUB_OUTPUT || echo "workspace=false" >> $GITHUB_OUTPUT
              echo "$CHANGED" | grep -q "^packages/quality/" \
                && echo "quality=true" >> $GITHUB_OUTPUT || echo "quality=false" >> $GITHUB_OUTPUT
              echo "$CHANGED" | grep -q "^packages/workflows/" \
                && echo "workflows=true" >> $GITHUB_OUTPUT || echo "workflows=false" >> $GITHUB_OUTPUT
            fi
            exit 0
          fi
          BASE_REF="${{ github.base_ref }}"
          CHANGED=$(git diff --name-only "origin/${BASE_REF}...HEAD")

          echo "$CHANGED" | grep -qE "^packages/brain/|^DEFINITION\.md$|^\.brain-versions$" \
            && echo "brain=true" >> $GITHUB_OUTPUT || echo "brain=false" >> $GITHUB_OUTPUT
          echo "$CHANGED" | grep -q "^packages/engine/" \
            && echo "engine=true" >> $GITHUB_OUTPUT || echo "engine=false" >> $GITHUB_OUTPUT
          echo "$CHANGED" | grep -q "^apps/" \
            && echo "workspace=true" >> $GITHUB_OUTPUT || echo "workspace=false" >> $GITHUB_OUTPUT
          echo "$CHANGED" | grep -q "^packages/quality/" \
            && echo "quality=true" >> $GITHUB_OUTPUT || echo "quality=false" >> $GITHUB_OUTPUT
          echo "$CHANGED" | grep -q "^packages/workflows/" \
            && echo "workflows=true" >> $GITHUB_OUTPUT || echo "workflows=false" >> $GITHUB_OUTPUT

  # ─── Brain L3: Unit tests (ubuntu, no DB) ─────────────────────────────

  brain-unit:
    name: Brain Unit Tests
    needs: [changes, detect-commit-type]
    if: needs.changes.outputs.brain == 'true' && needs.detect-commit-type.outputs.should_run_l3 == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: cecelia
          POSTGRES_PASSWORD: cecelia_ci
          POSTGRES_DB: cecelia
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: cecelia
      DB_USER: cecelia
      DB_PASSWORD: cecelia_ci
      ENV_REGION: us
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/brain/package-lock.json

      - name: Install dependencies
        working-directory: packages/brain
        run: npm ci

      - name: Run migrations
        working-directory: packages/brain
        run: node src/migrate.js

      - name: Run Brain unit tests (no coverage)
        working-directory: packages/brain
        env:
          NODE_OPTIONS: "--max-old-space-size=1536"
        run: |
          set +e
          npx vitest run --exclude='src/__tests__/blocks.test.js' --reporter=verbose 2>&1 | tee /tmp/brain-unit-output.txt
          EXIT_CODE=${PIPESTATUS[0]}

          # Read baseline for pre-existing test failures (not introduced by this PR)
          BASELINE=0
          if [ -f "ci/brain-test-baseline.txt" ]; then
            BASELINE=$(cat ci/brain-test-baseline.txt | tr -d '[:space:]')
            echo "📋 Brain unit baseline: $BASELINE pre-existing failures allowed"
          fi

          # Fix 4: 基线上限保护 — 防止技术债无限累积
          MAX_BASELINE=5
          if [ "$BASELINE" -gt "$MAX_BASELINE" ]; then
            echo "❌ Brain test baseline too high: $BASELINE > MAX_BASELINE=$MAX_BASELINE"
            echo "   Brain 测试债务必须主动偿还，不允许无限积累。"
            echo "   请先修复测试，将 ci/brain-test-baseline.txt 降到 $MAX_BASELINE 以内。"
            exit 1
          fi

          if [ $EXIT_CODE -ne 0 ]; then
            # OOM check: vitest exited non-zero but all tests actually passed
            if grep -qE "Tests.*[0-9]+ passed" /tmp/brain-unit-output.txt && ! grep -qE "Tests.*[0-9]+ failed" /tmp/brain-unit-output.txt; then
              echo "⚠️  vitest exited $EXIT_CODE but all tests passed (likely worker OOM during cleanup)"
              exit 0
            fi

            # Count failures from vitest summary line
            FAILED_COUNT=$(grep -oE "[0-9]+ failed" /tmp/brain-unit-output.txt | awk '{print $1}' | tail -1)
            FAILED_COUNT=${FAILED_COUNT:-0}
            echo "📊 Brain unit tests: $FAILED_COUNT failures (baseline: $BASELINE)"

            if [ "$FAILED_COUNT" -le "$BASELINE" ]; then
              echo "✅ Failures ($FAILED_COUNT) ≤ baseline ($BASELINE) — pre-existing test debt, not introduced by this PR"
              exit 0
            fi

            echo "❌ Failures ($FAILED_COUNT) > baseline ($BASELINE) — new failures detected!"
            exit $EXIT_CODE
          fi

  # ─── Engine L3: TypeCheck / Tests / Build / Shell / Evidence ──────────

  engine-l3:
    name: Engine L3 Code
    needs: [changes, detect-commit-type]
    if: needs.changes.outputs.engine == 'true' && needs.detect-commit-type.outputs.should_run_l3 == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/engine/package-lock.json

      - name: Install dependencies
        working-directory: packages/engine
        run: npm ci

      # TypeCheck
      - name: TypeCheck
        working-directory: packages/engine
        id: typecheck
        run: |
          set -e
          if npm run typecheck --if-present; then
            echo "TypeCheck passed"
            bash ci/scripts/write-check-result.sh typecheck true 0 "npm run typecheck"
          else
            EXIT_CODE=$?
            echo "TypeCheck failed"
            bash ci/scripts/write-check-result.sh typecheck false $EXIT_CODE "npm run typecheck" "TypeCheck failed"
            exit $EXIT_CODE
          fi

      # Unit Tests (with Known-Failures whitelist validation)
      - name: Unit Tests
        working-directory: packages/engine
        id: test
        run: |
          set -e
          if npm run test --if-present; then
            echo "Tests passed"
            bash ci/scripts/write-check-result.sh test true 0 "npm run test"
          else
            TEST_EXIT_CODE=$?
            echo "Tests failed (exit: $TEST_EXIT_CODE)"

            if [ -f .quality-evidence.json ] && [ -f ci/known-failures.json ]; then
              if ! jq -e '.known_failure_keys | type == "array"' .quality-evidence.json >/dev/null 2>&1; then
                echo "Test failed: .quality-evidence.json missing known_failure_keys array"
                bash ci/scripts/write-check-result.sh test false $TEST_EXIT_CODE "npm run test" "missing known_failure_keys"
                exit $TEST_EXIT_CODE
              fi

              REQUESTED_KEYS=$(jq -r '.known_failure_keys[]' .quality-evidence.json 2>/dev/null || echo "")
              if [ -z "$REQUESTED_KEYS" ]; then
                echo "Test failed: known_failure_keys is empty"
                bash ci/scripts/write-check-result.sh test false $TEST_EXIT_CODE "npm run test" "known_failure_keys empty"
                exit $TEST_EXIT_CODE
              fi

              KEY_COUNT=$(echo "$REQUESTED_KEYS" | wc -l)
              MAX_SKIP=$(jq -r '.rules.max_skip_count // 3' ci/known-failures.json)
              if [ "$KEY_COUNT" -gt "$MAX_SKIP" ]; then
                echo "Test failed: skip count $KEY_COUNT exceeds max $MAX_SKIP"
                bash ci/scripts/write-check-result.sh test false $TEST_EXIT_CODE "npm run test" "skip count $KEY_COUNT > max $MAX_SKIP"
                exit $TEST_EXIT_CODE
              fi

              ALLOWED_KEYS=$(jq -r '.allowed | keys[]' ci/known-failures.json)
              INVALID_KEYS=""
              while IFS= read -r key; do
                if ! echo "$ALLOWED_KEYS" | grep -qx "$key"; then
                  INVALID_KEYS="$INVALID_KEYS $key"
                fi
              done <<< "$REQUESTED_KEYS"

              if [ -n "$INVALID_KEYS" ]; then
                echo "Test failed: unknown known_failure_keys:$INVALID_KEYS"
                bash ci/scripts/write-check-result.sh test false $TEST_EXIT_CODE "npm run test" "unknown keys:$INVALID_KEYS"
                exit $TEST_EXIT_CODE
              fi

              echo "Known failures validated ($KEY_COUNT items registered)"
              echo "$REQUESTED_KEYS" | sed 's/^/  - /'
              bash ci/scripts/write-check-result.sh test true 0 "npm run test" "known failures validated ($KEY_COUNT items)"
            else
              echo "Test failed with no valid known-failures config"
              bash ci/scripts/write-check-result.sh test false $TEST_EXIT_CODE "npm run test" "no known-failures config"
              exit $TEST_EXIT_CODE
            fi
          fi

      # Changed-line Coverage Gate (feat PR 变更行覆盖率)
      - name: Coverage Gate
        working-directory: packages/engine
        if: always() && steps.test.outcome == 'success'
        run: |
          echo "Running coverage with vitest..."
          npx vitest run --coverage --reporter=verbose 2>&1 || true
          echo ""
          echo "Running changed-line coverage gate..."
          node scripts/devgate/check-changed-coverage.cjs --base origin/main --coverage-dir ./coverage --project-root ${{ github.workspace }}

      # Build
      - name: Build
        working-directory: packages/engine
        id: build
        run: |
          set -e
          if npm run build --if-present; then
            echo "Build passed"
            bash ci/scripts/write-check-result.sh build true 0 "npm run build"
          else
            EXIT_CODE=$?
            echo "Build failed"
            bash ci/scripts/write-check-result.sh build false $EXIT_CODE "npm run build" "Build failed"
            exit $EXIT_CODE
          fi

      # Shell scripts syntax check
      - name: Check shell scripts
        working-directory: packages/engine
        id: shell_check
        run: |
          echo "Checking shell scripts..."
          FAILED=0
          FOUND=0
          FAIL_LIST=""
          while IFS= read -r -d '' f; do
            FOUND=1
            ERROR_OUTPUT=$(bash -n "$f" 2>&1)
            if [ $? -eq 0 ]; then
              echo "  [OK] $f"
            else
              echo "  [FAIL] $f"
              echo "$ERROR_OUTPUT" | sed 's/^/     /'
              FAILED=1
              FAIL_LIST="$FAIL_LIST $f"
            fi
          done < <(find . -name "*.sh" -type f -not -path "./node_modules/*" -print0)

          if [ "$FOUND" -eq 0 ]; then
            echo "No .sh files found"
          fi

          if [ "$FAILED" -eq 0 ]; then
            bash ci/scripts/write-check-result.sh shell-check true 0 "bash -n *.sh"
          else
            bash ci/scripts/write-check-result.sh shell-check false 1 "bash -n *.sh" "Failed:$FAIL_LIST"
            exit 1
          fi

      # Evidence generation (CI-only, SSOT)
      - name: Generate Evidence
        working-directory: packages/engine
        run: bash ci/scripts/generate-evidence.sh

      - name: Evidence Gate
        working-directory: packages/engine
        run: bash ci/scripts/evidence-gate.sh

  # ─── Workspace L3: Typecheck / Build / Tests ──────────────────────────

  workspace-l3:
    name: Workspace L3 Build & Test
    needs: [changes, detect-commit-type]
    if: needs.changes.outputs.workspace == 'true' && needs.detect-commit-type.outputs.should_run_l3 == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            apps/api/package-lock.json

      - name: Install all dependencies
        run: npm ci

      - name: API Typecheck
        working-directory: apps/api
        run: npm run typecheck

      - name: Build Dashboard
        working-directory: apps/dashboard
        run: npm run build

      - name: Dashboard Tests
        working-directory: apps/dashboard
        run: npm run test:run

  # ─── Quality L3: Structure / Tests / Lint / Docs ──────────────────────

  quality-l3:
    name: Quality L3 Checks
    needs: [changes, detect-commit-type]
    if: needs.changes.outputs.quality == 'true' && needs.detect-commit-type.outputs.should_run_l3 == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/quality/package-lock.json

      - name: Install dependencies
        working-directory: packages/quality
        run: npm ci

      - name: Check required directories
        working-directory: packages/quality
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Quality Structure Check"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          FAILED=false
          REQUIRED_DIRS=(hooks scripts/devgate skills contracts tests docs)
          for dir in "${REQUIRED_DIRS[@]}"; do
            if [ -d "$dir" ]; then
              echo "  [OK] $dir/"
            else
              echo "  [FAIL] $dir/ not found"
              FAILED=true
            fi
          done
          if [ "$FAILED" = "true" ]; then exit 1; fi
          echo "All required directories present"

      - name: Check VERSION file format
        working-directory: packages/quality
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          SEMVER_REGEX='^[0-9]+\.[0-9]+\.[0-9]+$'
          if [[ "$VERSION" =~ $SEMVER_REGEX ]]; then
            echo "  [OK] VERSION = $VERSION"
          else
            echo "  [FAIL] Invalid version format: '$VERSION'"
            exit 1
          fi

      - name: Check skills SKILL.md
        working-directory: packages/quality
        run: |
          FAILED=false
          REQUIRED_SKILLS=(skills/audit/SKILL.md skills/qa/SKILL.md skills/assurance/SKILL.md)
          for skill in "${REQUIRED_SKILLS[@]}"; do
            if [ -f "$skill" ]; then
              LINES=$(wc -l < "$skill")
              [ "$LINES" -ge 3 ] && echo "  [OK] $skill" || { echo "  [FAIL] $skill too short"; FAILED=true; }
            else
              echo "  [FAIL] $skill not found"
              FAILED=true
            fi
          done
          if [ "$FAILED" = "true" ]; then exit 1; fi

      - name: Run tests
        working-directory: packages/quality
        run: npx vitest run --reporter=verbose

      - name: Check shell scripts syntax
        working-directory: packages/quality
        run: |
          FAILED=0
          while IFS= read -r -d '' f; do
            ERROR_OUTPUT=$(bash -n "$f" 2>&1)
            if [ $? -eq 0 ]; then
              echo "  [OK] $f"
            else
              echo "  [FAIL] $f"
              echo "$ERROR_OUTPUT" | sed 's/^/     /'
              FAILED=1
            fi
          done < <(find . -name "*.sh" -type f -not -path "./node_modules/*" -print0)
          if [ "$FAILED" -eq 1 ]; then exit 1; fi
          echo "All shell scripts passed"

      - name: Check required documentation
        working-directory: packages/quality
        run: |
          FAILED=false
          for doc in README.md CHANGELOG.md; do
            [ -f "$doc" ] && echo "  [OK] $doc" || { echo "  [FAIL] $doc not found"; FAILED=true; }
          done
          DOC_COUNT=$(find docs/ -name "*.md" -type f 2>/dev/null | wc -l)
          [ "$DOC_COUNT" -gt 0 ] && echo "  [OK] docs/ contains $DOC_COUNT md files" || { echo "  [FAIL] docs/ empty"; FAILED=true; }
          if [ "$FAILED" = "true" ]; then exit 1; fi
          echo "Documentation check passed"

  # ─── Workflows L3: Validate / Structure / Gateway / Unit Tests ─────────

  workflows-l3:
    name: Workflows L3 Checks
    needs: [changes, detect-commit-type]
    if: needs.changes.outputs.workflows == 'true' && needs.detect-commit-type.outputs.should_run_l3 == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate JSON files
        working-directory: packages/workflows
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  JSON Validation"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          FAILED=false
          CRITICAL_JSON=(workflow-registry.json n8n/capability_mapping.json staff/workers.config.json)
          for f in "${CRITICAL_JSON[@]}"; do
            if [ ! -f "$f" ]; then
              echo "  [FAIL] $f not found"
              FAILED=true
              continue
            fi
            node -e "JSON.parse(require('fs').readFileSync('$f', 'utf8'))" 2>/dev/null \
              && echo "  [OK] $f" || { echo "  [FAIL] $f invalid JSON"; FAILED=true; }
          done
          while IFS= read -r -d '' f; do
            node -e "JSON.parse(require('fs').readFileSync('$f', 'utf8'))" 2>/dev/null \
              && echo "  [OK] $f" || { echo "  [FAIL] $f invalid JSON"; FAILED=true; }
          done < <(find n8n/workflows n8n/templates -name "*.json" -type f -print0 2>/dev/null)
          if [ "$FAILED" = "true" ]; then exit 1; fi

      - name: Validate YAML files
        working-directory: packages/workflows
        run: |
          YAML_FILES=(regression-contract.yaml)
          FAILED=false
          for f in "${YAML_FILES[@]}"; do
            if [ ! -f "$f" ]; then
              echo "  [FAIL] $f not found"
              FAILED=true
              continue
            fi
            python3 -c "import yaml; yaml.safe_load(open('$f'))" 2>/dev/null \
              && echo "  [OK] $f" || { echo "  [FAIL] $f invalid YAML"; FAILED=true; }
          done
          if [ "$FAILED" = "true" ]; then exit 1; fi

      - name: Check shell scripts syntax
        working-directory: packages/workflows
        run: |
          FAILED=0
          while IFS= read -r -d '' f; do
            ERROR_OUTPUT=$(bash -n "$f" 2>&1)
            if [ $? -eq 0 ]; then
              echo "  [OK] $f"
            else
              echo "  [FAIL] $f"
              echo "$ERROR_OUTPUT" | sed 's/^/     /'
              FAILED=1
            fi
          done < <(find . -name "*.sh" -type f -not -path "./node_modules/*" -print0)
          if [ "$FAILED" -eq 1 ]; then exit 1; fi

      - name: Check required directories and files
        working-directory: packages/workflows
        run: |
          FAILED=false
          REQUIRED_DIRS=(agents protocols n8n/workflows skills scripts gateway)
          for dir in "${REQUIRED_DIRS[@]}"; do
            [ -d "$dir" ] && echo "  [OK] $dir/" || { echo "  [FAIL] $dir/ not found"; FAILED=true; }
          done
          REQUIRED_FILES=(workflow-registry.json regression-contract.yaml staff/workers.config.json n8n/capability_mapping.json protocols/README.md)
          for f in "${REQUIRED_FILES[@]}"; do
            [ -f "$f" ] && echo "  [OK] $f" || { echo "  [FAIL] $f not found"; FAILED=true; }
          done
          for agent_dir in agents/*/; do
            agent_name=$(basename "$agent_dir")
            if [ -f "${agent_dir}SKILL.md" ]; then
              echo "  [OK] agents/$agent_name/SKILL.md"
            else
              echo "  [FAIL] agents/$agent_name/SKILL.md not found"
              FAILED=true
            fi
          done
          if [ "$FAILED" = "true" ]; then exit 1; fi
          echo "Structure check passed"

      - name: Check gateway syntax
        working-directory: packages/workflows
        run: |
          if [ -f "gateway/ai-gateway.cjs" ]; then
            node --check gateway/ai-gateway.cjs 2>&1 && echo "  [OK] gateway/ai-gateway.cjs" || { echo "  [FAIL] gateway/ai-gateway.cjs syntax errors"; exit 1; }
          fi
          for f in gateway/*.js gateway/*.cjs; do
            [ -f "$f" ] || continue
            [ "$f" = "gateway/ai-gateway.cjs" ] && continue
            node --check "$f" 2>&1 && echo "  [OK] $f" || { echo "  [FAIL] $f syntax errors"; exit 1; }
          done

      - name: Run weibo-publisher unit tests
        working-directory: packages/workflows
        run: |
          TESTS_DIR="skills/weibo-publisher/scripts/__tests__"
          FAILED=false
          for TEST_FILE in "$TESTS_DIR/utils.test.cjs" "$TESTS_DIR/cdp-client.test.cjs"; do
            [ -f "$TEST_FILE" ] || continue
            node --test "$TEST_FILE" && echo "  [OK] $TEST_FILE" || { echo "  [FAIL] $TEST_FILE"; FAILED=true; }
          done
          if [ "$FAILED" = "true" ]; then exit 1; fi

      - name: Run xiaohongshu-publisher unit tests
        working-directory: packages/workflows
        run: |
          TESTS_DIR="skills/xiaohongshu-publisher/scripts/__tests__"
          FAILED=false
          for TEST_FILE in "$TESTS_DIR/utils.test.cjs" "$TESTS_DIR/publish-xiaohongshu-image.test.cjs"; do
            [ -f "$TEST_FILE" ] || continue
            node --test "$TEST_FILE" && echo "  [OK] $TEST_FILE" || { echo "  [FAIL] $TEST_FILE"; FAILED=true; }
          done
          if [ "$FAILED" = "true" ]; then exit 1; fi

  # ─── Test Coverage Required (feat PR 必须带测试文件改动) ──────────────

  test-coverage-required:
    name: Test Coverage Required (feat only)
    needs: [detect-commit-type]
    if: needs.detect-commit-type.outputs.should_run_l3 == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for test file changes
        env:
          BASE_REF: ${{ github.base_ref }}
          EVENT_NAME: ${{ github.event_name }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          DETECTED_COMMIT_TYPE: ${{ needs.detect-commit-type.outputs.commit_type }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Test Coverage Required Gate"
          echo "  (feat PR 必须包含测试文件改动)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""

          # Fix 2: [CONFIG] 标签豁免加路径验证 — 必须真的改了 CI/引擎文件才允许豁免
          if echo "$PR_TITLE" | grep -q '\[CONFIG\]'; then
            CONFIG_CHANGES=0
            if [ -n "$BASE_REF" ]; then
              CONFIG_CHANGES=$(git diff --name-only "origin/${BASE_REF}...HEAD" 2>/dev/null | grep -cE '^\.github/workflows/|^packages/engine/(hooks|skills|scripts|config|contracts|package\.json|regression-contract\.yaml|\.hook-core-version|VERSION)|^scripts/devgate/' || true)
            fi
            if [ "$CONFIG_CHANGES" -gt "0" ]; then
              echo "ℹ️  检测到 [CONFIG] 标签且确认有 CI/引擎文件变更 ($CONFIG_CHANGES 个文件) — 跳过测试覆盖检查"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "  ✅ Test Coverage Required SKIPPED (CONFIG, verified)"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              exit 0
            else
              echo "⚠️  检测到 [CONFIG] 标签但未找到 CI/引擎文件变更 — 取消豁免，继续检查"
            fi
          fi

          # push/workflow_dispatch 场景：PR_TITLE 为空，从 commit message 判断
          # （PR_TITLE 只在 pull_request 事件中有值）
          if [ "$EVENT_NAME" = "push" ] || [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            COMMIT_MSG=$(git log HEAD -1 --format="%s" 2>/dev/null || echo "")
            echo "Commit message: $COMMIT_MSG"

            # Fix 2: [CONFIG] commit 豁免加路径验证 — 必须真的改了 CI/引擎文件
            if echo "$COMMIT_MSG" | grep -q '\[CONFIG\]'; then
              CONFIG_CHANGES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -cE '^\.github/workflows/|^packages/engine/(hooks|skills|scripts|config|contracts|package\.json|regression-contract\.yaml|\.hook-core-version|VERSION)|^scripts/devgate/' || true)
              if [ "$CONFIG_CHANGES" -gt "0" ]; then
                echo "ℹ️  检测到提交消息中的 [CONFIG] 标签且有 CI/引擎文件变更 ($CONFIG_CHANGES 个) — 跳过测试覆盖检查"
                echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                echo "  ✅ Test Coverage Required SKIPPED (CONFIG, verified)"
                echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                exit 0
              else
                echo "⚠️  检测到 [CONFIG] 标签但未找到 CI/引擎文件变更 — 取消豁免，继续检查"
              fi
            fi

            # 仅对 feat: 类型 commit 强制检查（忽略 [TAG] 前缀后提取 type）
            COMMIT_TYPE=$(echo "$COMMIT_MSG" | sed 's/^\[.*\] *//' | grep -oE '^[a-zA-Z]+' | head -1 | tr '[:upper:]' '[:lower:]' || echo "unknown")
            echo "Detected commit type: $COMMIT_TYPE"
            if [ "$COMMIT_TYPE" != "feat" ]; then
              echo "ℹ️  提交类型 '$COMMIT_TYPE' 不是 feat — 跳过测试覆盖检查"
              echo "   只有 feat: 类型的合并需要测试文件"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "  ✅ Test Coverage Required SKIPPED (non-feat commit)"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              exit 0
            fi
          fi

          # pull_request 事件路径：检查 commit type，非 feat 不强制要求测试文件
          if [ "$EVENT_NAME" = "pull_request" ]; then
            # 从 detect-commit-type job 传入的类型，或从 PR title 提取
            COMMIT_TYPE_PR="$DETECTED_COMMIT_TYPE"
            if [ -z "$COMMIT_TYPE_PR" ] || [ "$COMMIT_TYPE_PR" = "push" ] || [ "$COMMIT_TYPE_PR" = "manual" ]; then
              # fallback: 从 PR title 提取（去掉 [TAG] 前缀后取第一个字母段）
              COMMIT_TYPE_PR=$(echo "$PR_TITLE" | sed 's/^\[.*\] *//' | grep -oE '^[a-zA-Z]+' | head -1 | tr '[:upper:]' '[:lower:]' || echo "unknown")
            fi
            echo "PR commit type: $COMMIT_TYPE_PR"
            if [ "$COMMIT_TYPE_PR" != "feat" ]; then
              echo "ℹ️  PR commit type '$COMMIT_TYPE_PR' 不是 feat — 跳过测试覆盖检查"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "  ✅ Test Coverage Required SKIPPED (non-feat PR)"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              exit 0
            fi
          fi

          # 获取变更文件列表
          if [ "$EVENT_NAME" = "pull_request" ]; then
            CHANGED=$(git diff --name-only "origin/${BASE_REF}...HEAD")
          else
            # push 到 main 或 workflow_dispatch：检查最近一次 commit
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only HEAD)
          fi

          echo "Changed files:"
          echo "$CHANGED" | sed 's/^/  /'
          echo ""

          # 测试文件模式
          TEST_PATTERNS="\.test\.tsx$|\.spec\.tsx$|\.test\.ts$|\.test\.mts$|\.spec\.ts$|\.spec\.mts$|\.test\.js$|\.spec\.js$|\.test\.cjs$|\.spec\.cjs$|\.test\.mjs$|\.spec\.mjs$|^tests/|/__tests__/|_test\.py$|^test_.*\.sh$"

          # 查找测试文件变更
          TEST_FILES=$(echo "$CHANGED" | grep -E "$TEST_PATTERNS" || true)

          if [ -z "$TEST_FILES" ]; then
            echo "❌ ERROR: feat PR 必须包含测试文件改动，但未找到任何测试文件"
            echo ""
            echo "测试文件规范（以下任一格式均可）："
            echo "  *.test.ts / *.spec.ts         TypeScript 测试文件"
            echo "  *.test.js / *.spec.js         JavaScript 测试文件"
            echo "  *.test.cjs / *.spec.cjs       CommonJS 测试文件"
            echo "  *.test.mjs / *.spec.mjs       ES Module 测试文件"
            echo "  tests/**/*                    tests/ 目录下任意文件"
            echo "  **/__tests__/**/*             __tests__/ 目录下任意文件"
            echo "  *_test.py                     Python 测试文件"
            echo "  test_*.sh                     Shell 测试脚本"
            echo ""
            echo "修复方法："
            echo "  1. 为新功能添加对应的测试文件"
            echo "  2. 或在 PR 的 commit type 中使用 fix:/docs:/chore: 前缀（非 feat: 类型不强制要求测试）"
            echo "  3. 或在 PR title 加 [CONFIG] 标签（仅限 CI/引擎配置变更）"
            exit 1
          fi

          echo "✅ 找到测试文件改动："
          echo "$TEST_FILES" | sed 's/^/  ✓ /'
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅ Test Coverage Required PASSED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ─── Coverage Delta Check (feat PR 变更行覆盖率) ──────────────────────

  coverage-delta:
    name: Coverage Delta Check (feat only)
    needs: [detect-commit-type, changes]
    if: needs.detect-commit-type.outputs.should_run_l3 == 'true' && needs.detect-commit-type.outputs.commit_type == 'feat' && needs.changes.outputs.brain == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
    services:
      pgvector:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: cecelia
          POSTGRES_PASSWORD: cecelia_ci
          POSTGRES_DB: cecelia
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/brain/package-lock.json
      - run: cd packages/brain && npm ci
      - name: Run migrations
        run: |
          cd packages/brain
          for f in $(ls migrations/*.sql | sort); do
            echo "[APPLY] $(basename $f) ..."
            PGPASSWORD=cecelia_ci psql -h localhost -U cecelia -d cecelia -f "$f" > /dev/null 2>&1 || true
            echo "[DONE] $(basename $f)"
          done
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: cecelia
          DB_USER: cecelia
          DB_PASSWORD: cecelia_ci
      - name: Run coverage
        run: cd packages/brain && npm run test:coverage
        continue-on-error: true  # vitest generates coverage report even on test failures (reportOnFailure: true)
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: cecelia
          DB_USER: cecelia
          DB_PASSWORD: cecelia_ci
          ENV_REGION: us
          NODE_OPTIONS: --max-old-space-size=3072
      - name: Download Coverage Baseline
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: coverage-baseline
          path: /tmp/coverage-baseline
      - name: Coverage Delta Report
        uses: davelosert/vitest-coverage-report-action@v2
        continue-on-error: true
        with:
          working-directory: packages/brain
          vite-config-path: vitest.config.js
          name: Brain Coverage
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json
          json-summary-compare-path: /tmp/coverage-baseline/coverage-summary.json

  # ─── Coverage Baseline (push to main, 用于 PR 对比基线) ──────────────
  coverage-baseline:
    name: Update Coverage Baseline
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
    services:
      pgvector:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: cecelia
          POSTGRES_PASSWORD: cecelia_ci
          POSTGRES_DB: cecelia
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/brain/package-lock.json
      - run: cd packages/brain && npm ci
      - name: Run migrations
        run: |
          cd packages/brain
          for f in $(ls migrations/*.sql | sort); do
            PGPASSWORD=cecelia_ci psql -h localhost -U cecelia -d cecelia -f "$f" > /dev/null 2>&1 || true
          done
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: cecelia
          DB_USER: cecelia
          DB_PASSWORD: cecelia_ci
      - name: Run coverage
        run: cd packages/brain && npm run test:coverage
        continue-on-error: true  # OOM 保护：coverage worker 被 OOM 杀死时不阻塞 main push CI
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: cecelia
          DB_USER: cecelia
          DB_PASSWORD: cecelia_ci
          ENV_REGION: us
          NODE_OPTIONS: --max-old-space-size=3072
      - name: Upload coverage baseline
        uses: davelosert/vitest-coverage-report-action@v2
        continue-on-error: true  # coverage 文件不存在时（OOM 场景）graceful 跳过
        with:
          working-directory: packages/brain
          vite-config-path: vitest.config.js
          name: Brain Coverage
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json

  # ─── Gate job (always runs) ───────────────────────────────────────────

  l3-passed:
    name: L3 Code Gate Passed
    needs: [detect-commit-type, changes, brain-unit, engine-l3, workspace-l3, quality-l3, workflows-l3, test-coverage-required, coverage-delta]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: L3 Code Gate
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  L3 Code Gate"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # L3 跳过检查（commit type 不需要 L3 时，所有 L3 jobs 都是 skipped，视为通过）
          SHOULD_RUN_L3="${{ needs.detect-commit-type.outputs.should_run_l3 }}"
          if [ "$SHOULD_RUN_L3" = "false" ]; then
            echo "Commit type does not require L3 → L3 skipped, gate passes"
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  ✅ L3 Code Gate PASSED (L3 skipped by commit type)"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 0
          fi

          if [ "${{ needs.changes.result }}" = "failure" ]; then
            echo "FAIL: Detect Changes job failed"
            exit 1
          fi

          FAILED=false

          if [ "${{ needs.changes.outputs.brain }}" = "true" ]; then
            if [ "${{ needs.brain-unit.result }}" != "success" ]; then
              echo "FAIL: Brain Unit Tests (${{ needs.brain-unit.result }})"
              FAILED=true
            fi
          fi

          if [ "${{ needs.changes.outputs.engine }}" = "true" ]; then
            if [ "${{ needs.engine-l3.result }}" != "success" ]; then
              echo "FAIL: Engine L3 Code (${{ needs.engine-l3.result }})"
              FAILED=true
            fi
          fi

          if [ "${{ needs.changes.outputs.workspace }}" = "true" ]; then
            if [ "${{ needs.workspace-l3.result }}" != "success" ]; then
              echo "FAIL: Workspace L3 Build & Test (${{ needs.workspace-l3.result }})"
              FAILED=true
            fi
          fi

          if [ "${{ needs.changes.outputs.quality }}" = "true" ]; then
            if [ "${{ needs.quality-l3.result }}" != "success" ]; then
              echo "FAIL: Quality L3 Checks (${{ needs.quality-l3.result }})"
              FAILED=true
            fi
          fi

          if [ "${{ needs.changes.outputs.workflows }}" = "true" ]; then
            if [ "${{ needs.workflows-l3.result }}" != "success" ]; then
              echo "FAIL: Workflows L3 Checks (${{ needs.workflows-l3.result }})"
              FAILED=true
            fi
          fi

          # test-coverage-required 检查（feat PR 必须带测试）
          # Fix: 与其他检查统一使用 != "success"，确保 skipped 状态也被捕获
          if [ "${{ needs.test-coverage-required.result }}" != "success" ]; then
            echo "FAIL: Test Coverage Required (${{ needs.test-coverage-required.result }})"
            FAILED=true
          fi

          # coverage-delta 检查（feat PR + brain 变更时，覆盖率必须满足阈值）
          # 已换用 davelosert/vitest-coverage-report-action@v2，兼容 vitest json-summary 输出
          # 阈值在 packages/brain/vitest.config.js 中定义（75/75/80/75）
          # Fix: 使用 != "success" 确保 skipped 状态也被捕获
          if [ "${{ needs.changes.outputs.brain }}" = "true" ] && [ "${{ needs.detect-commit-type.outputs.commit_type }}" = "feat" ]; then
            if [ "${{ needs.coverage-delta.result }}" != "success" ]; then
              echo "FAIL: Coverage Delta Check (${{ needs.coverage-delta.result }}) — coverage below threshold or test error"
              FAILED=true
            fi
          fi

          if [ "$FAILED" = "true" ]; then
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  ❌ L3 Code Gate FAILED"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅ L3 Code Gate PASSED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
