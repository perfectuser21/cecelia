name: Brain Auto Deploy

on:
  push:
    branches: [main]

concurrency:
  group: brain-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─── 变更检测 ────────────────────────────────────────────────────────────
  changes:
    name: Detect Brain Changes
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      brain: ${{ steps.filter.outputs.brain }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            brain:
              - 'packages/brain/**'
              - 'scripts/brain-deploy.sh'

  # ─── Gate 3: 自动 SSH Deploy ─────────────────────────────────────────────
  deploy-brain:
    name: Deploy Brain (Gate 3)
    needs: changes
    if: needs.changes.outputs.brain == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: SSH Deploy to Mac mini
        uses: appleboy/ssh-action@v1
        with:
          host: 38.23.47.81
          username: administrator
          key: ${{ secrets.BRAIN_DEPLOY_SSH_KEY }}
          port: 22
          command_timeout: 9m
          script: |
            set -euo pipefail
            cd /Users/administrator/perfect21/cecelia
            echo "=== git pull origin main ==="
            git pull origin main
            echo "=== brain-deploy.sh ==="
            bash scripts/brain-deploy.sh
            echo "=== Deploy complete ==="

      - name: Post-deploy smoke — Brain health check
        run: |
          echo "等待 Brain 启动（10s）..."
          sleep 10
          echo "运行 post-deploy smoke..."

          HTTP_CODE=$(curl -s -o /tmp/health_resp.txt -w "%{http_code}" \
            http://38.23.47.81:5221/api/brain/health \
            --connect-timeout 15 --max-time 30 2>/dev/null || echo "000")

          echo "HTTP 状态码: $HTTP_CODE"
          if [ -f /tmp/health_resp.txt ]; then
            echo "响应内容:"
            cat /tmp/health_resp.txt
          fi

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Smoke 失败 — HTTP $HTTP_CODE（期望 200）"
            exit 1
          fi

          BODY=$(cat /tmp/health_resp.txt 2>/dev/null || echo "")
          if ! echo "$BODY" | grep -q '"status":"ok"'; then
            echo "::error::Smoke 失败 — 响应未含 \"status\":\"ok\""
            echo "实际响应: $BODY"
            exit 1
          fi

          echo "✅ Post-deploy smoke 通过 — Brain 健康"

  # ─── Gate 2: Deploy 失败时自动创建 Revert PR + P0 告警 ───────────────────
  on-deploy-failure:
    name: Auto Revert on Failure (Gate 2)
    needs: deploy-brain
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BRAIN_URL: http://38.23.47.81:5221
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 配置 Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 创建 Revert 并 Push
        id: revert
        run: |
          BRANCH="revert-brain-$(date +%Y%m%d%H%M)"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

          git checkout -b "$BRANCH"
          git revert HEAD --no-edit
          git push origin "$BRANCH"

          echo "✅ Revert 分支已推送: $BRANCH"

      - name: 创建 Revert PR
        id: create_pr
        run: |
          BRANCH="${{ steps.revert.outputs.branch }}"
          FAILED_SHA="${{ github.sha }}"
          FAILED_SHA_SHORT="${FAILED_SHA:0:7}"

          PR_URL=$(gh pr create \
            --title "[AUTO-REVERT] Brain deploy smoke 失败 — revert $FAILED_SHA_SHORT" \
            --body "## 自动 Revert PR

          **触发原因：** Brain post-deploy smoke 失败（commit \`$FAILED_SHA_SHORT\`）

          **失败详情：**
          - Commit: \`$FAILED_SHA\`
          - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          **操作：** 请检查 smoke 失败原因后合并此 PR 回滚，或修复后重新部署。

          > 此 PR 由 CI Gate 2 自动创建。" \
            --head "$BRANCH" \
            --base main)

          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
          echo "✅ Revert PR 已创建: $PR_URL"

      - name: 创建 Brain P0 告警任务
        run: |
          FAILED_SHA="${{ github.sha }}"
          PR_URL="${{ steps.create_pr.outputs.pr_url }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -s -X POST "${BRAIN_URL}/api/brain/tasks" \
            -H "Content-Type: application/json" \
            -d "{
              \"title\": \"[P0] Brain deploy smoke 失败 — ${FAILED_SHA:0:7}\",
              \"description\": \"CI Gate 2 触发：post-deploy smoke 失败。\\nCommit: ${FAILED_SHA}\\nWorkflow: ${RUN_URL}\\nRevert PR: ${PR_URL}\",
              \"priority\": \"p0\",
              \"status\": \"todo\",
              \"labels\": [\"deploy-failure\", \"auto-revert\", \"p0\"]
            }" || echo "::warning::Brain API 告警任务创建失败（Brain 可能已离线）"

          echo "✅ Brain P0 告警任务已创建（或尝试创建）"
