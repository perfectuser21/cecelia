name: L4 Runtime Gate

# L4: 运行时集成测试 — Brain 变动时必跑（~15min，4 shards 并行）
# 职责：PostgreSQL 真实环境 + 完整集成测试 + GoldenPath E2E
# 运行环境：ubuntu-latest（PGDG apt 安装 PostgreSQL 17 + pgvector）
# 优化：动态端口（GITHUB_RUN_ID 派生）消除并发冲突，去掉全局 mutex，允许 2 个 L4 同时运行

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      brain: ${{ steps.filter.outputs.brain }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect brain changes
        id: filter
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.event.after }}"
          if [ "${{ github.event_name }}" = "push" ]; then
            # R2: push 事件用实际 diff（不再全量 true）
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              echo "brain=true" >> $GITHUB_OUTPUT
            else
              CHANGED=$(git diff --name-only "$BEFORE" "$AFTER" 2>/dev/null || git diff --name-only HEAD~1 HEAD)
              echo "$CHANGED" | grep -qE "^packages/brain/|^\.brain-versions$" \
                && echo "brain=true" >> $GITHUB_OUTPUT || echo "brain=false" >> $GITHUB_OUTPUT
            fi
            exit 0
          fi
          BASE_REF="${{ github.base_ref }}"
          if git diff --name-only "origin/${BASE_REF}...HEAD" | grep -qE "^packages/brain/|^\.brain-versions$"; then
            echo "brain=true" >> $GITHUB_OUTPUT
          else
            echo "brain=false" >> $GITHUB_OUTPUT
          fi


  # ─── Brain L4: Integration Tests (ubuntu + PostgreSQL 17, 4 shards parallel) ──

  brain-integration:
    name: Brain Integration (Shard ${{ matrix.shard }})
    needs: changes
    if: needs.changes.outputs.brain == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read

    strategy:
      matrix:
        include:
          - shard: "1/4"
            shard_num: 1
          - shard: "2/4"
            shard_num: 2
          - shard: "3/4"
            shard_num: 3
          - shard: "4/4"
            shard_num: 4
      fail-fast: false

    env:
      DB_HOST: localhost
      DB_NAME: cecelia
      DB_USER: cecelia
      DB_PASSWORD: cecelia_ci
      ENV_REGION: us
      PGPASSWORD: cecelia_ci

    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL 17 + pgvector (PGDG)
        run: |
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates gnupg lsb-release
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/postgresql-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql-keyring.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-17 postgresql-17-pgvector
          echo "/usr/lib/postgresql/17/bin" >> $GITHUB_PATH
          sudo systemctl stop postgresql || true

      - name: Set up PostgreSQL (dynamic port)
        run: |
          export PATH="/usr/lib/postgresql/17/bin:$PATH"
          SHARD_NUM="${{ matrix.shard_num }}"
          BASE_PORT=$(( 5500 + (GITHUB_RUN_ID % 100) * 4 ))
          DB_PORT=$(( BASE_PORT + SHARD_NUM - 1 ))
          PG_DATA="/tmp/pgdata-${GITHUB_RUN_ID}-${SHARD_NUM}"
          echo "DB_PORT=${DB_PORT}" >> $GITHUB_ENV
          echo "PG_DATA=${PG_DATA}" >> $GITHUB_ENV
          echo "PostgreSQL port: $DB_PORT, data dir: $PG_DATA"
          initdb -D "$PG_DATA" --username=$(whoami)
          echo "dynamic_shared_memory_type = mmap" >> "$PG_DATA/postgresql.conf"
          echo "unix_socket_directories = '/tmp'" >> "$PG_DATA/postgresql.conf"
          pg_ctl -w -D "$PG_DATA" -l "/tmp/pg-${DB_PORT}.log" -o "-p ${DB_PORT}" start
          createuser --superuser cecelia -h localhost -p "$DB_PORT" 2>/dev/null || true
          psql -h localhost -p "$DB_PORT" -c "ALTER USER cecelia PASSWORD 'cecelia_ci';" postgres
          createdb -U cecelia cecelia -h localhost -p "$DB_PORT" 2>/dev/null || true
          psql -U cecelia -d cecelia -h localhost -p "$DB_PORT" -c "CREATE EXTENSION IF NOT EXISTS vector;" 2>/dev/null || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/brain/package-lock.json

      - name: Install dependencies
        working-directory: packages/brain
        run: npm ci

      - name: Run migrations
        working-directory: packages/brain
        env:
          DB_PORT: ${{ env.DB_PORT }}
        run: node src/migrate.js

      - name: Run Brain tests (Shard ${{ matrix.shard }})
        working-directory: packages/brain
        env:
          NODE_OPTIONS: "--max-old-space-size=3072"
          DB_PORT: ${{ env.DB_PORT }}
        run: |
          set +e
          SHARD="${{ matrix.shard }}"
          SHARD_FILE="/tmp/brain-shard-${SHARD//\//-}.txt"
          npx vitest run --shard="$SHARD" --exclude='src/__tests__/blocks.test.js' --reporter=verbose 2>&1 | tee "$SHARD_FILE"
          SHARD_FAILED=$(grep "Test Files" "$SHARD_FILE" | grep -oE "[0-9]+ failed" | awk '{print $1}' | tail -1)
          SHARD_FAILED=${SHARD_FAILED:-0}
          BASELINE=0
          if [ -f "ci/brain-integration-baseline.txt" ]; then
            TOTAL_BASELINE=$(cat ci/brain-integration-baseline.txt | tr -d '[:space:]')
            MAX_BASELINE=10
            if [ "$TOTAL_BASELINE" -gt "$MAX_BASELINE" ]; then
              echo "❌ Brain integration baseline too high: $TOTAL_BASELINE > MAX_BASELINE=$MAX_BASELINE"
              exit 1
            fi
            BASELINE=$(( (TOTAL_BASELINE + 3) / 4 ))
          fi
          echo "📊 Shard $SHARD: $SHARD_FAILED failures (baseline: $BASELINE)"
          if [ "$SHARD_FAILED" -le "$BASELINE" ]; then
            exit 0
          fi
          exit 1

      - name: GoldenPath E2E
        if: matrix.shard == '1/4'
        working-directory: packages/brain
        env:
          DB_PORT: ${{ env.DB_PORT }}
        run: bash scripts/goldenpath-check.sh

      - name: Task Lifecycle E2E
        if: matrix.shard == '1/4'
        working-directory: packages/brain
        env:
          DB_PORT: ${{ env.DB_PORT }}
          BRAIN_PORT: 15222
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  L4 Task Lifecycle E2E — 创建→dispatch→完成全链路"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          BRAIN_PORT=15222 PORT=15222 node server.js > /tmp/brain-lifecycle.log 2>&1 &
          LIFECYCLE_PID=$!
          trap "kill $LIFECYCLE_PID 2>/dev/null || true" EXIT
          for i in $(seq 1 30); do
            if curl -sf "http://localhost:15222/" >/dev/null 2>&1; then
              echo "Brain ready after ${i}s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Brain did not start in 30s"
              cat /tmp/brain-lifecycle.log
              exit 1
            fi
            sleep 1
          done
          bash scripts/task-lifecycle-check.sh

      - name: API Smoke Check
        if: matrix.shard == '1/4'
        working-directory: packages/brain
        env:
          DB_PORT: ${{ env.DB_PORT }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  API Smoke Check — Brain 基础 API 健康验证"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          BRAIN_PORT=15221
          BRAIN_PORT=$BRAIN_PORT PORT=$BRAIN_PORT node server.js &
          BRAIN_PID=$!
          echo "Brain PID: $BRAIN_PID, Port: $BRAIN_PORT"
          for i in $(seq 1 60); do
            if curl -sf "http://localhost:${BRAIN_PORT}/" >/dev/null 2>&1; then
              echo "✅ Brain 服务已就绪（第 ${i} 次检查）"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "❌ Brain 服务启动超时（60s）"
              kill $BRAIN_PID 2>/dev/null || true
              exit 1
            fi
            sleep 1
          done
          echo ""
          echo "--- 检查 1: GET / (Brain Root Health) ---"
          curl -sf "http://localhost:${BRAIN_PORT}/" || { echo "❌ / 失败"; kill $BRAIN_PID; exit 1; }
          echo ""
          echo "✅ / OK"
          echo ""
          echo "--- 检查 2: GET /api/brain/tasks ---"
          TASKS_RESP=$(curl -s -w "\n%{http_code}" "http://localhost:${BRAIN_PORT}/api/brain/tasks?status=pending&limit=5")
          TASKS_STATUS=$(echo "$TASKS_RESP" | tail -1)
          TASKS_BODY=$(echo "$TASKS_RESP" | head -n -1)
          echo "HTTP $TASKS_STATUS: $(echo "$TASKS_BODY" | head -c 200)"
          if [ "$TASKS_STATUS" != "200" ]; then
            echo "❌ /api/brain/tasks 失败 (HTTP $TASKS_STATUS)"
            kill $BRAIN_PID 2>/dev/null || true
            exit 1
          fi
          echo "✅ /api/brain/tasks OK"
          echo ""
          echo "--- 检查 3: POST /api/brain/tasks（smoke test 任务）---"
          curl -sf -X POST "http://localhost:${BRAIN_PORT}/api/brain/tasks" \
            -H "Content-Type: application/json" \
            -d '{"title":"CI API Smoke Test","description":"CI smoke test","trigger_source":"ci","task_type":"dev"}' \
            || { echo "❌ POST /api/brain/tasks 失败"; kill $BRAIN_PID; exit 1; }
          echo ""
          echo "✅ POST /api/brain/tasks OK"
          echo ""
          kill $BRAIN_PID 2>/dev/null || true
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅ API Smoke Check PASSED（3/3 端点正常）"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Stop PostgreSQL (always cleanup)
        if: always()
        run: |
          export PATH="/usr/lib/postgresql/17/bin:$PATH"
          if [ -n "$PG_DATA" ] && [ -d "$PG_DATA" ]; then
            pg_ctl stop -D "$PG_DATA" -m immediate 2>/dev/null || true
            rm -rf "$PG_DATA" 2>/dev/null || true
          fi

  # ─── DevGate Quality Checks ────────────────────────────────────────────────

  devgate-checks:
    name: L4 DevGate Quality Checks
    needs: [changes, brain-integration]
    if: needs.changes.outputs.brain == 'true' && needs.brain-integration.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/engine/package-lock.json

      - name: Install engine dependencies
        run: |
          cd packages/engine
          npm ci --ignore-scripts

      - name: Run L4 DoD Verification Check
        env:
          GITHUB_HEAD_REF: ${{ github.head_ref }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  L4 DevGate: DoD Verification (Branch: $GITHUB_HEAD_REF)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          node packages/engine/scripts/devgate/check-dod-mapping.cjs

      - name: Run L4 RCI Runtime Verification
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  L4 DevGate: RCI Runtime Verification"
          echo "  运行时回归契约验证（运行环境相关）"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          bash packages/engine/scripts/devgate/rci-execution-gate.sh

  # ─── Gate job (always runs) ────────────────────────────────────────────────

  l4-passed:
    name: L4 Runtime Gate Passed
    needs: [changes, brain-integration, devgate-checks]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: L4 Runtime Gate
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  L4 Runtime Gate"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          if [ "${{ needs.changes.result }}" = "failure" ]; then
            echo "FAIL: Detect Changes job failed"
            exit 1
          fi

          FAILED=false

          if [ "${{ needs.changes.outputs.brain }}" = "true" ]; then
            if [ "${{ needs.brain-integration.result }}" != "success" ]; then
              echo "FAIL: Brain Integration Tests (${{ needs.brain-integration.result }})"
              FAILED=true
            fi
            if [ "${{ needs.devgate-checks.result }}" != "success" ]; then
              echo "FAIL: DevGate Quality Checks (${{ needs.devgate-checks.result }})"
              FAILED=true
            fi
          fi

          if [ "$FAILED" = "true" ]; then
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  ❌ L4 Runtime Gate FAILED"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi

          if [ "${{ needs.changes.outputs.brain }}" != "true" ]; then
            echo "No brain changes detected — L4 fast-pass"
          fi

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅ L4 Runtime Gate PASSED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
