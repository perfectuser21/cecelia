name: L4 Runtime Gate

# L4: 运行时集成测试 — Brain 变动时必跑（30min）
# 职责：PostgreSQL 真实环境 + 完整集成测试 + Coverage 门禁 + GoldenPath E2E
# 运行环境：macos-latest（PostgreSQL@17 通过 Homebrew 安装）
# 迁移自：brain-ci.yml (brain-integration)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: l4-runtime-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      brain: ${{ steps.filter.outputs.brain }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect brain changes
        id: filter
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.event.after }}"
          if [ "${{ github.event_name }}" = "push" ]; then
            # R2: push 事件用实际 diff（不再全量 true）
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              echo "brain=true" >> $GITHUB_OUTPUT
            else
              CHANGED=$(git diff --name-only "$BEFORE" "$AFTER" 2>/dev/null || git diff --name-only HEAD~1 HEAD)
              echo "$CHANGED" | grep -qE "^packages/brain/|^DEFINITION\.md$|^\.brain-versions$" \
                && echo "brain=true" >> $GITHUB_OUTPUT || echo "brain=false" >> $GITHUB_OUTPUT
            fi
            exit 0
          fi
          BASE_REF="${{ github.base_ref }}"
          if git diff --name-only "origin/${BASE_REF}...HEAD" | grep -qE "^packages/brain/|^DEFINITION\.md$|^\.brain-versions$"; then
            echo "brain=true" >> $GITHUB_OUTPUT
          else
            echo "brain=false" >> $GITHUB_OUTPUT
          fi

  # ─── Brain L4: Integration Tests + Coverage (macos + PostgreSQL) ───────

  brain-integration:
    name: Brain Integration Tests (PostgreSQL + Coverage)
    needs: changes
    if: needs.changes.outputs.brain == 'true'
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: read

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: cecelia
      DB_USER: cecelia
      DB_PASSWORD: cecelia_ci
      ENV_REGION: us
      PGPASSWORD: cecelia_ci

    steps:
      - uses: actions/checkout@v4

      - name: Cache Homebrew packages
        id: cache-brew
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew/downloads
            /opt/homebrew/Cellar/postgresql@17
            /opt/homebrew/Cellar/pgvector
            /opt/homebrew/opt/postgresql@17
            /opt/homebrew/opt/pgvector
            /opt/homebrew/lib/postgresql@17
            /opt/homebrew/include/postgresql@17
            /opt/homebrew/share/postgresql@17
            /opt/homebrew/share/pgvector
          key: brew-postgresql17-pgvector-${{ runner.os }}-${{ runner.arch }}-v2

      - name: Install Homebrew packages (if not cached)
        if: steps.cache-brew.outputs.cache-hit != 'true'
        run: |
          brew install postgresql@17
          brew install pgvector

      - name: Link Homebrew packages (if cached)
        if: steps.cache-brew.outputs.cache-hit == 'true'
        run: |
          brew link postgresql@17 --force 2>/dev/null || true
          brew link pgvector --force 2>/dev/null || true

      - name: Set up PostgreSQL
        run: |
          export PATH="$(brew --prefix postgresql@17)/bin:$PATH"
          echo "initdb path: $(which initdb 2>/dev/null || echo 'NOT FOUND')"
          echo "pg_ctl path: $(which pg_ctl 2>/dev/null || echo 'NOT FOUND')"
          # Check if PostgreSQL is already running (e.g. from a cached runner state)
          if pg_isready -h localhost -p 5432 2>/dev/null; then
            echo "PostgreSQL already running on port 5432, skipping initialization"
          else
            # Initialize new PostgreSQL instance (expose errors, no silent suppression)
            if [ ! -d /tmp/pgdata ]; then
              initdb -D /tmp/pgdata --username=$(whoami)
            else
              echo "/tmp/pgdata already exists, skipping initdb"
            fi
            pg_ctl -D /tmp/pgdata -l /tmp/pg.log start
            # Wait for PostgreSQL to be ready
            for i in $(seq 1 30); do
              if pg_isready -h localhost -p 5432 2>/dev/null; then
                echo "PostgreSQL is ready"
                break
              fi
              echo "Waiting for PostgreSQL... ($i/30)"
              sleep 1
            done
          fi
          # Create CI user and database (connect as current OS user which is the superuser)
          createuser --superuser cecelia 2>/dev/null || true
          psql -c "ALTER USER cecelia PASSWORD 'cecelia_ci';" postgres
          createdb -U cecelia cecelia 2>/dev/null || true
          # pgvector extension (installed by previous brew step)
          psql -U cecelia -d cecelia -c "CREATE EXTENSION IF NOT EXISTS vector;" 2>/dev/null || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/brain/package-lock.json

      - name: Install dependencies
        working-directory: packages/brain
        run: npm ci

      - name: Run migrations
        working-directory: packages/brain
        run: node src/migrate.js

      - name: Run Brain tests — failure detection (no coverage, low memory)
        working-directory: packages/brain
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          set +e
          # Phase 1: Run tests WITHOUT coverage to accurately detect failures.
          # v8 coverage + isolate:true OOM-crashes the fork mid-run, causing false failures.
          # Separating failure detection from coverage collection fixes this.
          npx vitest run --exclude='src/__tests__/blocks.test.js' --reporter=verbose 2>&1 | tee /tmp/brain-integration-output.txt
          EXIT_CODE=${PIPESTATUS[0]}

          # Read baseline for pre-existing test failures (not introduced by this PR)
          BASELINE=0
          if [ -f "ci/brain-integration-baseline.txt" ]; then
            BASELINE=$(cat ci/brain-integration-baseline.txt | tr -d '[:space:]')
            echo "📋 Brain integration baseline: $BASELINE pre-existing failures allowed"
          fi

          # Count failures from vitest summary line
          FAILED_COUNT=$(grep -oE "[0-9]+ failed" /tmp/brain-integration-output.txt | awk '{print $1}' | tail -1)
          FAILED_COUNT=${FAILED_COUNT:-0}
          echo "📊 Brain integration tests: $FAILED_COUNT failures (baseline: $BASELINE)"

          if [ "$FAILED_COUNT" -le "$BASELINE" ]; then
            echo "✅ Failures ($FAILED_COUNT) ≤ baseline ($BASELINE)"
            exit 0
          fi

          echo "❌ Failures ($FAILED_COUNT) > baseline ($BASELINE) — new failures detected!"
          exit 1

      - name: Run Brain coverage thresholds
        working-directory: packages/brain
        env:
          NODE_OPTIONS: "--max-old-space-size=6144"
        run: |
          set +e
          # Phase 2: Run with coverage only to check thresholds.
          # OOM during this phase is acceptable (all tests already passed in Phase 1).
          npx vitest run --exclude='src/__tests__/blocks.test.js' --reporter=dot --coverage 2>&1 | tee /tmp/brain-coverage-output.txt
          EXIT_CODE=${PIPESTATUS[0]}

          if grep -q "Coverage threshold" /tmp/brain-coverage-output.txt; then
            echo "❌ Coverage threshold not met — failing CI (HARD GATE)"
            exit 1
          fi

          if [ $EXIT_CODE -ne 0 ]; then
            echo "⚠️  Coverage run exited $EXIT_CODE (likely OOM during cleanup — tests already verified in Phase 1)"
          fi
          exit 0

      - name: GoldenPath E2E
        working-directory: packages/brain
        run: bash scripts/goldenpath-check.sh

  # ─── Gate job (always runs) ───────────────────────────────────────────

  l4-passed:
    name: L4 Runtime Gate Passed
    needs: [changes, brain-integration]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: L4 Runtime Gate
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  L4 Runtime Gate"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          if [ "${{ needs.changes.result }}" = "failure" ]; then
            echo "FAIL: Detect Changes job failed"
            exit 1
          fi

          FAILED=false

          if [ "${{ needs.changes.outputs.brain }}" = "true" ]; then
            if [ "${{ needs.brain-integration.result }}" != "success" ]; then
              echo "FAIL: Brain Integration Tests (${{ needs.brain-integration.result }})"
              FAILED=true
            fi
          fi

          if [ "$FAILED" = "true" ]; then
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  ❌ L4 Runtime Gate FAILED"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi

          if [ "${{ needs.changes.outputs.brain }}" != "true" ]; then
            echo "No brain changes detected — L4 fast-pass"
          fi

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅ L4 Runtime Gate PASSED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
