name: L4 Runtime Gate

# L4: 运行时集成测试 — Brain 变动时必跑（~15min，4 shards 并行）
# 职责：PostgreSQL 真实环境 + 完整集成测试 + GoldenPath E2E
# 运行环境：ubuntu-latest（apt PostgreSQL + pgvector 编译安装）
# 优化：动态端口（GITHUB_RUN_ID 派生）消除并发冲突，去掉全局 mutex，允许 2 个 L4 同时运行

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      brain: ${{ steps.filter.outputs.brain }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect brain changes
        id: filter
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.event.after }}"
          if [ "${{ github.event_name }}" = "push" ]; then
            # R2: push 事件用实际 diff（不再全量 true）
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              echo "brain=true" >> $GITHUB_OUTPUT
            else
              CHANGED=$(git diff --name-only "$BEFORE" "$AFTER" 2>/dev/null || git diff --name-only HEAD~1 HEAD)
              echo "$CHANGED" | grep -qE "^packages/brain/|^\.brain-versions$" \
                && echo "brain=true" >> $GITHUB_OUTPUT || echo "brain=false" >> $GITHUB_OUTPUT
            fi
            exit 0
          fi
          BASE_REF="${{ github.base_ref }}"
          if git diff --name-only "origin/${BASE_REF}...HEAD" | grep -qE "^packages/brain/|^\.brain-versions$"; then
            echo "brain=true" >> $GITHUB_OUTPUT
          else
            echo "brain=false" >> $GITHUB_OUTPUT
          fi

  # ─── Brain L4: Integration Tests (ubuntu + PostgreSQL, 4 shards parallel) ──

  brain-integration:
    name: Brain Integration (Shard ${{ matrix.shard }})
    needs: changes
    if: needs.changes.outputs.brain == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read

    strategy:
      # 4 shards 并行，端口由 Set up PostgreSQL step 动态计算（基于 GITHUB_RUN_ID）
      # 公式：5500 + (run_id % 100) * 4 + (shard_num - 1)，范围 5500~5896
      # 不同 run 的端口区间不重叠，允许 2 个 L4 并发运行
      matrix:
        include:
          - shard: "1/4"
            shard_num: 1
          - shard: "2/4"
            shard_num: 2
          - shard: "3/4"
            shard_num: 3
          - shard: "4/4"
            shard_num: 4
      fail-fast: false

    env:
      DB_HOST: localhost
      DB_NAME: cecelia
      DB_USER: cecelia
      DB_PASSWORD: cecelia_ci
      ENV_REGION: us
      PGPASSWORD: cecelia_ci

    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL 17 + pgvector (PGDG apt)
        run: |
          # PGDG 仓库提供 PG17 + pgvector 预编译包，避免编译依赖冲突
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates gnupg lsb-release
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/postgresql-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql-keyring.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-17 postgresql-17-pgvector
          PG_VERSION=17
          echo "PG_VERSION=${PG_VERSION}" >> $GITHUB_ENV
          echo "/usr/lib/postgresql/${PG_VERSION}/bin" >> $GITHUB_PATH
          sudo systemctl stop postgresql || true

      - name: Stop system PostgreSQL + clean up stale CI PostgreSQL
        run: |
          # 先停止 ubuntu 自带的 PostgreSQL 服务（避免占用端口/资源）
          sudo systemctl stop postgresql 2>/dev/null || true
          # 清理上次 CI 运行遗留的 PostgreSQL 进程（防止资源泄漏）
          for pgdir in /tmp/pgdata-*; do
            if [ -d "$pgdir" ] && ! echo "$pgdir" | grep -q "pgdata-${GITHUB_RUN_ID}"; then
              echo "Stopping stale postgres: $pgdir"
              pg_ctl stop -D "$pgdir" -m immediate 2>/dev/null || true
              rm -rf "$pgdir" 2>/dev/null || true
            fi
          done
          # 清理上次 run 遗留的 postgres 进程（跳过当前 run 的端口区间）
          CUR_BASE=$(( 5500 + (GITHUB_RUN_ID % 100) * 4 ))
          CUR_P0=$CUR_BASE; CUR_P1=$((CUR_BASE+1)); CUR_P2=$((CUR_BASE+2)); CUR_P3=$((CUR_BASE+3))
          for port in $(seq 5500 5896); do
            if [ "$port" -eq "$CUR_P0" ] || [ "$port" -eq "$CUR_P1" ] || [ "$port" -eq "$CUR_P2" ] || [ "$port" -eq "$CUR_P3" ]; then
              continue
            fi
            PIDS=$(sudo lsof -ti:$port 2>/dev/null) || true
            if [ -n "$PIDS" ]; then
              echo "Killing stale postgres on port $port: PIDs $PIDS"
              echo "$PIDS" | xargs sudo kill -9 2>/dev/null || true
            fi
          done
          # 清理 System V 共享内存段（linux）
          BEFORE=$(ipcs -m 2>/dev/null | grep -c "^0x" || echo "0")
          echo "sysv shm segments before cleanup: $BEFORE"
          for id in $(ipcs -m 2>/dev/null | grep '^0x' | awk '{print $2}' | grep '^[0-9]'); do
            echo "Removing sysv shm segment: $id"
            ipcrm -m "$id" 2>/dev/null || true
          done
          AFTER=$(ipcs -m 2>/dev/null | grep -c "^0x" || echo "0")
          echo "sysv shm segments after cleanup: $AFTER"

      - name: Set up PostgreSQL (dynamic port)
        run: |
          export PATH="/usr/lib/postgresql/${PG_VERSION}/bin:$PATH"
          # 动态端口：5500 + (run_id % 100) * 4 + (shard_num - 1)
          # 100 个 slot × 4 端口，范围 5500~5896，不与生产 DB(5432) 冲突
          SHARD_NUM="${{ matrix.shard_num }}"
          BASE_PORT=$(( 5500 + (GITHUB_RUN_ID % 100) * 4 ))
          DB_PORT=$(( BASE_PORT + SHARD_NUM - 1 ))
          PG_DATA="/tmp/pgdata-${GITHUB_RUN_ID}-${SHARD_NUM}"
          # 导出给后续 steps
          echo "DB_PORT=${DB_PORT}" >> $GITHUB_ENV
          echo "PG_DATA=${PG_DATA}" >> $GITHUB_ENV
          echo "PostgreSQL port: $DB_PORT, data dir: $PG_DATA (run_id: $GITHUB_RUN_ID)"
          if pg_isready -h localhost -p "$DB_PORT" 2>/dev/null; then
            echo "PostgreSQL already running on port $DB_PORT, skipping initialization"
          else
            if [ ! -d "$PG_DATA" ]; then
              initdb -D "$PG_DATA" --username=$(whoami)
              # Use mmap instead of posix shm to avoid SHMMNI exhaustion
              # posix shm objects can persist across failed runs; mmap uses temp files (safer)
              echo "dynamic_shared_memory_type = mmap" >> "$PG_DATA/postgresql.conf"
            else
              echo "$PG_DATA already exists, skipping initdb"
            fi
            pg_ctl -w -D "$PG_DATA" -l "/tmp/pg-${DB_PORT}.log" -o "-p ${DB_PORT}" start
            for i in $(seq 1 30); do
              if pg_isready -h localhost -p "$DB_PORT" 2>/dev/null; then
                echo "PostgreSQL is ready on port $DB_PORT"
                break
              fi
              echo "Waiting for PostgreSQL... ($i/30)"
              sleep 1
            done
          fi
          createuser --superuser cecelia -p "$DB_PORT" 2>/dev/null || true
          psql -p "$DB_PORT" -c "ALTER USER cecelia PASSWORD 'cecelia_ci';" postgres
          createdb -U cecelia cecelia -p "$DB_PORT" 2>/dev/null || true
          psql -U cecelia -d cecelia -p "$DB_PORT" -c "CREATE EXTENSION IF NOT EXISTS vector;" 2>/dev/null || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/brain/package-lock.json

      - name: Install dependencies
        working-directory: packages/brain
        run: npm ci

      - name: Verify PostgreSQL ready before migrate
        run: |
          export PATH="/usr/lib/postgresql/${PG_VERSION}/bin:$PATH"
          echo "DB_PORT=$DB_PORT (from GITHUB_ENV)"
          echo "DB_HOST=$DB_HOST DB_NAME=$DB_NAME DB_USER=$DB_USER"
          # 防御：如果 DB_PORT 为空，说明 GITHUB_ENV 传递失败
          if [ -z "$DB_PORT" ]; then
            echo "⚠ DB_PORT is empty — GITHUB_ENV propagation failed"
            echo "Recalculating from GITHUB_RUN_ID=$GITHUB_RUN_ID shard=${{ matrix.shard_num }}"
            DB_PORT=$(( 5500 + (GITHUB_RUN_ID % 100) * 4 + ${{ matrix.shard_num }} - 1 ))
            echo "DB_PORT=${DB_PORT}" >> $GITHUB_ENV
            echo "Recovered DB_PORT=$DB_PORT"
          fi
          # pg_isready 循环等待（最多 30 秒）
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p "$DB_PORT" -U "$DB_USER" 2>/dev/null; then
              echo "PostgreSQL is ready on port $DB_PORT"
              exit 0
            fi
            echo "Waiting for PostgreSQL on port $DB_PORT... ($i/30)"
            sleep 1
          done
          echo "PostgreSQL not ready after 30s on port $DB_PORT"
          # 输出日志帮助诊断
          cat "/tmp/pg-${DB_PORT}.log" 2>/dev/null | tail -20 || true
          exit 1

      - name: Run migrations
        working-directory: packages/brain
        env:
          DB_PORT: ${{ env.DB_PORT }}
          DB_HOST: ${{ env.DB_HOST }}
          DB_NAME: ${{ env.DB_NAME }}
          DB_USER: ${{ env.DB_USER }}
          DB_PASSWORD: ${{ env.DB_PASSWORD }}
        run: |
          echo "Running migrate.js with DB_PORT=$DB_PORT DB_HOST=$DB_HOST DB_NAME=$DB_NAME"
          node src/migrate.js

      - name: Run Brain tests (Shard ${{ matrix.shard }})
        working-directory: packages/brain
        env:
          NODE_OPTIONS: "--max-old-space-size=3072"
          DB_PORT: ${{ env.DB_PORT }}
          DB_HOST: ${{ env.DB_HOST }}
          DB_NAME: ${{ env.DB_NAME }}
          DB_USER: ${{ env.DB_USER }}
          DB_PASSWORD: ${{ env.DB_PASSWORD }}
        run: |
          set +e
          SHARD="${{ matrix.shard }}"
          SHARD_FILE="/tmp/brain-shard-${SHARD//\//-}.txt"

          npx vitest run --shard="$SHARD" --exclude='src/__tests__/blocks.test.js' --reporter=verbose 2>&1 | tee "$SHARD_FILE"

          SHARD_FAILED=$(grep "Test Files" "$SHARD_FILE" | grep -oE "[0-9]+ failed" | awk '{print $1}' | tail -1)
          SHARD_FAILED=${SHARD_FAILED:-0}

          # Per-shard baseline: ceiling(total_baseline / 4)
          # 每个 shard 约覆盖 1/4 的测试，预存失败也按比例分配
          BASELINE=0
          if [ -f "ci/brain-integration-baseline.txt" ]; then
            TOTAL_BASELINE=$(cat ci/brain-integration-baseline.txt | tr -d '[:space:]')
            # Fix: 基线上限保护 — 集成测试技术债不允许无限累积
            MAX_BASELINE=10
            if [ "$TOTAL_BASELINE" -gt "$MAX_BASELINE" ]; then
              echo "❌ Brain integration baseline too high: $TOTAL_BASELINE > MAX_BASELINE=$MAX_BASELINE"
              echo "   集成测试债务必须主动偿还，请将 ci/brain-integration-baseline.txt 降到 $MAX_BASELINE 以内。"
              exit 1
            fi
            BASELINE=$(( (TOTAL_BASELINE + 3) / 4 ))
            echo "📋 Total baseline: $TOTAL_BASELINE → per-shard baseline: $BASELINE"
          fi

          echo "📊 Shard $SHARD: $SHARD_FAILED failures (per-shard baseline: $BASELINE)"

          if [ "$SHARD_FAILED" -le "$BASELINE" ]; then
            echo "✅ Failures ($SHARD_FAILED) ≤ per-shard baseline ($BASELINE)"
            exit 0
          fi

          echo "❌ Failures ($SHARD_FAILED) > per-shard baseline ($BASELINE) — new failures detected!"
          exit 1

      - name: GoldenPath E2E
        if: matrix.shard == '1/4'
        working-directory: packages/brain
        env:
          DB_PORT: ${{ env.DB_PORT }}
          DB_HOST: ${{ env.DB_HOST }}
          DB_NAME: ${{ env.DB_NAME }}
          DB_USER: ${{ env.DB_USER }}
          DB_PASSWORD: ${{ env.DB_PASSWORD }}
        run: bash scripts/goldenpath-check.sh

      - name: Stop PostgreSQL (always cleanup)
        if: always()
        run: |
          export PATH="/usr/lib/postgresql/${PG_VERSION}/bin:$PATH" 2>/dev/null || true
          if [ -n "$PG_DATA" ] && [ -d "$PG_DATA" ]; then
            echo "Stopping PostgreSQL at $PG_DATA"
            pg_ctl stop -D "$PG_DATA" -m immediate 2>/dev/null || true
            rm -rf "$PG_DATA" 2>/dev/null || true
            echo "PostgreSQL stopped and data dir removed"
          fi

  # ─── DevGate Quality Checks ────────────────────────────────────────────────

  devgate-checks:
    name: L4 DevGate Quality Checks
    needs: [changes, brain-integration]
    if: needs.changes.outputs.brain == 'true' && needs.brain-integration.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/engine/package-lock.json

      - name: Install engine dependencies
        run: |
          cd packages/engine
          npm ci --ignore-scripts

      - name: Run L4 DoD Verification Check
        env:
          GITHUB_HEAD_REF: ${{ github.head_ref }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  L4 DevGate: DoD Verification (Branch: $GITHUB_HEAD_REF)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          node packages/engine/scripts/devgate/check-dod-mapping.cjs

      - name: Run L4 RCI Runtime Verification
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  L4 DevGate: RCI Runtime Verification"
          echo "  运行时回归契约验证（运行环境相关）"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          bash packages/engine/scripts/devgate/rci-execution-gate.sh

  # ─── Gate job (always runs) ────────────────────────────────────────────────

  l4-passed:
    name: L4 Runtime Gate Passed
    needs: [changes, brain-integration, devgate-checks]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: L4 Runtime Gate
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  L4 Runtime Gate"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          if [ "${{ needs.changes.result }}" = "failure" ]; then
            echo "FAIL: Detect Changes job failed"
            exit 1
          fi

          FAILED=false

          if [ "${{ needs.changes.outputs.brain }}" = "true" ]; then
            if [ "${{ needs.brain-integration.result }}" != "success" ]; then
              echo "FAIL: Brain Integration Tests (${{ needs.brain-integration.result }})"
              FAILED=true
            fi
            if [ "${{ needs.devgate-checks.result }}" != "success" ]; then
              echo "FAIL: DevGate Quality Checks (${{ needs.devgate-checks.result }})"
              FAILED=true
            fi
          fi

          if [ "$FAILED" = "true" ]; then
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  ❌ L4 Runtime Gate FAILED"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi

          if [ "${{ needs.changes.outputs.brain }}" != "true" ]; then
            echo "No brain changes detected — L4 fast-pass"
          fi

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅ L4 Runtime Gate PASSED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
