name: L4 Runtime Gate

# L4: 运行时集成测试 — Brain 变动时必跑（~20min，3 shards 并行）
# 职责：PostgreSQL 真实环境 + 完整集成测试 + GoldenPath E2E
# 运行环境：xian-mac-m1（6 runner 实例，支持 2 个 L4 并发，各占 3 个 shard）
# 优化：动态端口（GITHUB_RUN_ID 派生）消除并发冲突，去掉全局 mutex，允许 2 个 L4 同时运行

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  changes:
    name: Detect Changes
    runs-on: [self-hosted, Linux, hk-vps]
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      brain: ${{ steps.filter.outputs.brain }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect brain changes
        id: filter
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.event.after }}"
          if [ "${{ github.event_name }}" = "push" ]; then
            # R2: push 事件用实际 diff（不再全量 true）
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              echo "brain=true" >> $GITHUB_OUTPUT
            else
              CHANGED=$(git diff --name-only "$BEFORE" "$AFTER" 2>/dev/null || git diff --name-only HEAD~1 HEAD)
              echo "$CHANGED" | grep -qE "^packages/brain/|^\.brain-versions$" \
                && echo "brain=true" >> $GITHUB_OUTPUT || echo "brain=false" >> $GITHUB_OUTPUT
            fi
            exit 0
          fi
          BASE_REF="${{ github.base_ref }}"
          if git diff --name-only "origin/${BASE_REF}...HEAD" | grep -qE "^packages/brain/|^\.brain-versions$"; then
            echo "brain=true" >> $GITHUB_OUTPUT
          else
            echo "brain=false" >> $GITHUB_OUTPUT
          fi

  # ─── Brain L4: Integration Tests (macos + PostgreSQL, 3 shards parallel) ──

  brain-integration:
    name: Brain Integration (Shard ${{ matrix.shard }})
    needs: changes
    if: needs.changes.outputs.brain == 'true'
    runs-on: [self-hosted, macOS, ARM64, xian-mac-m1]
    timeout-minutes: 40
    permissions:
      contents: read

    strategy:
      # 3 shards 并行，端口由 Set up PostgreSQL step 动态计算（基于 GITHUB_RUN_ID）
      # 公式：5500 + (run_id % 100) * 3 + (shard_num - 1)，范围 5500~5797
      # 不同 run 的端口区间不重叠，允许 2 个 L4 并发运行
      matrix:
        include:
          - shard: "1/3"
            shard_num: 1
          - shard: "2/3"
            shard_num: 2
          - shard: "3/3"
            shard_num: 3
      fail-fast: false

    env:
      DB_HOST: localhost
      DB_NAME: cecelia
      DB_USER: cecelia
      DB_PASSWORD: cecelia_ci
      ENV_REGION: us
      PGPASSWORD: cecelia_ci

    steps:
      - uses: actions/checkout@v4

      - name: Set Homebrew PATH (ARM64 macOS)
        run: echo "/opt/homebrew/bin" >> $GITHUB_PATH

      - name: Cache Homebrew packages
        id: cache-brew
        run: |
          if brew list postgresql@17 &>/dev/null && brew list pgvector &>/dev/null; then
            echo "cache-hit=true" >> $GITHUB_OUTPUT
          else
            echo "cache-hit=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Homebrew packages (if not cached)
        if: steps.cache-brew.outputs.cache-hit != 'true'
        run: |
          brew install postgresql@17
          brew install pgvector

      - name: Link Homebrew packages (if cached)
        if: steps.cache-brew.outputs.cache-hit == 'true'
        run: |
          brew link postgresql@17 --force 2>/dev/null || true
          brew link pgvector --force 2>/dev/null || true

      - name: Set up PostgreSQL (dynamic port)
        run: |
          export PATH="$(brew --prefix postgresql@17)/bin:$PATH"
          # 动态端口：5500 + (run_id % 100) * 3 + (shard_num - 1)
          # 100 个 slot × 3 端口，范围 5500~5797，不与生产 DB(5432) 冲突
          SHARD_NUM="${{ matrix.shard_num }}"
          BASE_PORT=$(( 5500 + (GITHUB_RUN_ID % 100) * 3 ))
          DB_PORT=$(( BASE_PORT + SHARD_NUM - 1 ))
          PG_DATA="/tmp/pgdata-${GITHUB_RUN_ID}-${SHARD_NUM}"
          # 导出给后续 steps
          echo "DB_PORT=${DB_PORT}" >> $GITHUB_ENV
          echo "PG_DATA=${PG_DATA}" >> $GITHUB_ENV
          echo "PostgreSQL port: $DB_PORT, data dir: $PG_DATA (run_id: $GITHUB_RUN_ID)"
          if pg_isready -h localhost -p "$DB_PORT" 2>/dev/null; then
            echo "PostgreSQL already running on port $DB_PORT, skipping initialization"
          else
            if [ ! -d "$PG_DATA" ]; then
              initdb -D "$PG_DATA" --username=$(whoami)
            else
              echo "$PG_DATA already exists, skipping initdb"
            fi
            pg_ctl -D "$PG_DATA" -l "/tmp/pg-${DB_PORT}.log" -o "-p ${DB_PORT}" start
            for i in $(seq 1 30); do
              if pg_isready -h localhost -p "$DB_PORT" 2>/dev/null; then
                echo "PostgreSQL is ready on port $DB_PORT"
                break
              fi
              echo "Waiting for PostgreSQL... ($i/30)"
              sleep 1
            done
          fi
          createuser --superuser cecelia -p "$DB_PORT" 2>/dev/null || true
          psql -p "$DB_PORT" -c "ALTER USER cecelia PASSWORD 'cecelia_ci';" postgres
          createdb -U cecelia cecelia -p "$DB_PORT" 2>/dev/null || true
          psql -U cecelia -d cecelia -p "$DB_PORT" -c "CREATE EXTENSION IF NOT EXISTS vector;" 2>/dev/null || true

      - name: Set up Node.js
        run: |
          # Use nvm (preferred) or brew node on self-hosted Mac runner
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          node --version
          npm --version

      - name: Install dependencies
        working-directory: packages/brain
        run: npm ci

      - name: Run migrations
        working-directory: packages/brain
        run: node src/migrate.js

      - name: Run Brain tests (Shard ${{ matrix.shard }})
        working-directory: packages/brain
        env:
          NODE_OPTIONS: "--max-old-space-size=6144"
        run: |
          set +e
          SHARD="${{ matrix.shard }}"
          SHARD_FILE="/tmp/brain-shard-${SHARD//\//-}.txt"

          npx vitest run --shard="$SHARD" --exclude='src/__tests__/blocks.test.js' --reporter=verbose 2>&1 | tee "$SHARD_FILE"

          SHARD_FAILED=$(grep "Test Files" "$SHARD_FILE" | grep -oE "[0-9]+ failed" | awk '{print $1}' | tail -1)
          SHARD_FAILED=${SHARD_FAILED:-0}

          # Per-shard baseline: ceiling(total_baseline / 3)
          # 每个 shard 约覆盖 1/3 的测试，预存失败也按比例分配
          BASELINE=0
          if [ -f "ci/brain-integration-baseline.txt" ]; then
            TOTAL_BASELINE=$(cat ci/brain-integration-baseline.txt | tr -d '[:space:]')
            BASELINE=$(( (TOTAL_BASELINE + 2) / 3 ))
            echo "📋 Total baseline: $TOTAL_BASELINE → per-shard baseline: $BASELINE"
          fi

          echo "📊 Shard $SHARD: $SHARD_FAILED failures (per-shard baseline: $BASELINE)"

          if [ "$SHARD_FAILED" -le "$BASELINE" ]; then
            echo "✅ Failures ($SHARD_FAILED) ≤ per-shard baseline ($BASELINE)"
            exit 0
          fi

          echo "❌ Failures ($SHARD_FAILED) > per-shard baseline ($BASELINE) — new failures detected!"
          exit 1

      - name: GoldenPath E2E
        if: matrix.shard == '1/3'
        working-directory: packages/brain
        run: bash scripts/goldenpath-check.sh

  # ─── Gate job (always runs) ────────────────────────────────────────────────

  l4-passed:
    name: L4 Runtime Gate Passed
    needs: [changes, brain-integration]
    if: always()
    runs-on: [self-hosted, Linux, hk-vps]
    timeout-minutes: 5
    steps:
      - name: L4 Runtime Gate
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  L4 Runtime Gate"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          if [ "${{ needs.changes.result }}" = "failure" ]; then
            echo "FAIL: Detect Changes job failed"
            exit 1
          fi

          FAILED=false

          if [ "${{ needs.changes.outputs.brain }}" = "true" ]; then
            if [ "${{ needs.brain-integration.result }}" != "success" ]; then
              echo "FAIL: Brain Integration Tests (${{ needs.brain-integration.result }})"
              FAILED=true
            fi
          fi

          if [ "$FAILED" = "true" ]; then
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  ❌ L4 Runtime Gate FAILED"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi

          if [ "${{ needs.changes.outputs.brain }}" != "true" ]; then
            echo "No brain changes detected — L4 fast-pass"
          fi

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅ L4 Runtime Gate PASSED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
