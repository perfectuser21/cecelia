# Content Type: Data Analysis Report
# 数据分析 — 行业数据解读报告类型配置
content_type: data-analysis
title: 数据分析（行业数据解读）
version: "1.0"
description: 基于公开数据的行业趋势解读报告，含数据可视化图表+洞察文字+结论建议。

# 图片配置（数据图表）
images:
  count: 8
  format: svg
  size: "1200x800"
  style: "data-visualization"
  nas_path: "zenithjoy-creator/content/data-analysis"

# 内容模板配置
template:
  research_prompt: |
    搜集 {keyword} 领域的公开数据报告与统计数据。
    重点收集：权威机构报告数据、市场规模/增速、关键比率、同比环比变化、地域/人群分布。
    来源：艾瑞咨询/QuestMobile/国家统计局/行业协会报告/上市公司财报。
  generate_prompt: |
    基于调研数据，生成以下内容：
    1. 8张数据图表（市场规模趋势/增速对比/结构占比/用户画像/地域热力图/关键指标卡/同比变化/预测曲线）
    2. 数据解读报告（1500-3000字，含：摘要→数据现状→核心趋势→影响因素→机会与风险→结论建议）
    3. 数据摘要卡（3张关键数字海报，适合社交传播）
    4. 执行摘要（300字，供决策者快速阅读）
  review_prompt: |
    审查报告是否符合以下标准：
    1. 所有数据有来源标注（报告名/机构/发布年份）
    2. 图表类型与数据类型匹配（趋势用折线/占比用饼图/对比用柱图）
    3. 结论由数据推导，非主观判断
    4. 有明确的业务应用建议（不只是数据描述）

# AI 审查规则
review_rules:
  - id: "data_sourced"
    description: "每个数据点必须标注来源，禁止无引用数据"
    severity: "blocking"
  - id: "chart_type_match"
    description: "图表类型必须与所展示数据类型匹配"
    severity: "warning"
  - id: "data_driven_conclusions"
    description: "所有结论必须由数据推导，不允许无依据判断"
    severity: "blocking"
  - id: "actionable_insights"
    description: "报告末尾必须有对业务有价值的可操作洞察"
    severity: "warning"

# 文案规则
copy_rules:
  platform_tone:
    wechat: "专业客观，数据图文并茂，适合行业从业者，表达精准"
    zhihu: "数据驱动，有逻辑有深度，适合希望了解行业的读者"
    toutiao: "数字标题，亮眼结论前置，图表清晰，适合泛读者"
  hashtags:
    base: ["数据报告", "行业分析", "趋势洞察"]
    content_type_specific: ["数据", "报告", "研究"]
  min_word_count:
    short_copy: 300
    long_form: 1500

# 产出物定义
outputs:
  - type: "images"
    count: 8
    format: "svg"
  - type: "long_form"
    platforms: ["wechat", "zhihu", "toutiao"]
  - type: "short_copy"
    platforms: ["wechat"]
  - type: "manifest"
    format: "json"
