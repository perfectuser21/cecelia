# Content Type: AI Workflow Guide
# AI工作流指南 — 面向"AI一人公司"主题的实操攻略内容类型
content_type: ai-workflow-guide
title: AI工作流指南（一人公司实操）
version: "1.0"
description: 拆解某个"用AI完成XX任务"的工作流，从一人公司视角输出可复制的实操教程。

# 图片配置
images:
  count: 8
  format: svg
  size: "1080x1080"
  style: "step-by-step-guide"
  nas_path: "zenithjoy-creator/content/ai-workflow-guide"

# 内容模板配置
template:
  research_prompt: |
    调研 {keyword} 这个工作流的最佳实践（一人公司/小团队视角）。
    重点收集：
    - 这个工作流解决的核心痛点是什么
    - 目前最主流的实现方式（工具组合/步骤）
    - 实际用过的人的反馈（有效还是噱头）
    - 所需工具清单和成本
    - 常见踩坑点
    来源：Twitter/X、小红书、知乎、YouTube教程、ProductHunt评论区。
  generate_prompt: |
    基于调研报告，生成以下内容：
    1. 8张信息图（步骤式）：
       - 图1：工作流概览（Before/After对比：没有这个流程 vs 有了之后）
       - 图2：所需工具清单（名称+用途+费用）
       - 图3-7：分步操作（每步1张图，含工具截图描述+关键提示词）
       - 图8：效果总结（节省时间/降低成本/可复用性评分）
    2. 小红书图文（500-700字）：
       - "一人公司攻略"口吻
       - 从痛点切入，步骤清晰，有具体工具名称
       - 结尾：「关注我，每周分享一人公司效率工作流」
    3. 深度教程长文（2000字）：
       - 标题：《[工作流名称]完整教程：一人公司用AI实现[核心目标]》
       - 结构：痛点背景 → 工作流设计思路 → 工具准备 → 详细步骤 → 注意事项 → 效果验证
  review_prompt: |
    审查内容是否符合以下标准：
    1. 步骤清晰可操作（读者不需要猜测下一步做什么）
    2. 每个工具都有明确用途说明
    3. 有真实效果预期（不能只说"大幅提升效率"）
    4. 目标人群明确（适合什么阶段的一人公司）

# AI 审查规则
review_rules:
  - id: "actionable_steps"
    description: "工作流必须有至少3个明确的操作步骤，每步说明'做什么+用什么工具'"
    severity: "blocking"
  - id: "tool_list"
    description: "必须列出所有所需工具，并注明费用（免费/付费）"
    severity: "blocking"
  - id: "realistic_outcome"
    description: "必须有具体的效果预期（如：省X小时/降低X%成本/从X步简化到Y步）"
    severity: "blocking"
  - id: "target_audience"
    description: "明确说明适合什么类型的一人公司/创业者"
    severity: "warning"
  - id: "pitfall_warning"
    description: "建议包含至少1个常见踩坑提示，增加实用性"
    severity: "warning"

# 文案规则
copy_rules:
  platform_tone:
    xiaohongshu: "攻略体，步骤用数字标注，截图感强，多用行动词（打开/点击/输入/等待），有完成后的截图描述"
    douyin: "口播脚本风格，每步不超过2句话，有视觉提示词（'屏幕上会出现XX'）"
    wechat: "公众号教程风格，结构完整，配有小标题，适合收藏备用"
    zhihu: "深度攻略，有背景分析，步骤详细，适合有基础的读者"
  keywords_required:
    - "AI"
    - "一人公司"
  hashtags:
    base: ["AI工作流", "一人公司", "效率提升", "自动化"]
    content_type_specific: ["工作流", "AI教程", "实操攻略", "副业创业"]
  min_word_count:
    short_copy: 400
    long_form: 2000

# 产出物定义
outputs:
  - type: "images"
    count: 8
    format: "svg"
  - type: "short_copy"
    platforms: ["xiaohongshu", "douyin"]
  - type: "long_form"
    platforms: ["wechat", "zhihu"]
  - type: "manifest"
    format: "json"
