# Base Brand Config — 所有系列共用
# 不是独立 content_type，被其他 YAML 继承

brand:
  voice: "帮助个人和小组织，用 AI 拥有过去只有公司才有的能力"
  keywords: ["能力", "系统", "一人公司", "小组织", "AI驱动", "能力下放", "能力放大"]
  banned_words: ["coding", "搭建", "agent workflow", "builder", "Cecelia", "智能体搭建", "代码部署"]

# 两种产出规格
outputs:
  image_text:
    description: "图文组 — 8个平台全发"
    title: "1个标题"
    copy: "~100字以内"
    cover: { width: 1080, height: 1464, format: png, framework: "/share-card" }
    cards: { width: 1080, height: 1920, format: png, max_count: 9, framework: "/share-card" }
    platforms: ["douyin", "kuaishou", "xiaohongshu", "weibo", "wechat", "zhihu", "toutiao", "shipinhao"]

  long_form:
    description: "长文组 — 6个平台"
    title: "1个标题"
    copy: "~1000字左右"
    cover_default: { note: "用抖音 cover 尺寸，除公众号外共用" }
    cover_wechat: { width: 900, height: 383, format: png, note: "从图文 cover 裁切" }
    platforms: ["douyin", "xiaohongshu", "weibo", "wechat", "zhihu", "toutiao"]
    no_long_form: ["kuaishou", "shipinhao"]

# Review 规则
review:
  brand:
    keyword_min: 3
    banned_zero: true
  tone:
    must_be: "分享感，站在读者角度，像朋友推荐"
    must_not: "说教感，居高临下，创作者自嗨"
    check_reader_perspective: true
    check_sharing_feel: true
    check_solo_company_link: true
  quality:
    has_data: true
    no_fabrication: true

# NAS 导出结构
export:
  nas_base: "/volume1/workspace/vault/zenithjoy-creator/content"
  local_base: "~/perfect21/zenithjoy/content-output"
  structure:
    manifest: "manifest.json"
    exports:
      title: "exports/title.txt"
      image_text_copy: "exports/image-text-copy.txt"
      long_form_html: "exports/content.html"
    images:
      cover_916: "images/{id}-cover.png"
      cards: "images/{id}-{nn}.png"
      cover_wechat: "images/{id}-cover-wechat.png"
