# 记录 packages/engine/ 下的 feature 注册（features 段）+ 能力变更历史（changelog 段）
# - features: 每个完整 feature 一个 entry（用途/入口/依赖/contract/测试覆盖/闭环段）
# - changelog: 每次改动追加（细粒度变更历史）

version: "1.1.1"
updated: "2026-05-05"

# ============================================================================
# Features 注册（v18.22.2 新增）
# 每个 feature 是 Cecelia 的"完整能力单元"，比 changelog 单条改动粒度大
# ============================================================================
features:
  - id: stop-hook
    name: Stop Hook（/dev 流程守门）
    status: stable
    since: "2026-04-21"  # PR #2503 cwd-as-key 切线，13 段闭环起点
    owner: engine
    description: |
      Cecelia /dev 流程的核心守门 — 每次 assistant 想 stop turn 时触发，
      验证 dev session 是否真完成（PR/CI/merge/deploy/health/Learning/cleanup
      全链路）。未完成 → block 反馈具体阶段；done → rm dev-active 状态文件 → exit 0。
    entry_points:
      - packages/engine/hooks/stop-dev.sh        # Ralph Loop 入口
      - packages/engine/hooks/dev-mode-tool-guard.sh  # PreToolUse 拦 ScheduleWakeup + Bash bg
    key_files:
      - packages/engine/hooks/stop-dev.sh             # cwd 路由 + ghost 过滤 + mtime expire
      - packages/engine/lib/devloop-check.sh          # verify_dev_complete 7 阶段决策树
      - packages/engine/skills/dev/scripts/cleanup.sh # 归档/git config 清理
      - packages/engine/skills/dev/scripts/worktree-manage.sh # .dev-mode + .cecelia 创建
      - .claude/settings.json                          # PreToolUse hooks 注册（repo 级）
    state_files:
      - main_repo/.cecelia/dev-active-{branch}.json   # Ralph Loop 入口锁
      - main_repo/.cecelia/deploy-fail-count-{branch} # P5 fail counter
      - main_repo/.cecelia/deploy-failed-{branch}.flag # P5 fail 3x escape 标记
      - worktree/.dev-mode.{branch}                    # worktree 元数据缓存（不读字段做决策）
      - worktree/.dev-lock.{branch}                    # session_id + owner_session
    contract_url: https://www.notion.so/Stop-Hook-Contract-v18-22-2-357c40c2ba6381b893c7e251707d1252
    contract_url_legacy: https://www.notion.so/35753f413ec581d9b607f61e4e90ce0b  # 月升 frozen，留作历史快照
    invariants_count: 18  # L1-L18 详见 contract，integrity 元测试 grep 验证
    state_machine:
      stages:
        - P1 PR 未创建 → block: 立即 push + gh pr create
        - P2 CI 进行中 → block: 等 CI（gh pr checks --watch）
        - P3 CI 失败 → block: fail job 名 + log URL（修代码 → push 触发新 CI）
        - P4 PR 通过未合 → block: auto-merge
        - P5 deploy workflow conclusion=success（VERIFY_DEPLOY_WORKFLOW=1，engine-only PR 跳过）
        - P6 health probe /api/brain/health 200（VERIFY_HEALTH_PROBE=1，60×5s）
        - P7 Learning 文件存在 + 含 ### 根本原因
        - P0 cleanup.sh exit 0 → done → rm dev-active → exit 0
    test_coverage:
      unit: 32       # tests/unit/verify-dev-complete.test.sh
      integration: 32  # 7 个 .test.sh 共 32 case (7stage-flow 5 + ghost-filter 4 + e2e-real-brain 3 + multi-worktree 5 + deploy-escape 4 + ralph-loop-mode 4 + dev-mode-tool-guard 8 - devloop-classify 10)
      smoke: 21      # 7stage 9 + ralph-loop 12
      e2e: 12        # tests/e2e/stop-hook-full-lifecycle.test.ts
      integrity: 18  # tests/integrity/stop-hook-coverage.test.sh L1-L17 + L18 self-ref
      ci_job: engine-tests-shell  # .github/workflows/ci.yml（接 ci-passed required）
    closure_segments:
      - { seg: 1, pr: "#2503", date: "2026-04-21", title: "cwd-as-key 切线 + 12 场景 E2E 防线" }
      - { seg: 2, pr: "#2745", date: "2026-05-04", title: "散点 12 → 1 单一 exit 0" }
      - { seg: 3, pr: "#2746", date: "2026-05-04", title: "探测失败 fail-closed" }
      - { seg: 4, pr: "#2747", date: "2026-05-04", title: "三态出口严格分离" }
      - { seg: 5, pr: "#2749", date: "2026-05-04", title: "condition 5 真完成守门" }
      - { seg: 6, pr: "#2752", date: "2026-05-04", title: "Ralph Loop 模式（项目根状态文件 + hook 主动验证）" }
      - { seg: 7, pr: "#2757", date: "2026-05-04", title: "50 case 测试金字塔" }
      - { seg: 8, pr: "#2759", date: "2026-05-04", title: "PreToolUse 拦 ScheduleWakeup + Bash bg" }
      - { seg: 9, pr: "#2761", date: "2026-05-04", title: "done schema 修正（删 decision:allow，CC 协议合规）" }
      - { seg: 10, pr: "#2766", date: "2026-05-04", title: "verify_dev_complete 7 阶段重写 P1-P7" }
      - { seg: 10.1, pr: "#2767", date: "2026-05-04", title: "Task 3/5/6 后续（28 unit + 5 integration + cleanup 解耦）" }
      - { seg: 11, pr: "#2770", date: "2026-05-05", title: "integrity 5 修复（死代码激活 + ghost 过滤 + P5/P6 启用）" }
      - { seg: 12, pr: "#2777", date: "2026-05-05", title: "4 P0 修（BUG-1/2/3/4）" }
      - { seg: 13, pr: "#2779", date: "2026-05-05", title: "4 P1 修（边缘 case + 测试基础设施）" }
      - { seg: 14, pr: "本 PR", date: "2026-05-05", title: "feature 注册（feature-registry features 段）" }
    history_pr_count: 50  # 半年累积修过的相关 PR 总数（含已被新架构替代的）
    deprecated_invariants:
      - session_id 精确匹配（owner_session）→ cwd-as-key + Ralph Loop 替代
      - dev-lock 心跳 self-heal → hook 主动 verify 替代
      - 重试 30 次 / 90 分钟超时 → 无次数限制，verify 阶段决定
      - ready_to_merge 中间态 → 单一 exit 0 协议
    learnings_dir: docs/learnings/  # cp-*-*.md 每段闭环的 Learning 文件

