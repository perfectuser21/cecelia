# Engine ↔ Superpowers Alignment Contract
# ==========================================
# SSOT: DevGate 脚本根据本文件验证对齐状态。
# 每个 skill 的 required_keywords 都已经用 grep 在对应 anchor_file 里验证可见。
# 字段语义：
#   coverage_level:
#     full           — Engine 完整内化了该 skill 的方法论
#     partial        — Engine 只吸收部分 / 调用时机改了 / 本地化变体
#     rejected       — Engine 刻意不吸收，必须说明理由
#     not_applicable — meta skill 或对 Engine 无意义
#
# 数据来源（审计线索）：
#   packages/engine/skills/dev/steps/autonomous-research-proxy.md §"交互点替代矩阵 v2"
#   各 steps/*.md changelog + R7/F3/F4 提交

skills:

  # ────────────────────────────────────────────────────────────────
  # 1. brainstorming — 探索用户意图 + HARD-GATE design approval
  # ────────────────────────────────────────────────────────────────
  - name: brainstorming
    coverage_level: full
    engine_integration:
      anchor_file: packages/engine/skills/dev/steps/01-spec.md
      anchor_section: "§0.2.HARD-GATE + §0.2.3 + §0.2.4 + §0.2.5"
      required_keywords:
        - "HARD-GATE"
        - "Research Subagent"
        - "presented a design"
        - "Self-Review"
        - "零占位符"
    local_prompt:
      path: packages/engine/skills/dev/prompts/brainstorming/SKILL.md
      source_path_relative: brainstorming/SKILL.md
      sha256: bba47904a7f6bbee3bf8a107ebbe84e65d392be683bbb898ded736b29e415f90
    notes: |
      官方 HARD-GATE 原话已逐字内嵌到 §0.2.HARD-GATE (L93-98)。
      "user approved" 本地化为 "Research Subagent Tier 1 confirmed"
      (autonomous-research-proxy.md Tier 1 表)。
      2-3 方案对比表 (§0.2.3) + Self-Review 5 步 (§0.2.5) 覆盖 design approval 流程。

  # ────────────────────────────────────────────────────────────────
  # 2. writing-plans — plan 粒度 + 零占位符 + Subagent-Driven 选择
  # ────────────────────────────────────────────────────────────────
  - name: writing-plans
    coverage_level: full
    engine_integration:
      anchor_file: packages/engine/skills/dev/steps/01-spec.md
      anchor_section: "§0.2.4 + §0.2.5 Step 4 (Type consistency scan)"
      required_keywords:
        - "writing-plans"
        - "零占位符"
        - "TDD 顺序"
        - "跨 task 类型一致性"
        - "Implementation Plan"
    local_prompt:
      path: packages/engine/skills/dev/prompts/writing-plans/SKILL.md
      source_path_relative: writing-plans/SKILL.md
      sha256: 90056bad3d5f196fa7c9fec0ffe592e6d9c86bc983e406642a51d1a4198b7024
    notes: |
      Plan 产出 `.plan-${BRANCH}.md`，规则对齐官方 writing-plans：
      文件路径+代码+测试命令+预期输出 / 2-5 分钟粒度 / 零占位符 / TDD 顺序。
      v14.15.0 加的第 4 步 Type-consistency 扫描就是官方 writing-plans 的
      "Consistency Review" 本地化。
      "Subagent-Driven vs Inline" 选择由 autonomous-research-proxy Tier 1
      固定为 subagent-driven。

  # ────────────────────────────────────────────────────────────────
  # 3. executing-plans — Critical Gap Abort + BLOCKED 升级
  # ────────────────────────────────────────────────────────────────
  - name: executing-plans
    coverage_level: full
    engine_integration:
      anchor_file: packages/engine/skills/dev/steps/01-spec.md
      anchor_section: "§0.2.5 Step 5 (Critical Gap Abort) + 02-code.md §2.5 BLOCKED 升级链 v2"
      required_keywords:
        - "Critical Gap Abort"
        - "executing-plans"
        - "autonomous_aborted"
        - "否决权"
        - "核心文件不存在"
    # local_prompt omitted: method已内嵌到 Engine, 不需要本地 prompt 副本

    local_prompt: null
    notes: |
      F4 新引 (Engine v14.17.0)。官方原则
      "If concerns: Raise them with your human partner before starting"
      → autonomous 等价物 Critical Gap Abort (暂停 + Brain task)。
      5 条 abort trigger 列在 01-spec.md §0.2.5 Step 5。

  # ────────────────────────────────────────────────────────────────
  # 4. subagent-driven-development — Implementer/Reviewer 三角色
  # ────────────────────────────────────────────────────────────────
  - name: subagent-driven-development
    coverage_level: full
    engine_integration:
      anchor_file: packages/engine/skills/dev/steps/02-code.md
      anchor_section: "§2.2 Implementer + §2.3 Spec Reviewer + §2.4 Code Quality Reviewer"
      required_keywords:
        - "subagent-driven-development"
        - "Implementer"
        - "Spec Reviewer"
        - "Code Quality Reviewer"
        - "不信任 Implementer 的报告"
    local_prompt:
      path: packages/engine/skills/dev/prompts/subagent-driven-development/SKILL.md
      source_path_relative: subagent-driven-development/SKILL.md
      sha256: 081ad3869e55c80bf8f890b4768a90c0e8057daf94b1b6fadebfc85ea5b8304a
    notes: |
      三角色全自动：
        Round 1 Implementer (Sonnet/Opus, TDD + 全套回归)
        Round 2 Spec Reviewer (Sonnet, "不信任 Implementer 的报告。自己读代码验证")
        Round 3 Code Quality Reviewer (Sonnet, YAGNI + 测试质量)
      4 种返回状态 (DONE / DONE_WITH_CONCERNS / NEEDS_CONTEXT / BLOCKED)
      逐字对齐官方 implementer-prompt.md。

  # ────────────────────────────────────────────────────────────────
  # 5. test-driven-development — condition-based-waiting + 真行为测试
  # ────────────────────────────────────────────────────────────────
  - name: test-driven-development
    coverage_level: full
    engine_integration:
      anchor_file: packages/engine/skills/dev/steps/02-code.md
      anchor_section: "§2.2 Implementer prompt + §Condition-Based Waiting (L341-367)"
      required_keywords:
        - "test-driven-development"
        - "Condition-Based Waiting"
        - "setTimeout"
        - "waitFor"
        - "先红再绿"
    local_prompt:
      path: packages/engine/skills/dev/prompts/test-driven-development/SKILL.md
      source_path_relative: test-driven-development/SKILL.md
      sha256: 7dee67b4af6bdccc7a914ca34533184d64592d0f5b23aeae631538168db14994
    notes: |
      Implementer prompt 强制补丁 (02-code.md "Implementer 必须遵守的
      Superpowers 纪律" 三条之一)。
      唯一例外：测的是 timing 行为本身 (debounce/throttle)，必须注释说明。
      F3 / Engine v14.16.0 补全。

  # ────────────────────────────────────────────────────────────────
  # 6. verification-before-completion — Evidence before claims
  # ────────────────────────────────────────────────────────────────
  - name: verification-before-completion
    coverage_level: full
    engine_integration:
      anchor_file: packages/engine/skills/dev/steps/02-code.md
      anchor_section: "§2.6 Post-Complete Gate + §Pre-Completion Verification (L369-428)"
      required_keywords:
        - "verification-before-completion"
        - "Pre-Completion Verification"
        - "Evidence before claims"
        - "Common Failures"
        - "Rationalization Prevention"
    local_prompt:
      path: packages/engine/skills/dev/prompts/verification-before-completion/SKILL.md
      source_path_relative: verification-before-completion/SKILL.md
      sha256: ea52d15aabaf72bc6b558efe2c126f161b53961090ddcd712000273bfe8c7b6c
    notes: |
      §2.6 Post-Complete Gate 对每个 DoD 条目"运行 Test 命令 → 检查 exit
      code → 有证据才勾 [x]"。
      §Pre-Completion Verification 逐字搬自官方 SKILL.md L40-74
      (Common Failures + Rationalization Prevention 两张表)。
      Implementer 报 DONE 前必须跑过验证命令 + 贴 stdout 尾部 3 行。

  # ────────────────────────────────────────────────────────────────
  # 7. systematic-debugging — 4 Phase 调试 (调用时机改造)
  # ────────────────────────────────────────────────────────────────
  - name: systematic-debugging
    coverage_level: partial
    engine_integration:
      anchor_file: packages/engine/skills/dev/steps/02-code.md
      anchor_section: "§Root-Cause Tracing 4 Phase (L429-536)"
      required_keywords:
        - "systematic-debugging"
        - "Root-Cause Tracing"
        - "Phase 2 Pattern"
        - "向上追调用链"
        - "Stack Trace 插桩"
    local_prompt:
      path: packages/engine/skills/dev/prompts/systematic-debugging/SKILL.md
      source_path_relative: systematic-debugging/SKILL.md
      sha256: 4999cb851360485eca5074e727bbdd62ef20549c5d5b01216fcbf5831badb473
    notes: |
      方法论完整内化 (Phase 1 Reproduce / Phase 2 Pattern Analysis /
      Phase 3 Hypothesis / Phase 4 Fix + Defense-in-depth)。R7 / Engine
      v14.18.0 补 Phase 2 Pattern Analysis (逐字搬 L122-150)。
      PARTIAL 原因：**调用时机改了**。官方期望在人工介入后由人派
      systematic-debugging；Engine 的 BLOCKED 升级链 v2 (§2.5) 第 3 次
      改派 `dispatching-parallel-agents` 而不是 systematic-debugging。
      理由：autonomous 下 subagent 没有人的"已尝试失败"上下文，硬套
      systematic-debugging 会浪费 token 而且效果差 (见 F4 BLOCKED v2
      设计变更原因)。方法论本身 (Root-Cause Tracing) 作为 Implementer
      prompt 补丁永久保留。

  # ────────────────────────────────────────────────────────────────
  # 8. dispatching-parallel-agents — BLOCKED 第 3 次升级路径
  # ────────────────────────────────────────────────────────────────
  - name: dispatching-parallel-agents
    coverage_level: full
    engine_integration:
      anchor_file: packages/engine/skills/dev/steps/02-code.md
      anchor_section: "§2.5 BLOCKED 升级链 v2 (L230-241)"
      required_keywords:
        - "dispatching-parallel-agents"
        - "BLOCKED"
        - "diagnostic subagent"
        - "并行调查"
        - "第 3 次"
    # local_prompt omitted: method已内嵌到 Engine, 不需要本地 prompt 副本

    local_prompt: null
    notes: |
      F4 / Engine v14.17.0 在 BLOCKED 升级链第 3 次调用。3 个 diagnostic
      subagent 并行独立调查（取代原 v1 设计的 systematic-debugging）。
      典型用例：Implementer 连续 BLOCKED 2 次，主 agent 派 parallel agents
      从不同角度分析根因。

  # ────────────────────────────────────────────────────────────────
  # 9. receiving-code-review — ARCHITECTURE_ISSUE 升级分支
  # ────────────────────────────────────────────────────────────────
  - name: receiving-code-review
    coverage_level: full
    engine_integration:
      anchor_file: packages/engine/skills/dev/steps/02-code.md
      anchor_section: "§2.3 + §2.4 ARCHITECTURE_ISSUE 升级分支 (L163-183, 224)"
      required_keywords:
        - "receiving-code-review"
        - "ARCHITECTURE_ISSUE"
        - "architect-reviewer"
        - "Involves your human partner if architectural"
        - "当前 Implementer 循环暂停"
    local_prompt:
      path: packages/engine/skills/dev/prompts/receiving-code-review/SKILL.md
      source_path_relative: receiving-code-review/SKILL.md
      sha256: c9382e92b8f32363566068ecfed19d3b2651eaf40d3942b24840f839dedfc406
    notes: |
      F4 新引 (Engine v14.17.0)。官方原则
      "Involves your human partner if architectural" → autonomous 下等价：
      Reviewer 发现架构问题不让 Implementer 直接改，派 Brain
      task_type=arch_review 让 architect-reviewer 出新 spec。
      3 种架构问题分类：设计边界 / 数据流架构 / 系统级约束。

  # ────────────────────────────────────────────────────────────────
  # 10. requesting-code-review — Review 请求规范化 5 项
  # ────────────────────────────────────────────────────────────────
  - name: requesting-code-review
    coverage_level: full
    engine_integration:
      anchor_file: packages/engine/skills/dev/steps/02-code.md
      anchor_section: "§2.3 + §2.4 派遣前 Review 请求规范化 (L139-147, 206-208)"
      required_keywords:
        - "requesting-code-review"
        - "KNOWN_LIMITATIONS"
        - "PLAN_OR_REQUIREMENTS"
        - "FILES_CHANGED"
        - "精确 commit SHA"
    local_prompt:
      path: packages/engine/skills/dev/prompts/requesting-code-review/SKILL.md
      source_path_relative: requesting-code-review/SKILL.md
      sha256: a5ff68586ccf62d1803cedeb71d60fd96ec05591d29c8d123196117eefd34cd0
    notes: |
      F4 新引 (Engine v14.17.0)。派 Reviewer 前必须在 prompt 里包含 5 项：
      (1) 精确 commit SHA 或 diff 范围 (不是 "latest"/"HEAD")
      (2) PLAN_OR_REQUIREMENTS (.task-<branch>.md 绝对路径 + task 段落)
      (3) DESCRIPTION (一句话说明解决什么 PRD 子问题)
      (4) FILES_CHANGED (git diff --stat 输出)
      (5) KNOWN_LIMITATIONS (Implementer 自报已知 scope 外问题)
      缺任一 = BLOCKED，Reviewer 不接受。

  # ────────────────────────────────────────────────────────────────
  # 11. finishing-a-development-branch — Discard typed-confirm
  # ────────────────────────────────────────────────────────────────
  - name: finishing-a-development-branch
    coverage_level: full
    engine_integration:
      anchor_file: packages/engine/skills/dev/steps/04-ship.md
      anchor_section: "§4.3 Discard 安全确认 (L119-160)"
      required_keywords:
        - "finishing-a-development-branch"
        - "typed-confirm"
        - "discard"
        - "finish_branch_discard_review"
        - "不可逆"
    # local_prompt omitted: method已内嵌到 Engine, 不需要本地 prompt 副本

    local_prompt: null
    notes: |
      F4 新引 (Engine v14.17.0)。官方 4 选项 (merge/PR/keep/discard)
      其中 discard 必须 typed-confirm。
      autonomous 模式处理：
        默认不选 discard (autonomous-research-proxy Tier 1 固定 option 2)
        万一走 discard 路径 → 不读 stdin，直接 abort + 创 Brain
        task_type=finish_branch_discard_review 让人决策。
      保留安全底线不让自动化误删 branch+commits+worktree。

  # ────────────────────────────────────────────────────────────────
  # 12. using-git-worktrees — 刻意拒绝 (自造 worktree-manage.sh)
  # ────────────────────────────────────────────────────────────────
  - name: using-git-worktrees
    coverage_level: rejected
    rejection_reason: |
      Engine 自造 `worktree-manage.sh` 替代官方 using-git-worktrees skill。
      原因：
      (1) Engine 需要严格约定 worktree 路径 (~/worktrees/cecelia/)，而官方
          skill 要求"no dir preference -> ask user"（autonomous-research-proxy
          Tier 1 已把这个问题固定答 "用 ~/worktrees/cecelia/ 约定"）；
      (2) Engine 需要 worktree 与 Brain task_id + branch + .dev-lock +
          session_id 绑定 (00-worktree-auto.md §1-2)，官方 skill 不处理会话
          所有权；
      (3) Engine 需要定时 GC 孤儿 worktree (orphan-worktree-gc worker PR #2400)，
          官方 skill 没有回收机制。
      保留官方 skill 的 baseline test 和分支命名约束精神，但实现走自造
      `worktree-manage.sh`（packages/engine/skills/dev/scripts/）。
    notes: |
      autonomous-research-proxy.md 交互点替代矩阵 v2 #10 标为"⚠️ 部分替代
      (baseline test 非关键路径)"。本契约视为 rejected — 因为 Engine 没
      运行 using-git-worktrees 作为 skill，而是调 worktree-manage.sh shell 脚本。

  # ────────────────────────────────────────────────────────────────
  # 13. using-superpowers — meta skill 不适用
  # ────────────────────────────────────────────────────────────────
  - name: using-superpowers
    coverage_level: not_applicable
    notes: |
      Meta skill — 用于指导如何发现和使用其它 skill。Engine 的 /dev SKILL.md
      本身就是这个角色 (4-Stage Pipeline + 模式判断 + skill chain)，无需再
      引用官方 using-superpowers。

  # ────────────────────────────────────────────────────────────────
  # 14. writing-skills — meta skill 不适用
  # ────────────────────────────────────────────────────────────────
  - name: writing-skills
    coverage_level: not_applicable
    notes: |
      Meta skill — 用于创建/编辑/验证 skill 本身。Engine 有自己的 skill 作者
      工具链 (packages/engine/scripts/generate-path-views.sh, feature-registry
      changelog, 版本 bump 规则)。不需要官方 writing-skills skill。

