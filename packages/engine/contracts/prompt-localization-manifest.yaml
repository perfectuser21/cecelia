# ============================================================
# 验证命令 — Engine CI 可用来校验本地副本未漂移
# 假设 Engine 把文件放到 packages/engine/skills/dev/prompts/<skill>/...
# 如果 upstream 与本地 hash 不一致，命令以 non-zero 退出
# ============================================================
verification_commands:
  # 1) 校验本地副本 hash 与 manifest 记录一致（Engine CI 日常巡检用）
  verify_local_hashes: |
    # 从 manifest 里抽出 local + sha256，逐一 shasum 对照
    python3 -c "
    import yaml, hashlib, sys, pathlib
    m = yaml.safe_load(open('packages/engine/skills/dev/prompts/prompt-localization-manifest.yaml'))
    root = pathlib.Path('.')
    bad = []
    for skill in m['skills']:
        for f in skill['files']:
            p = root / f['local']
            if not p.exists():
                bad.append(f\"MISSING {f['local']}\"); continue
            h = hashlib.sha256(p.read_bytes()).hexdigest()
            if h != f['sha256']:
                bad.append(f\"HASH_MISMATCH {f['local']} expect={f['sha256']} got={h}\")
    if bad:
        print('\n'.join(bad)); sys.exit(1)
    print(f'OK: {sum(len(s[\"files\"]) for s in m[\"skills\"])} files verified')
    "

  # 2) 校验 upstream 源未变（检测 superpowers 是否发布新版本、需要重新同步）
  verify_upstream_drift: |
    SRC=/Users/administrator/.claude-account1/plugins/cache/superpowers-marketplace/superpowers/5.0.7
    python3 -c "
    import yaml, hashlib, sys, pathlib
    m = yaml.safe_load(open('packages/engine/skills/dev/prompts/prompt-localization-manifest.yaml'))
    src = pathlib.Path('$SRC')
    bad = []
    for skill in m['skills']:
        for f in skill['files']:
            p = src / f['source']
            if not p.exists():
                bad.append(f\"UPSTREAM_MISSING {f['source']}\"); continue
            h = hashlib.sha256(p.read_bytes()).hexdigest()
            if h != f['sha256']:
                bad.append(f\"UPSTREAM_CHANGED {f['source']} manifest={f['sha256']} upstream={h}\")
    if bad:
        print('\n'.join(bad)); sys.exit(2)
    print('OK: upstream unchanged vs manifest')
    "

  # 3) 纯 shell 版一行校验（无 python/yaml 依赖，适合轻量 CI step）
  verify_quick_shell: |
    # 任选 3 个关键文件做 spot check
    set -e
    cd packages/engine/skills/dev/prompts
    echo "081ad3869e55c80bf8f890b4768a90c0e8057daf94b1b6fadebfc85ea5b8304a  subagent-driven-development/SKILL.md" | shasum -a 256 -c -
    echo "7dee67b4af6bdccc7a914ca34533184d64592d0f5b23aeae631538168db14994  test-driven-development/SKILL.md" | shasum -a 256 -c -
    echo "ea52d15aabaf72bc6b558efe2c126f161b53961090ddcd712000273bfe8c7b6c  verification-before-completion/SKILL.md" | shasum -a 256 -c -

