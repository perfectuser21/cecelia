    name: "职责边界清晰定义"
    scope: doc
    priority: P0
    trigger: [PR, Release]
    method: manual
    tags: [contract, boundary]
    owner: infra
    steps:
      given: "QUALITY-CONTRACT.md 定义职责边界"
      when: "团队成员阅读文档"
      then: "理解本地=加速失败，远端=最终强制"
    evidence:
      type: doc-content
      contains: "本地 Hooks = 加速失败 / 远端 CI + Branch Protection = 最终强制"
    verification:
      type: manual
      description: "文档审查确认原则清晰"
  # --------------------------------------------------------------------------
  # Q5: RISK SCORE Trigger - QA Decision 自动触发机制
  # --------------------------------------------------------------------------
