# ============================================================================
# Regression Contract - ZenithJoy Engine
# ============================================================================
# Schema: regression-contract-v1.yaml (internal)
#
# 全量回归的唯一合法定义来源
#
# Trigger 规则：
#   - PR Gate:      跑 trigger 包含 PR 的条目
#   - Release Gate: 跑 trigger 包含 Release 的条目
#   - Nightly:      (已废弃) Nightly workflow 已被移除，此 trigger 暂不可用
#
# Method 规则：
#   - auto:   必须有 test 字段指向自动化测试
#   - manual: 无 test 字段，需人工验证
#
# ============================================================================
#
# 编号说明：
# 历史条目使用旧编号体系（Step 7-11），对应关系：
#   Step 7-8 (PR+Push) → Stage 3: Integrate
#   Step 9 (CI)        → Stage 3: Integrate
#   Step 10 (Learning) → Stage 4: Ship
#   Step 11 (Cleanup)  → Stage 4: Ship
#   Step 6.5 (Simplify) → 已删除，融入 code_review_gate
# 新条目统一使用 4-Stage 编号：Spec/Code/Integrate/Ship
# ============================================================================

# NOTE: version 需要与 package.json 保持同步
# 更新 package.json 时同步更新此处
version: "13.78.10"
updated: 2026-04-01
# devloop-check: seal 文件反推 (v3.7.0)

# ============================================================================
# Hooks 回归契约
# ============================================================================
hooks:
  # --------------------------------------------------------------------------
  # H-session-start: session-start (UserPromptSubmit hook)
  # --------------------------------------------------------------------------
  - id: H-session-001
    feature: H-session-start
    name: "session-start hook 存在且可执行"
    scope: hook
    priority: P1
    trigger: [PR]
    method: auto
    tags: [session, brain-context, user-prompt]
    owner: engine
    steps:
      given: "UserPromptSubmit 事件触发"
      when: "新对话第一条消息"
      then: "自动注入 Brain 活跃任务摘要到 Claude context"
    evidence:
      type: code
      file: "hooks/session-start.sh"
      contains: "additionalContext"
    method: manual

  # --------------------------------------------------------------------------
  # H1: branch-protect
  # --------------------------------------------------------------------------
  - id: H1-001
    feature: H1
    name: "分支保护拦截 main/develop 写入"
    scope: hook
    priority: P0
    trigger: [PR, Release]
    method: auto
    tags: [branch, write-protect, security]
    owner: infra
    steps:
      given: "当前在 main 或 develop 分支"
      when: "尝试写入代码文件（Write/Edit 工具）"
      then: "Hook 阻止并提示切换到 cp-* 或 feature/* 分支"
    evidence:
      type: log
      contains: "请先创建工作分支"
    test: "tests/hooks/branch-protect.test.ts"

  - id: H1-002
    feature: H1
    name: "cp-* 分支允许写入"
    scope: hook
    priority: P0
    trigger: [PR, Release]
    method: auto
    tags: [branch, write-protect]
    owner: infra
    steps:
      given: "当前在 cp-* 分支"
      when: "尝试写入代码文件"
      then: "Hook 放行（exit 0）"
    evidence:
      type: exit_code
      equals: 0
    test: "tests/hooks/branch-protect.test.ts"

  - id: H1-003
