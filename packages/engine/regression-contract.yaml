      description: "PR 创建后 Stop Hook 输出 'p0 阶段: PR 已创建 → exit 0'；Step 8 结尾不包含 Step 9 调用"

  - id: W1-005
    feature: W1
    name: "p1 阶段事件驱动修复"
    scope: workflow
    priority: P0
    trigger: [PR, Release]
    method: manual
    tags: [dev, p1, v2.0.0, two-phase, event-driven]
    owner: workflow
    steps:
      given: "PR 已创建，CI 检测到失败（phase=p1）"
      when: "CI fail 事件触发（n8n 轮询 Notion / GitHub webhook / cron）"
      then: "PHASE_OVERRIDE=p1 启动 → 诊断 → 修复 → push → 退出（不等待 CI，等下次唤醒）"
    evidence:
      type: log
      contains: "p1 阶段.*CI.*fail.*修复.*push.*exit 0"

  - id: W1-006
    feature: W1
    name: "p2 阶段自动 merge"
    scope: workflow
    priority: P0
    trigger: [PR, Release]
    method: manual
    tags: [dev, p2, v2.0.0, two-phase, auto-merge]
    owner: workflow
    steps:
      given: "PR CI 全部通过（phase=p2）"
      when: "CI pass 事件触发（GitHub Actions auto-merge job）"
      then: "自动合并 PR → Learning（总结经验）→ Cleanup（清理分支）→ 完成"
    evidence:
      type: log
      contains: "p2 阶段.*CI pass.*merge.*learning.*cleanup"
  - id: W3-001
    feature: W3
    name: "质检失败触发回退"
    scope: workflow
    priority: P0
    trigger: [PR, Release]
    method: manual
    tags: [dev, loop, quality]
    owner: workflow
    steps:
      given: "Step 7 质检（npm run qa）失败"
      when: "Claude 检测到失败"
      then: "自动返回 Step 5 继续修复，而非中止流程"
    evidence:
      type: log
      description: "对话记录显示循环回退"

  - id: W3-002
    feature: W3
    name: "CI 失败触发回退"
    scope: workflow
    priority: P0
    trigger: [PR, Release]
    method: manual
    tags: [dev, loop, ci]
    owner: workflow
    steps:
      given: "Step 9 CI 红"
      when: "wait-for-merge.sh 检测到 CI 失败"
      then: "自动返回 Step 5 重新循环，而非中止"
    evidence:
      type: log
      contains: "CI 失败"

  # W3-003: Nightly workflow 防止 push 触发 (已废弃 - v13.0.0)
  #   note: "Nightly workflow 已被移除（v13.0.0），此契约已废弃"

  # --------------------------------------------------------------------------
  # W5: 模式自动检测
  # --------------------------------------------------------------------------
  - id: W5-001
    feature: W5
    name: "new 模式：在 develop/main 检测为新任务"
    scope: workflow
    priority: P0
    trigger: [PR, Release]
    method: manual
    tags: [dev, mode, detect]
    owner: workflow
    steps:
      given: "当前在 develop 或 main 分支"
      when: "运行 /dev"
      then: "检测为 new 模式，开始完整流程"
    evidence:
      type: log
      contains: "检测到模式: new"

  - id: W5-002
    feature: W5
    name: "continue 模式：cp-* 无 PR 检测为继续开发"
    scope: workflow
    priority: P0
    trigger: [PR, Release]
    method: manual
    tags: [dev, mode, detect]
    owner: workflow
    steps:
      given: "当前在 cp-* 分支且没有打开的 PR"
      when: "运行 /dev"
      then: "检测为 continue 模式，直接进入 Loop 1"
    evidence:
      type: log
      contains: "检测到模式: continue"
  - id: C1-001
    feature: C1
    name: "PR 版本号必须递增"
    scope: ci
    priority: P0
    trigger: [PR, Release]
    method: manual
    tags: [ci, version]
    owner: infra
    steps:
      given: "PR 包含代码改动"
      when: "CI 运行 version-check job"
      then: "package.json 版本号 > develop 分支版本"
    evidence:
      type: ci_job
      name: "version-check"
      status: success
    # CI jobs are tested by running the workflow; no separate test file

  # --------------------------------------------------------------------------
  # C1-002~C1-003: v8.24.0 安全修复 (ci.yml)
  # --------------------------------------------------------------------------
  - id: C1-002
    feature: C1
    name: "CI Job 权限最小化声明"
    scope: ci
    priority: P0
    trigger: [PR, Release]
