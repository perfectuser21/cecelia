# ============================================================================
# Regression Contract - ZenithJoy Engine
# ============================================================================
# Schema: regression-contract-v1.yaml (internal)
#
# 全量回归的唯一合法定义来源
#
# Trigger 规则：
#   - PR Gate:      跑 trigger 包含 PR 的条目
#   - Release Gate: 跑 trigger 包含 Release 的条目
#   - Nightly:      (已废弃) Nightly workflow 已被移除，此 trigger 暂不可用
#
# Method 规则：
#   - auto:   必须有 test 字段指向自动化测试
#   - manual: 无 test 字段，需人工验证
#
# ============================================================================
#
# 编号说明：
# 历史条目使用旧编号体系（Step 7-11），对应关系：
#   Step 7-8 (PR+Push) → Stage 3: Integrate
#   Step 9 (CI)        → Stage 3: Integrate
#   Step 10 (Learning) → Stage 4: Ship
#   Step 11 (Cleanup)  → Stage 4: Ship
#   Step 6.5 (Simplify) → 已删除，融入 code_review_gate
# 新条目统一使用 4-Stage 编号：Spec/Code/Integrate/Ship
# ============================================================================

# NOTE: version 需要与 package.json 保持同步
# 更新 package.json 时同步更新此处
version: "13.78.14"
updated: 2026-04-01
# devloop-check: seal 文件反推 (v3.7.0)

# ============================================================================
# Hooks 回归契约
# ============================================================================
hooks:
  # --------------------------------------------------------------------------
  # H-session-start: session-start (UserPromptSubmit hook)
  # --------------------------------------------------------------------------
  - id: H1-001
    feature: H1
    name: "分支保护拦截 main/develop 写入"
    scope: hook
    priority: P0
    trigger: [PR, Release]
    method: auto
    tags: [branch, write-protect, security]
    owner: infra
    steps:
      given: "当前在 main 或 develop 分支"
      when: "尝试写入代码文件（Write/Edit 工具）"
      then: "Hook 阻止并提示切换到 cp-* 或 feature/* 分支"
    evidence:
      type: log
      contains: "请先创建工作分支"
    test: "tests/hooks/branch-protect.test.ts"

  - id: H1-002
    feature: H1
    name: "cp-* 分支允许写入"
    scope: hook
    priority: P0
    trigger: [PR, Release]
    method: auto
    tags: [branch, write-protect]
    owner: infra
    steps:
      given: "当前在 cp-* 分支"
      when: "尝试写入代码文件"
      then: "Hook 放行（exit 0）"
    evidence:
      type: exit_code
      equals: 0
    test: "tests/hooks/branch-protect.test.ts"
  - id: H1-010
    feature: H1
    name: "JSON 预验证防止注入 (branch-protect)"
    scope: hook
    priority: P0
    trigger: [PR, Release]
    method: auto
    tags: [security, json, injection, v8.24.0]
    owner: infra
    steps:
      given: "Hook 接收包含特殊字符的输入"
      when: "解析 JSON 输入前"
      then: "使用 jq 预验证 JSON 格式，无效 JSON 直接报错退出"
    evidence:
      type: code
      file: "hooks/branch-protect.sh"
      contains: "jq -e . >/dev/null 2>&1"
    test: "tests/hooks/branch-protect.test.ts"

  - id: H1-011
    feature: H1
    name: "路径遍历检查 (branch-protect)"
    scope: hook
    priority: P0
    trigger: [PR, Release]
    method: auto
    tags: [security, path-traversal, v8.24.0]
    owner: infra
    steps:
      given: "Hook 接收文件路径参数"
      when: "处理路径前"
      then: "拒绝包含 .. 的路径，防止目录遍历攻击"
    evidence:
      type: code
      file: "hooks/branch-protect.sh"
      contains: "reject_path_traversal"
    test: "tests/hooks/branch-protect.test.ts"

  - id: H1-012
    feature: H1
    name: "活跃 Worktree 必须有 .dev-mode（v23）"
    scope: hook
    priority: P0
    trigger: [PR, Release]
    method: auto
    tags: [security, dev-mode, worktree, session-guard, v23]
    owner: infra
    steps:
      given: "在活跃 worktree（非僵尸）中，没有 .dev-mode 文件"
      when: "尝试写入代码文件"
      then: "阻止写入，输出 [SKILL_REQUIRED: dev]，提示运行 /dev"
    evidence:
      type: code
      file: "hooks/branch-protect.sh"
      contains: "没有活跃的 /dev 会话"
    test: "manual:bash -n packages/engine/hooks/branch-protect.sh"
  - id: H1-017
    feature: H1
    name: "Bash GUARD：拦截 Bash 工具写 .dev-mode step_N done 并调用 verify-step.sh"
    scope: hook
    priority: P0
    trigger: [PR, Release]
    method: auto
    tags: [bash-guard, state-machine, dev-mode, step-seal]
    owner: infra
    steps:
      given: "AI 用 Bash 工具执行 echo 'step_2_code: done' >> .dev-mode.*"
      when: "bash-guard.sh 检测到 .dev-mode 写入含 step_N: done"
      then: "调用 verify-step.sh 验证，失败时 exit 2 阻止写入"
    evidence:
      type: code
      run: "bash hooks/bash-guard.sh"
      contains: "verify-step.sh"
    test: "tests/hooks/bash-guard.test.ts"

  - id: H1-018
