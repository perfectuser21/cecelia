    owner: infra
    steps:
      given: "CI workflow 文件"
      when: "定义 job"
      then: "每个 job 显式声明 permissions，遵循最小权限原则"
    evidence:
      type: code
      file: ".github/workflows/ci-l1-process.yml"
      contains: "permissions:"
    # Evidence check: grep for 'permissions:' in ci.yml

  - id: C1-003
    feature: C1
    name: "curl JSON 安全生成"
