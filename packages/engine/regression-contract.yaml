      type: doc-review
      checklist:
        - "本地 vs 远端职责映射表清晰"
        - "P0-1/P0-2/P0-3 说明完整"
        - "Branch Protection 配置要求明确"
    verification:
      type: manual
      description: "本 PR 已验证（文档已审查）"

  - id: Q3-002
