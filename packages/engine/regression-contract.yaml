    owner: infra
    steps:
      given: "CI 需要发送 JSON 数据"
      when: "构造 curl 请求"
      then: "使用 jq -n 生成 JSON，避免字符串拼接注入"
    evidence:
      type: code
      file: ".github/workflows/ci-l1-process.yml"
      contains: "jq -n"
    # Evidence check: grep for 'jq -n' in ci.yml

  # --------------------------------------------------------------------------
  # C1-004~C1-005: v12.1.0 P1 修复 (ci.yml, nightly.yml)
  # --------------------------------------------------------------------------
  - id: C1-004
    feature: C1
    name: "CI 超时配置完整性检查"
    scope: ci
    priority: P0
    trigger: [PR, Release]
    method: auto
