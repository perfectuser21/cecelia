    evidence:
      type: code
      file: ".github/workflows/ci-l4-runtime.yml"
      contains: "upload-artifact"

  # --------------------------------------------------------------------------
  # C2: test job
  # --------------------------------------------------------------------------
  - id: C2-001
    feature: C2
    name: "CI 运行 npm run qa"
    scope: ci
    priority: P0
    trigger: [PR, Release]
    method: manual
    tags: [ci, test, l1, v10.5.0]
    owner: infra
