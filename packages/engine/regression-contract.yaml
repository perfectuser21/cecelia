  - id: BRAIN-DISPATCH-TIMEOUT-001
    feature: BRAIN
    name: "Dispatch 超时保护（DISPATCH_TIMEOUT_MINUTES=60）"
    scope: brain
    priority: P2
    trigger: [PR, Release]
    method: auto
    tags: [brain, dispatch, timeout, protection]
    owner: brain
    steps:
      given: "任务被派发后长时间无响应"
      when: "超过 DISPATCH_TIMEOUT_MINUTES（60分钟）"
      then: "任务自动标记为 failed，释放 slot"
    evidence:
      type: command
      run: "bash -c 'grep -q \"DISPATCH_TIMEOUT\" packages/brain/src/tick.js'"
    test: "manual:node -e \"const c=require('fs').readFileSync('packages/brain/src/tick.js','utf8');if(!c.includes('DISPATCH_TIMEOUT')){console.error('DISPATCH_TIMEOUT not found in tick.js');process.exit(1)}console.log('Dispatch timeout protection present')\""

  - id: UI-STATE-001
    feature: UI
    name: "Dashboard — Brain 状态实时同步"
    scope: ui
    priority: P2
    trigger: [Release]
    method: auto
    tags: [ui, dashboard, brain, state-sync]
    owner: frontend
    steps:
      given: "Dashboard 加载任务列表页"
      when: "调用 /api/brain/tasks API"
      then: "返回当前 Brain 中真实任务状态（queued/in_progress/completed/failed），Dashboard 正确渲染"
    evidence:
      type: command
      run: "bash -c 'test -f apps/dashboard/src/pages/tasks/TaskTypeConfigPage.tsx'"
    test: "manual:node -e \"const c=require('fs').readFileSync('apps/dashboard/src/pages/tasks/TaskTypeConfigPage.tsx','utf8');if(!c.includes('executor')){console.error('TaskTypeConfigPage missing executor field');process.exit(1)}console.log('Dashboard executor field present')\""
