    evidence:
      type: code
      file: ".github/workflows/ci-l1-process.yml"
      contains: "jq -n"
    # Evidence check: grep for 'jq -n' in ci.yml

  # --------------------------------------------------------------------------
  # C1-004~C1-005: v12.1.0 P1 修复 (ci.yml, nightly.yml)
