    name: "verify-step.sh 通过后写 .dev-seal 验签"
    scope: hook
    priority: P0
    trigger: [PR, Release]
    method: auto
    tags: [verify-step, seal, state-machine]
    owner: infra
    steps:
      given: "verify-step.sh stepN 验证通过"
      when: "PROJECT_ROOT 和 BRANCH 变量已设置"
      then: "写入 .dev-seal.${BRANCH} 文件，格式 stepN_seal: verified@timestamp"
    evidence:
      type: code
      run: "bash hooks/verify-step.sh step1"
      contains: "dev-seal"
    test: "tests/hooks/verify-step.test.ts"
