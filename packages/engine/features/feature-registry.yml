      Engine 改动 + 无 [CONFIG] → 拦截，exit 2 →
      Engine 改动 + [CONFIG] feat: → 放行

    minimal_paths:
      - "无 --title 参数: 提取失败，降级放行"
      - "非 gh pr create 命令: 跳过检查"

    rcis: []

