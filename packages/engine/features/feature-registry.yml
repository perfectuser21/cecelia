  - id: worktree-max-limit
    name: worktree-manage.sh MAX_WORKTREES 数量上限检查
    status: active
    priority: P2
    version: "1.0.0"
    updated: "2026-03-14"
    description: |
      worktree-manage.sh cmd_create() 在创建新 worktree 之前检查现有数量。
      当 worktree 数量（不含主仓库）>= MAX_WORKTREES（8）时，
      拒绝创建并提示运行 worktree-gc.sh 清理已合并的 worktree。
      防止 Brain 并发派发大量任务时磁盘被撑满。

    entrypoints:
      - type: script
        file: skills/dev/scripts/worktree-manage.sh
        trigger: "cmd_create() 调用时（flock 获取锁之后）"

    golden_path: |
      worktree 数量 < 8 → 正常创建 →
      worktree 数量 >= 8 → exit 1 + 错误提示 →
      运行 worktree-gc.sh 清理 → 重试创建

    minimal_paths:
      - "数量 < 8: 正常流程"
      - "数量 >= 8: 拒绝创建，提示 GC"

    rcis: []

  - id: codex-runner-account-rotation
    name: Codex Runner 多账号轮换（CODEX_HOMES）
    status: active
    priority: P1
    version: "1.0.0"
    updated: "2026-03-14"
    description: |
      runner.sh v2.3.0 新增 CODEX_HOMES 环境变量支持（冒号分隔的多账号路径）。
      当某个 Codex 账号触发 Quota exceeded 时，自动切换到下一个账号继续执行，
      本轮不计入重试次数。所有账号耗尽才真正失败。

    entrypoints:
      - type: script
        file: runners/codex/runner.sh
        trigger: "CODEX_HOMES 环境变量设置时启用多账号模式"

    golden_path: |
      CODEX_HOMES 解析为账号数组 →
      codex-bin exec 执行 →
      输出含 Quota exceeded → 切换账号 → 重试 →
      所有账号耗尽 → 失败

    minimal_paths:
      - "单账号（兼容）: CODEX_HOME 正常执行"
      - "多账号轮换: Quota exceeded → 切换 → 继续"
      - "全部耗尽: 报错退出"

    rcis: []
  - id: codex-runner-model-selection
    name: Codex Runner 模型选择（CODEX_MODEL）
    status: active
    priority: P0
    version: "1.0.0"
    updated: "2026-03-14"
    description: |
      runner.sh v2.4.0 新增 CODEX_MODEL 环境变量支持（默认 gpt-5.4）。
      通过 --model 参数显式指定 Codex 模型，避免 CLI 自动选择 gpt-5.3-codex
      导致 Quota exceeded 失败。设置 CODEX_MODEL=gpt-5.3-codex 可恢复旧行为。

    entrypoints:
      - type: script
        file: runners/codex/runner.sh
        trigger: "codex-bin exec 时传入 --model $CODEX_MODEL"

    golden_path: |
