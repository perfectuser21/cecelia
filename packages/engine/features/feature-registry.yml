      2. 环境检测
      3. 分支创建 (cp-MMDDTTTT-xxx)
      4. DoD 定稿 (含 QA Decision Node)
      5. 写代码
      6. 写测试
      7. 质检循环 (Audit + L1, Stop Hook 强制)
      8. 提交 PR (p0 结束)
      9. CI 修复 (p1 事件驱动)
      10. Learning
      11. Cleanup

    tests:
