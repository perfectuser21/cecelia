# ============================================================================
# Platform Core 5 - 平台基础设施（按"断了就全死"排序）
# ============================================================================
platform_features:
  # --------------------------------------------------------------------------
  # H1: Branch Protection - 分支保护
  # --------------------------------------------------------------------------
  - id: H1
    name: Branch Protection
    status: Committed
    priority: P0
    version: "12.38.1"
    updated: "2026-03-02"
    description: |
      防止在 main/develop 分支直接写代码，强制使用 cp-*/feature/* 工作分支
      v12.35.7: 活跃 Worktree .dev-mode 强制检查（v23）- 非僵尸 worktree 必须有 .dev-mode 才能写代码，防止新 Claude 会话绕过 /dev
      v12.35.6: 僵尸 Worktree 检测（v22）- 已合并分支阻止写代码
      v12.33.3: 双重修复（v21）- cp-* 分支名正则与 devgate.yml 同步（强制 8 位时间戳）+ worktree 检测加 gitdir 文件检查
      v12.33.2: 强制 worktree 检测（v20）- cp-*/feature/* 分支必须在独立 worktree 中，防止主仓库污染
      v12.8.0: 加强数据库检查（v20）- .dev-mode 存在时优先检查 Brain API 数据库（PRD/DoD 初稿），支持秋米→/dev 工作流
      v12.4.14: 修复 gitignored PRD/DoD 文件检测（跳过 git 追踪检查，只验证存在性和内容）
      v11.13.1: 支持 monorepo 子目录 PRD/DoD 文件检测（如 apps/core/.prd.md）
      v11.11.0: P1-6 修复 - 使用 grep -Eq 替代 bash regex 进行 skills 路径匹配（修复分组失败问题）
      v11.5.0: 放宽 skills 保护（只保护 Engine skills：dev, qa, audit, semver，其他 skills 可从任何 repo 部署）
      v11.4.0: 添加 Task Checkpoint 检查（.dev-mode 必须包含 tasks_created: true）
      v11.2.6: 移除硬编码路径 + develop/main 自动检测 fallback
      v11.2.0: 支持分支级别 PRD/DoD 文件（.prd-{branch}.md，向后兼容 .prd.md）

    entrypoints:
      - type: hook
        event: PreToolUse:Write, PreToolUse:Edit
        file: hooks/branch-protect.sh

    golden_path: |
      检测当前分支 → main/develop → exit 2 (阻止) | cp-*/feature/* → worktree 检测 → 僵尸检测 → .dev-mode 检测 → PRD/DoD 检测 → exit 0 (放行)

    minimal_paths:
      - "在 main 分支尝试写代码 → 被阻止"
      - "在 cp-* 分支写代码 → 放行"
      - "在已合并 cp-* 分支（僵尸 worktree）写代码 → 被阻止"
      - "在活跃 cp-* worktree、无 .dev-mode、新 Claude 会话 → 被阻止"

    tests:
      - type: auto
        file: tests/hooks/branch-protect.test.ts
        coverage: H1-001, H1-002, H1-003, H1-010, H1-011, H1-012, H1-013

    rcis:
      - H1-001  # 拦截 main/develop 写入
      - H1-002  # cp-* 分支允许写入
      - H1-003  # feature/* 分支允许写入
      - H1-010  # JSON 注入防护
      - H1-011  # 路径遍历防护
      - H1-012  # 活跃 worktree 必须有 .dev-mode
      - H1-013  # stop-dev.sh 合并前检查 step_10_learning

  # --------------------------------------------------------------------------
  # H7: Stop Hook Loop Controller - 循环控制器
  # --------------------------------------------------------------------------
  - id: H7
    name: Stop Hook Router (v14.0.0)
    status: Committed
    priority: P0
    version: "12.50.0"
    updated: "2026-03-11"
    description: |
      Stop Hook 路由器架构，检测 mode 文件分发到对应 handler：
      - 路由器：stop.sh（~63 lines）检测 .dev-lock.<branch>/.architect-lock.*/.decomp-mode，调用对应 handler
      - stop-dev.sh：/dev 工作流完成条件检查（PR 创建 + CI 通过 + PR 合并）
      - stop-architect.sh：/architect 架构设计完成条件检查（Mode 1 scan / Mode 2 design）
      - stop-decomp.sh：/decomp 工作流完成条件检查（output.json + DB 写入）
      - 职责分离：路由器只负责分发，具体逻辑在 handler 中
      - 写死逻辑：有 .dev-mode 时，任何情况（包括 headless、锁失败）都必须 exit 2，只有真正完成才 exit 0
      v12.43.0: 新增 .architect-lock.* 路由 → stop-architect.sh（/architect skill Stop Hook 支持）
      v12.32.1: 修复 force_cleanup_worktree 无法删除当前 CWD 所在 worktree 的 Bug（子 shell cd 到 main_wt 再执行 git worktree remove，彻底解决 worktree 残留问题）
      v12.32.0: 清理 /okr 残留 - stop-okr.sh → stop-decomp.sh，.okr-mode → .decomp-mode，删除 skills/okr/
      v12.30.3: 修复泄漏路径 - .dev-lock 丢失但 .dev-mode 存在时，先调 force_cleanup_worktree() 再删 .dev-mode，防止孤立 worktree（W6-006）
      v12.17.1: 双钥匙状态机 - .dev-lock（硬钥匙）+ .dev-mode（软状态）+ sentinel（三重保险），修复 .dev-mode 创建失败/被删除导致会话退出的漏洞，Step 3 改用 Bash 原子写入，cleanup.sh 不删除状态文件
      v12.11.1: 写死逻辑修复 - 删除 headless 模式的 exit 0 旁路 + 锁失败返回 exit 2（不是 exit 0）+ 更新注释
      v12.8.0: 重构为路由器架构（v13.0.0）- 从单一 352 lines 文件拆分为路由器+handlers，支持多 Skill 扩展
      v12.7.1: 修复被绕过问题 - 删除"11步全部done"提前退出逻辑（line 108-136），步骤状态只用于进度展示，流程控制只依赖实际 PR/CI/Merge 状态
      v11.18.0: H7-008 - TTY 会话隔离，有头模式下按 terminal (/dev/pts/N) 隔离
      v11.15.0: P0-4 修复 - session_id 验证 + 共享锁工具库(lib/lock-utils.sh) + 统一 CI 查询(lib/ci-status.sh)
      v11.14.2: P0-3 修复 - 会话隔离，检查 .dev-mode 中的 branch 是否与当前分支匹配，防止多会话"串线"
      v11.11.0: P0-2 修复 - 添加 flock 并发锁防止多个会话同时操作 .dev-mode 文件
      v11.10.0: PR 合并后自动执行 cleanup（删除 .dev-mode、切换分支、删除本地分支），不再悬空
      v11.4.1: 修复跳过 Cleanup bug（cleanup_done 检测 + PR 合并时 exit 2）
      v11.3.0: 首次实现，替代 Ralph Loop 插件

    entrypoints:
      - type: hook
        event: Stop
        file: hooks/stop.sh

    golden_path: |
      会话结束 → 检测 .dev-mode → 检查完成条件 → exit 2 (继续) | exit 0 (结束)

    minimal_paths:
      - "无 .dev-mode → exit 0 (普通会话)"
      - "有 .dev-mode + PR 未创建 → exit 2 (继续)"
      - "有 .dev-mode + PR 已合并 → 删除 .dev-mode + exit 0 (完成)"

    tests:
      - type: manual
        evidence: manual:stop-hook-loop-controller

    rcis:
      - H7-001  # .dev-mode 检测
      - H7-002  # 完成条件检查
      - H7-004  # exit 2 阻止会话结束
      - H7-006  # session_id 验证
      - H7-007  # 共享锁工具库原子操作
      - H7-008  # TTY 会话隔离
      - W6-006  # 泄漏路径 worktree 清理

  # --------------------------------------------------------------------------
  # H2: PR Gate (Dual Mode) - 提交门禁
  # --------------------------------------------------------------------------
  - id: H2
    name: PR Gate (Dual Mode)
    status: Committed
    priority: P0
    version: "11.24.0"
    updated: "2026-02-01"
    description: |
      PR 创建前的质检门禁，支持双模式：
      - PR 模式: L1 (测试) + L2A (审计) + L2B-min (证据)
      - Release 模式: L1 + L2A + L2B-full (证据) + L3 (验收)
      - v11.24.0: 硬拦截 gh pr --admin 参数（移除引号/heredoc 后检测，防止绕过 Branch Protection 和 CI）
      - v11.11.0: P0-3 修复 - verify-gate-signature.sh 调用添加 10 秒超时保护（防止卡死）
      - v11.10.0: P0-1 修复 - 验证器缺失时改为软警告（不再阻止），支持 v3 exit code (7/8/9)
      - v11.8.0: Gate 验证器硬失败（脚本缺失时 exit 2）+ 分层 exit code 错误提示
      - v11.2.6: .git 检测使用 -e 替代 -d（兼容 worktree）+ develop/main fallback
      - v11.2.5: 并发安全修复（TEMP_FILES 数组管理、分支级别质检文件）
      - v11.2.0: 支持分支级别 PRD/DoD 文件（.prd-{branch}.md，向后兼容 .prd.md）
      - v10.13.1: 降级为提示型 Gate（检查失败 exit 0，不阻断），CI 是唯一门槛
      - v10.8.4: 信任新鲜质检结果（5分钟内），避免重复测试导致不稳定
      - v10.6.0: 新增 Part 0.5 (CI Preflight) 和 L2B-min 检查
      - v10.4.4: 真正移除 FAST_MODE，100% 强制本地 L1+L2A 检查

    entrypoints:
      - type: hook
        event: PreToolUse:Bash (gh pr create)
        file: hooks/pr-gate-v2.sh

    golden_path: |
      检测命令 (gh pr create) → 判断模式 (PR/Release) → 检查产物 → 通过/阻止

    minimal_paths:
      - "PR 模式: 检查 PRD + DoD + QA-DECISION + AUDIT-REPORT (PASS) + L1"
      - "Release 模式: 额外检查 .layer2-evidence.md + DoD 全勾"

    tests:
      - type: auto
        file: tests/hooks/pr-gate.test.ts
        coverage: H2-001, H2-002, H2-003, H2-004

    rcis:
      - H2-001  # 拦截 gh pr create
      - H2-002  # L1 失败阻止
      - H2-003  # 双模式检测
      - H2-004  # 产物检查

  # --------------------------------------------------------------------------
  # W1: Two-Phase Dev Workflow - 两阶段工作流（v2.0.0）
  # --------------------------------------------------------------------------
  - id: W1
    name: Unified Dev Workflow
    status: Committed
    priority: P0
    version: "12.33.0"
    updated: "2026-02-27"
    description: |
      v2.2.0 统一开发工作流（删除阶段检测 + 强制 Task Checkpoint）：
      - 统一完成条件：PR 创建 + CI 通过 + PR 合并 = DONE
      - Task Checkpoint：TaskCreate/TaskUpdate 追踪进度
      - 从头到尾一直执行，不在 PR 创建后停止
      - Ralph Loop: 用户直接在 Claude Code 会话内输入 /ralph-loop 命令
      - v12.33.0: 交付质量修复 - Step 5 manual 格式要求具体命令 + Step 7 逐条执行 DoD 验证并勾 [x]
      - v12.30.4: Skills 中 --base develop 改为自动检测（有 origin/develop 用 develop，否则用 main）
      - v12.4.9: 添加版本更新流程文档（防止 package-lock.json 再次不同步）
      - v12.4.3: 强调核心目标 - 成功合并 PR，不停止，遇到问题自动修复
      - v12.4.2: 添加 Step 11 任务列表清理逻辑（防止任务残留）
      - v11.21.0: 循环模式 B 优化（所有步骤文件使用统一循环控制模板，MAX_GATE_ATTEMPTS=3 硬编码上限）
      - v11.19.0: G3 修复 gate skill 调用方式（6 个 gates 从 Task(general-purpose) 改为 Skill() 调用，删除冗长内联 prompt）
      - v11.2.7: Promise 信号统一（DONE 替代 QUALITY_GATE_PASSED/CI_PASSED）
      - v10.14.0: 清理 Ralph Loop 架构（删除 dev-with-loop、detect-phase.sh、RALPH_LOOP_WRAPPER.md）
