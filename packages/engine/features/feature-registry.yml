      codex-bin exec --model gpt-5.4 执行 →
      成功返回（无 Quota exceeded）

    minimal_paths:
      - "默认: gpt-5.4 执行，无 quota 问题"
      - "自定义: CODEX_MODEL=gpt-5.3-codex 恢复旧行为"

    rcis: []
