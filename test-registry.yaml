# Test Registry — Cecelia Monorepo
# SSOT for all test files. Every *.test.* file must be registered here.
# CI L2 (orphan-test-check) enforces this: unregistered tests block PR merge.
#
# Fields:
#   id       — unique identifier (kebab-case)
#   path     — relative path from repo root
#   type     — unit | integration | e2e
#   ci       — L3 | L4 (which CI layer runs this)
#   status   — active | deprecated | pending-ci
#   note     — optional context
#
# Taxonomy (see docs/adr/0001-test-taxonomy.md):
#   unit        — single module, all deps mocked, no I/O. Runs in L3.
#   integration — crosses a real boundary (DB/HTTP). Needs PostgreSQL. Runs in L4.
#   e2e         — full workflow from external perspective. Runs in L4 shard 1.

version: "1.0.0"
