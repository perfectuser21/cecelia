# 任务系统 (task) - Feature 详情
# 更新时间: 2026-04-03
# Schema: v2.0.0
# 成熟度: 0=只有代码 1=+文档 2=+unit 3=+integration+ADR 4=+e2e+api_docs 5=+runbook+regression

system_id: task
system_name: 任务系统

features:

  - feature_id: task_create
    name: 创建任务
    purpose: 注册新任务到 Brain，分配 ID 和类型
    maturity: 2
    code:
      root: packages/brain/src/routes
      entry_files: [packages/brain/src/routes/tasks.js]
      language: javascript
      runtime: node
    docs:
      prd: null
      dod: null
      adr: null
      api_doc: null
      runbook: null
    skills: []
    apis:
      - method: GET
        path: /api/brain/tasks
        service: brain
        purpose: 查询任务列表，支持 status/task_type 过滤
        code_file: packages/brain/src/routes/tasks.js
        auth: none
      - method: POST
        path: /api/brain/tasks
        service: brain
        purpose: 创建任务
        code_file: packages/brain/src/routes/tasks.js
        auth: none
      - method: GET
        path: /api/brain/tasks/:id
        service: brain
        purpose: 获取任务详情
        code_file: packages/brain/src/routes/tasks.js
        auth: none
      - method: GET
        path: /api/brain/dev-records
        service: brain
        purpose: 最近 PR 记录
        code_file: packages/brain/src/routes/knowledge.js
        auth: none
    tests:
      unit:
        - packages/brain/src/__tests__/tick.test.js
      integration:
        - apps/api/src/__tests__/brain-api-integration.test.ts
        - tests/database/integration.test.js
        - packages/quality/tests/api/integration.test.js
      e2e:
        - packages/brain/scripts/task-lifecycle-check.sh
      regression: []
    capabilities:
      - id: task_create_api
        name: 任务创建 API
        entry_file: packages/brain/src/routes/tasks.js
        maturity: 4
        tests:
          unit:
            - packages/brain/src/__tests__/tick.test.js
          integration:
            - apps/api/src/__tests__/brain-api-integration.test.ts
            - tests/database/integration.test.js
            - packages/quality/tests/api/integration.test.js
          e2e:
            - packages/brain/scripts/task-lifecycle-check.sh
        status: active
    ci:
      jobs: [brain-unit]
      layers: [L3, L4]
    runtime: {}

