# 编排系统 (orchestration) - Feature 详情
# 更新时间: 2026-04-03
# Schema: v2.0.0

system_id: orchestration
system_name: 编排系统

features:

  - feature_id: tick_loop
    name: Tick 调度引擎
    purpose: 5s 轮询 / 5min 执行，驱动 Brain 自动化运转
    maturity: 3
    code:
      root: packages/brain/src
      entry_files: [packages/brain/src/tick.js]
      language: javascript
      runtime: node
    docs:
      prd: null
      dod: null
      adr: null
      api_doc: null
      runbook: null
    skills: []
    apis:
      - method: GET
        path: /api/brain/context
        service: brain
        purpose: 一次获取全景摘要（OKR + 最近PR + 活跃任务 + 有效决策）
        code_file: packages/brain/src/routes/status.js
        auth: none
      - method: GET
        path: /api/brain/status
        service: brain
        purpose: 精简决策包（LLM 决策用），含 task/memory/policy 摘要
        code_file: packages/brain/src/routes/status.js
        auth: none
      - method: GET
        path: /api/brain/briefing
        service: brain
        purpose: Dashboard 首屏数据聚合
        code_file: packages/brain/src/routes/status.js
        auth: none
      - method: POST
        path: /api/brain/tick
        service: brain
        purpose: 手动触发一次 tick
        code_file: packages/brain/src/routes/tick.js
        auth: none
      - method: GET
        path: /api/brain/tick/status
        service: brain
        purpose: 获取 tick 状态（上次执行时间、动作数）
        code_file: packages/brain/src/routes/tick.js
        auth: none
      - method: POST
        path: /api/brain/tick/enable
        service: brain
        purpose: 启用自动 tick
        code_file: packages/brain/src/routes/tick.js
        auth: none
      - method: POST
        path: /api/brain/tick/disable
        service: brain
        purpose: 禁用自动 tick
        code_file: packages/brain/src/routes/tick.js
        auth: none
      - method: POST
        path: /api/brain/tick/drain
        service: brain
        purpose: 优雅关闭（暂停新任务，等待在途完成）
        code_file: packages/brain/src/routes/tick.js
        auth: none
      - method: WS
        path: /ws
        service: brain
        purpose: WebSocket，推送系统事件
        code_file: packages/brain/server.js
        auth: none
    tests:
      unit:
        - packages/brain/src/__tests__/tick.test.js
        - packages/brain/src/__tests__/tick-drain.test.js
        - packages/brain/src/__tests__/tick-throttle.test.js
      integration:
        - packages/brain/src/__tests__/tick-healing-integration.test.js
      e2e:
        - packages/brain/scripts/goldenpath-check.sh
      regression: []
    ci:
      jobs: [brain-unit, brain-integration]
      layers: [L3, L4]
    runtime: {}

