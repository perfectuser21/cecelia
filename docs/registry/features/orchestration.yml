        version: "2.1.0"
        status: active
      - skill_id: intent_expand
        command: intent_expand
        entry_file: packages/engine/skills/intent-expand/SKILL.md
        version: "1.0.0"
        status: active
    apis:
      - method: GET
        path: /api/brain/okr/current
        service: brain
        purpose: OKR 进度树形结构（objectives → key_results）
        code_file: packages/brain/src/routes/okr-hierarchy.js
        auth: none
      - method: GET
        path: /api/brain/okr/visions
        service: brain
        purpose: 列出所有 Vision
        code_file: packages/brain/src/routes/okr-hierarchy.js
        auth: none
      - method: POST
        path: /api/brain/okr/visions
        service: brain
