        purpose: 列出所有 Objective
        code_file: packages/brain/src/routes/okr-hierarchy.js
        auth: none
      - method: POST
        path: /api/brain/okr/objectives
        service: brain
        purpose: 创建 Objective
        code_file: packages/brain/src/routes/okr-hierarchy.js
        auth: none
      - method: GET
        path: /api/brain/okr/key-results
        service: brain
        purpose: 列出所有 Key Result
        code_file: packages/brain/src/routes/okr-hierarchy.js
        auth: none
      - method: POST
        path: /api/brain/okr/key-results
        service: brain
        purpose: 创建 Key Result
        code_file: packages/brain/src/routes/okr-hierarchy.js
        auth: none
    tests:
