features:

  - feature_id: decision_engine
    name: 决策引擎
    purpose: 根据 OKR 进度和任务状态生成决策，自动调整执行策略
    maturity: 0
    code:
      root: packages/brain/src
      entry_files: [packages/brain/src/decision.js]
      language: javascript
      runtime: node
    docs:
      prd: null
      dod: null
      adr: null
      api_doc: null
      runbook: null
    skills:
      - skill_id: cecelia
        command: /cecelia
        entry_file: packages/workflows/skills/cecelia/SKILL.md
        version: "5.0.0"
        status: active
      - skill_id: cecelia_brain
        command: /cecelia-brain
        entry_file: packages/workflows/skills/cecelia-brain/SKILL.md
        version: "2.0.0"
        status: active
    apis:
      - method: GET
        path: /api/brain/decisions
        service: brain
        purpose: 获取历史决策记录（只读，审计用）
        code_file: packages/brain/src/routes/status.js
