        maturity: 0
        tests:
          unit: []
          integration: []
          e2e: []
        status: active
    ci:
      jobs: []
      layers: []
    runtime: {}

  - feature_id: proposal_system
    name: 提案审批
    purpose: 高危动作创建 proposal，人工审批后执行
    maturity: 2
