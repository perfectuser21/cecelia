# 开发引擎 (engine) - Feature 详情
# 更新时间: 2026-04-03
# Schema: v2.0.0

system_id: engine
system_name: 开发引擎

features:

  - feature_id: engine_dev_workflow
    name: /dev 开发工作流
    purpose: Spec→Code→Integrate→Ship 四阶段开发流水线
    maturity: 2
    code:
      root: packages/engine/skills/dev
      entry_files: [packages/engine/skills/dev/]
      language: typescript
      runtime: node
    docs:
      prd: null
      dod: null
      adr: null
      api_doc: null
      runbook: null
    skills:
      - skill_id: dev
        command: /dev
        entry_file: packages/engine/skills/dev/SKILL.md
        version: "4.0.0"
        status: active
      - skill_id: spec_review
        command: /spec-review
        entry_file: packages/workflows/skills/spec-review/SKILL.md
        version: "1.3.0"
        status: active
      - skill_id: code_review_gate
        command: /code-review-gate
        entry_file: packages/workflows/skills/code-review-gate/SKILL.md
        version: "1.6.0"
        status: active
    apis: []
    tests:
      unit:
        - packages/engine/tests/scripts/devloop-check-gates.test.ts
        - packages/engine/tests/hooks/verify-step.test.ts
        - packages/engine/tests/hooks/branch-protect.test.ts
      integration:
        - packages/engine/tests/pipeline-integrity.test.ts
        - packages/engine/tests/codex-runner.test.ts
      e2e:
        - packages/engine/tests/playwright-runner.test.ts
      regression: []
    ci:
      jobs: [engine-tests]
      layers: [L3, L4]
    runtime: {}

  - feature_id: engine_devloop_check
    name: DevLoop 循环检查
    purpose: Stop Hook 完成条件检查，驱动 /dev 自动推进
    maturity: 2
    code:
      root: packages/engine/lib
      entry_files: [packages/engine/lib/devloop-check.sh]
      language: bash
      runtime: node
    docs:
      prd: null
      dod: null
      adr: null
      api_doc: null
      runbook: null
    skills:
      - skill_id: dev
        command: /dev
        entry_file: packages/engine/skills/dev/SKILL.md
        version: "4.0.0"
        status: active
      - skill_id: playwright_evaluator
        command: /playwright-evaluator
        entry_file: packages/engine/skills/playwright-evaluator/SKILL.md
        version: "1.0.0"
        status: active
    apis: []
    tests:
      unit:
        - packages/engine/tests/scripts/devloop-check-gates.test.ts
        - packages/engine/tests/devgate/check-dod-mapping.test.ts
        - packages/engine/tests/devgate/scan-rci-coverage.test.ts
      integration: []
      e2e:
        - packages/quality/tests/e2e-gateway.test.ts
      regression: []
    ci:
      jobs: [engine-tests]
      layers: [L3, L4]
    runtime: {}
