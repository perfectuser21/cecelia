version: "2.0"
# Cecelia 功能台账 — 系统所有功能的唯一来源
# 维护规则：新增任何 route / page / cron 必须在此登记，否则 CI 不通过
# 状态：active / experimental / deprecated / unknown
# 优先级：P0=系统核心（每天 smoke） / P1=核心业务（每周 smoke） / P2=其余（按需）
# smoke_cmd：单行 curl 命令，Brain 运行时可独立执行，< 5s；null=待补
last_updated: "2026-04-30"

features:

# ════════════════════════════════════════════════════════════════
# [health] 系统健康
# ════════════════════════════════════════════════════════════════

  - id: brain-health
    name: Brain 健康检查
    domain: health
    area: brain
    priority: P0
    status: active
    description: Brain 服务存活检测，各器官状态汇报
    smoke_cmd: "curl -sf http://localhost:5221/api/brain/health | jq -e '.status != null'"
    has_unit_test: false
    has_integration_test: true
    has_e2e: true
    last_verified: "2026-04-28"

  - id: brain-status
    name: Brain 全量状态快照
    domain: health
