# ──────────────────────────────────────────────────────────────
# E2E — 端到端测试（Playwright）
# ──────────────────────────────────────────────────────────────
e2e_coverage:
  - spec: frontend/e2e/login.spec.ts
    covers: [登录流程]
  - spec: frontend/e2e/agent-debug.spec.ts
    covers: [Agent 调试页面]

e2e_gaps:
  - description: 主链路 E2E（创建任务 → Brain 调度 → Agent 执行 → 完成）
    priority: P0
  - description: Dashboard 主导航健康检查（首页加载 → LiveMonitor → Tasks）
    priority: P0
  - description: OKR 拆解完整流程（创建 Objective → KR → Task）
    priority: P1
  - description: Harness 流水线全流程（创建 → Planner → GAN → /dev → CI）
    priority: P1
  - description: 内容流水线全流程（选题 → 生成 → 发布）
    priority: P2

# ──────────────────────────────────────────────────────────────
# 维护规则
# ──────────────────────────────────────────────────────────────
governance:
  new_feature_rule: "新增任何 API route / Dashboard page / cron job，必须在此文件新增条目"
  ci_gate: "CI lint-feature-registry 检查（待实现）"
  health_scan: "Brain 每周扫描 last_verified > 30 天的条目，推飞书告警（待实现）"
  status_update: "每次 PR 影响某 feature，更新对应条目的 last_verified 和 notes"
