# ════════════════════════════════════════════════════════════════
# 维护规则
# ════════════════════════════════════════════════════════════════
governance:
  new_feature_rule: "新增任何 API route / Dashboard page / cron job，必须在此文件新增条目（含 smoke_cmd）"
  smoke_standard: "smoke_cmd 必须是单行 curl 命令，在 Brain 运行时可独立执行，< 5 秒"
  health_scan: "Brain 每周自动运行所有非 null smoke_cmd，结果推飞书（待实现）"
  status_update: "每次 PR 影响某 feature，更新对应条目的 last_verified 和 notes"
  priority_rule: "P0=系统宕机级别，P1=核心业务价值，P2=增强/实验性"
