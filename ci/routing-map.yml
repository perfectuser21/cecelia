---
# ci/routing-map.yml
# CI Evolution Gate — Subsystem Routing Registry
#
# PURPOSE: Defines every known subsystem and its CI routing.
# When a new directory appears under packages/ or apps/ that is NOT listed
# here, the CI Evolution Gate will FAIL with a clear registration error.
#
# HOW TO ADD A NEW SUBSYSTEM:
#   1. Add an entry below with the correct root path
#   2. Specify which CI layers should cover it (l1/l2/l3/l4)
#   3. Set deploy: true if it produces a deployable artifact
#   4. Run: node scripts/ci-evolution-check.mjs to verify locally
#
# NEVER set ci_exempt: true unless the directory contains zero executable code.

version: "1.0.0"

subsystems:

  # ── Backend ──────────────────────────────────────────────────────────────

  brain:
    root: packages/brain
    paths:
      - packages/brain/**
      - DEFINITION.md
      - .brain-versions
    layers: [l2, l3, l4]
    deploy: true
    local_precheck: true
    description: "Brain 后端（调度/决策/保护，端口 5221）"

  # ── Development Toolchain ─────────────────────────────────────────────────

  engine:
    root: packages/engine
    paths:
      - packages/engine/**
    layers: [l1, l2, l3]
    deploy: false
    description: "开发工作流引擎（hooks/skills/DevGate）"

  # ── Frontend Applications ─────────────────────────────────────────────────
  # apps/* subdirectories must be explicitly listed here.
  # Adding a new app without registering it will fail the Evolution Gate.

  workspace:
    roots:
      - apps/api
      - apps/dashboard
    paths:
      - apps/**
    layers: [l1, l3]
    deploy: true
    description: "Workspace 前端（API 层 + React Dashboard）"

  # ── Quality & Testing ─────────────────────────────────────────────────────

  quality:
    root: packages/quality
    paths:
      - packages/quality/**
    layers: [l1, l3]
    deploy: false
    description: "QA 基础设施、回归契约"

  # ── Agent Workflows ───────────────────────────────────────────────────────

  workflows:
    root: packages/workflows
    paths:
      - packages/workflows/**
    layers: [l1, l3]
    deploy: false
    description: "Agent 协议 + N8N 配置"


  # ── Legacy Frontend ───────────────────────────────────────────────────────
  # 早期前端目录，现已部分迁移到 apps/。含 React 组件和 Hook 单元测试。
  # CI Inventory Audit v1（PR #762）发现其 8 个测试文件处于路由真空，故补注册。

  frontend:
    root: frontend
    paths:
      - frontend/**
    layers: [l3]
    deploy: false
    description: "遗留前端（含 React 组件/Hook 单元测试），无 PostgreSQL 依赖"

  # ── Data / Config (CI-exempt) ─────────────────────────────────────────────

  config:
    root: packages/config
    paths:
      - packages/config/**
    layers: []
    deploy: false
    ci_exempt: true
    description: "纯数据目录（OKR validation spec），无可执行代码，无 CI 路由"

  # ── DevGate & CI Infrastructure ───────────────────────────────────────────

  devgate-core:
    root: scripts/devgate
    paths:
      - scripts/devgate/**
    layers: [l1, l2]
    deploy: false
    description: "DevGate 检查脚本（DoD 验证、假命令检测、白名单检查等）。被 Hook 和 CI 调用。"

  ci-helpers:
    root: scripts
    paths:
      - scripts/**
    layers: [l2]
    deploy: false
    description: "Brain 事实检查、交叉引用、Evolution Gate、版本同步等 CI 辅助脚本（排除 scripts/devgate 由 devgate-core 覆盖）"

  ci-configuration:
    root: ci
    paths:
      - ci/**
    layers: [l2]
    deploy: false
    description: "CI 路由和测试分类配置"

  github-workflows:
    root: .github/workflows
    paths:
      - .github/workflows/**
    layers: [l1, l2]
    deploy: false
    description: "GitHub Actions 工作流定义（L1-L4 所有 gate）"

  scripts:
    root: scripts
    paths:
      - scripts/**
    layers: [l2]
    deploy: false
    description: "共享脚本（Brain 部署/滚动更新/预提交验证/运营工具等）。devgate/ 子目录由 devgate-core 单独注册。"

  ci_infra:
    root: ci
    paths:
      - ci/**
    layers: [l2]
    deploy: false
    description: "CI 基础设施配置与测试脚本（routing-map/test-taxonomy/baseline/test.sh）。路由配置文件由 ci-configuration 单独注册。"
